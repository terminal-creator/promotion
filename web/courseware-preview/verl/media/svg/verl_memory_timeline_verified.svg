<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F3F2EC"/>
    </linearGradient>

    <marker id="arrow-thin" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1480" height="1200" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="58" font-size="28" font-weight="600" fill="#1a1a1a" letter-spacing="-0.4">单卡显存随时间变化 · 数字校核版</text>
  <text x="60" y="86" font-size="14" fill="#6b6b66" font-style="italic">7B 模型 · 64 卡 colocate · vLLM TP=8 · FSDP=64 · 80GB H100 · 每个数字都重新算过</text>
  <line x1="60" y1="100" x2="1420" y2="100" stroke="#d4d2c7" stroke-width="0.8"/>

  <!-- ============================================== -->
  <!-- 上：先把账目摆出来                                -->
  <!-- ============================================== -->
  <g transform="translate(60, 120)">
    <rect x="0" y="0" width="1360" height="200" rx="6" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.8"/>
    <text x="22" y="28" font-size="14" font-weight="700" fill="#26215C">画图前先算账（这是反直觉的关键）</text>
    <line x1="22" y1="40" x2="380" y2="40" stroke="#CECBF6" stroke-width="0.6"/>

    <g transform="translate(22, 60)" font-size="12">
      <!-- Phase 1 -->
      <text x="0" y="0" font-weight="700" fill="#993C1D">Phase 1 (Rollout)</text>
      <text x="170" y="0" fill="#444441">参数 14/8 = 1.75GB + KV pool ≈ 50GB =</text>
      <text x="500" y="0" font-weight="700" fill="#993C1D">≈ 52 GB ← 最高</text>
      <text x="700" y="0" fill="#5f5e5a" font-style="italic">vLLM 预分配 KV pool 吃掉大半显存</text>

      <!-- Phase 2 -->
      <text x="0" y="24" font-weight="700" fill="#185FA5">Phase 2 (Ref+Reward)</text>
      <text x="170" y="24" fill="#444441">残留 1.32 + ref/reward 各 0.22 + 激活 ~3GB =</text>
      <text x="500" y="24" font-weight="700" fill="#185FA5">≈ 5 GB ← 最低</text>
      <text x="700" y="24" fill="#5f5e5a" font-style="italic">forward only · 激活值很小</text>

      <!-- Phase 3 -->
      <text x="0" y="48" font-weight="700" fill="#854F0B">Phase 3 (Training)</text>
      <text x="170" y="48" fill="#444441">参数 0.22 + 梯度 0.22 + 优化器 0.88 + 激活 ~25GB =</text>
      <text x="500" y="48" font-weight="700" fill="#854F0B">≈ 27 GB ← 中等</text>
      <text x="700" y="48" fill="#5f5e5a" font-style="italic">参数被切到 1/64 · 激活值是大头</text>

      <text x="0" y="84" font-size="13" font-weight="700" fill="#26215C">关键洞察 1：</text>
      <text x="120" y="84" fill="#444441">在 colocate + vLLM 模式下，<tspan font-weight="700" fill="#26215C">显存峰值在 rollout 阶段，不是训练阶段</tspan></text>

      <text x="0" y="108" font-size="13" font-weight="700" fill="#26215C">关键洞察 2：</text>
      <text x="120" y="108" fill="#444441">Training 阶段虽然有梯度+优化器，但都被 FSDP 切到 1/64 了，反而很小。<tspan font-weight="700" fill="#26215C">激活值才是 training 显存的大头</tspan></text>

      <text x="0" y="132" font-size="13" font-weight="700" fill="#26215C">关键洞察 3：</text>
      <text x="120" y="132" fill="#444441">Phase 1 比 Phase 3 高约 2 倍 · Phase 2 几乎贴底 · <tspan font-weight="700" fill="#26215C">这才是这张图正确的相对比例</tspan></text>
    </g>
  </g>

  <!-- ============================================== -->
  <!-- 主图：折线图                                     -->
  <!-- ============================================== -->
  <g transform="translate(60, 350)">
    <rect x="0" y="0" width="1360" height="500" rx="6" fill="#FFFFFF" stroke="#d4d2c7" stroke-width="0.8"/>

    <text x="22" y="28" font-size="14" font-weight="600" fill="#1a1a1a">单卡显存随时间变化 · y 轴 80GB · 比例尺 4px / GB</text>
    <line x1="22" y1="40" x2="500" y2="40" stroke="#d4d2c7" stroke-width="0.6"/>

    <!-- Plot area: x: 80..1320 (width 1240), y: 70..390 (height 320) -->
    <g transform="translate(80, 70)">

      <!-- Y axis -->
      <line x1="0" y1="0" x2="0" y2="320" stroke="#888780" stroke-width="0.8"/>
      <!-- X axis -->
      <line x1="0" y1="320" x2="1240" y2="320" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow-thin)"/>

      <!-- Y labels -->
      <g font-size="11" fill="#5f5e5a">
        <text x="-8" y="4"   text-anchor="end">80 GB</text>
        <line x1="-4" y1="0" x2="0" y2="0" stroke="#888780"/>
        <line x1="0" y1="0" x2="1240" y2="0" stroke="#A32D2D" stroke-width="0.6" stroke-dasharray="6 4"/>
        <text x="1244" y="4" font-size="10" fill="#A32D2D" font-weight="600">80 GB cap</text>

        <text x="-8" y="84"  text-anchor="end">60</text>
        <line x1="-4" y1="80" x2="0" y2="80" stroke="#888780"/>
        <line x1="0" y1="80" x2="1240" y2="80" stroke="#d4d2c7" stroke-width="0.4" stroke-dasharray="3 3"/>

        <text x="-8" y="124" text-anchor="end">50</text>
        <line x1="-4" y1="120" x2="0" y2="120" stroke="#888780"/>

        <text x="-8" y="164" text-anchor="end">40</text>
        <line x1="-4" y1="160" x2="0" y2="160" stroke="#888780"/>
        <line x1="0" y1="160" x2="1240" y2="160" stroke="#d4d2c7" stroke-width="0.4" stroke-dasharray="3 3"/>

        <text x="-8" y="244" text-anchor="end">20</text>
        <line x1="-4" y1="240" x2="0" y2="240" stroke="#888780"/>
        <line x1="0" y1="240" x2="1240" y2="240" stroke="#d4d2c7" stroke-width="0.4" stroke-dasharray="3 3"/>

        <text x="-8" y="324" text-anchor="end">0</text>
      </g>

      <!-- Phase background shading -->
      <rect x="0"    y="0" width="420" height="320" fill="#FAECE7" opacity="0.20"/>
      <rect x="420"  y="0" width="80"  height="320" fill="#EEEDFE" opacity="0.40"/>
      <rect x="500"  y="0" width="220" height="320" fill="#E6F1FB" opacity="0.20"/>
      <rect x="720"  y="0" width="520" height="320" fill="#FAEEDA" opacity="0.20"/>

      <!-- Phase labels -->
      <g font-size="12" text-anchor="middle">
        <text x="210" y="-12" font-weight="700" fill="#993C1D">Phase 1 · Rollout (vLLM)</text>
        <text x="460" y="-12" font-weight="700" fill="#534AB7">reshard</text>
        <text x="610" y="-12" font-weight="700" fill="#185FA5">Phase 2 · Ref + Reward</text>
        <text x="980" y="-12" font-weight="700" fill="#854F0B">Phase 3 · Actor Training</text>
      </g>

      <!-- Phase boundary lines -->
      <line x1="420" y1="0" x2="420" y2="320" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
      <line x1="500" y1="0" x2="500" y2="320" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
      <line x1="720" y1="0" x2="720" y2="320" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>

      <!-- ============================================== -->
      <!-- PHASE 1: Rollout (52GB total, from t=0)          -->
      <!-- vLLM params: y=313 to y=320 (7px = 1.75GB)       -->
      <!-- KV pool:     y=113 to y=313 (200px = 50GB)       -->
      <!-- ============================================== -->

      <!-- vLLM params (bottom band) -->
      <rect x="0" y="313" width="420" height="7" fill="#F0997B" stroke="#993C1D" stroke-width="0.5"/>

      <!-- vLLM KV pool (constant 50GB) -->
      <rect x="0" y="113" width="420" height="200" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>

      <!-- Inside KV pool: faint slot indicators -->
      <g opacity="0.30">
        <rect x="20"  y="240" width="20" height="73" fill="#D85A30"/>
        <rect x="50"  y="220" width="20" height="93" fill="#D85A30"/>
        <rect x="80"  y="180" width="20" height="133" fill="#D85A30"/>
        <rect x="110" y="160" width="20" height="153" fill="#D85A30"/>
        <rect x="140" y="200" width="20" height="113" fill="#D85A30"/>
        <rect x="170" y="180" width="20" height="133" fill="#D85A30"/>
        <rect x="200" y="150" width="20" height="163" fill="#D85A30"/>
        <rect x="230" y="170" width="20" height="143" fill="#D85A30"/>
        <rect x="260" y="190" width="20" height="123" fill="#D85A30"/>
        <rect x="290" y="160" width="20" height="153" fill="#D85A30"/>
        <rect x="320" y="180" width="20" height="133" fill="#D85A30"/>
        <rect x="350" y="200" width="20" height="113" fill="#D85A30"/>
        <rect x="380" y="220" width="20" height="93" fill="#D85A30"/>
      </g>

      <!-- Phase 1 annotation -->
      <g transform="translate(210, 95)">
        <rect x="-100" y="-22" width="200" height="38" rx="4" fill="#FFFFFF" stroke="#D85A30" stroke-width="0.8"/>
        <text x="0" y="-7" font-size="12" font-weight="700" fill="#4A1B0C" text-anchor="middle">≈ 52 GB（最高）</text>
        <text x="0" y="9" font-size="10.5" fill="#993C1D" text-anchor="middle">参数 1.75 + KV pool 50</text>
      </g>

      <!-- ============================================== -->
      <!-- RESHARD (x=420..500)                             -->
      <!-- vLLM 释放 KV pool: 200px → 0 over 50px width     -->
      <!-- 中段瞬时峰值: ~30GB (vLLM 半释放 + FSDP 半加载)   -->
      <!-- ============================================== -->

      <!-- vLLM KV pool 释放: 三角形从 200px 高降到 0 -->
      <path d="M 420 113 L 460 240 L 460 313 L 420 313 Z" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.4" opacity="0.7"/>
      <!-- vLLM params 也释放 -->
      <path d="M 420 313 L 440 320 L 420 320 Z" fill="#F0997B" stroke="#993C1D" stroke-width="0.3"/>

      <!-- FSDP 参数加载（从 460 开始） -->
      <!-- 训练态从 460 到 500 渐增到 1.32GB (= 5px) -->
      <path d="M 460 320 L 460 318 L 500 315 L 500 320 Z" fill="#F0997B" stroke="#993C1D" stroke-width="0.4"/>

      <!-- Reshard 标注 -->
      <g transform="translate(460, 250)">
        <rect x="-50" y="0" width="100" height="34" rx="4" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.8"/>
        <text x="0" y="14" font-size="10.5" font-weight="700" fill="#26215C" text-anchor="middle">权重换布局</text>
        <text x="0" y="28" font-size="10" fill="#534AB7" text-anchor="middle">vLLM 释放 → FSDP 加载</text>
      </g>

      <!-- ============================================== -->
      <!-- PHASE 2: Ref + Reward (x=500..720)               -->
      <!-- Total ~5GB                                        -->
      <!-- Actor train state shard: 1.32GB = 5px            -->
      <!-- Ref params: 0.22GB ≈ 1px (太小看不见，画 4px = 1GB) -->
      <!-- Reward params: 同上 4px                            -->
      <!-- Activations: 3GB = 12px                           -->
      <!-- 总高度 5GB = 20px (从 y=320 到 y=300)              -->
      <!-- 但为了能看清各组件，把每个组件适度放大              -->
      <!-- ============================================== -->

      <!-- Actor train state shard (持续) -->
      <rect x="500" y="315" width="220" height="5" fill="#F0997B" stroke="#993C1D" stroke-width="0.4"/>
      <!-- Ref params -->
      <rect x="500" y="311" width="220" height="4" fill="#85B7EB" stroke="#185FA5" stroke-width="0.4"/>
      <!-- Reward params -->
      <rect x="500" y="307" width="220" height="4" fill="#97C459" stroke="#3B6D11" stroke-width="0.4"/>
      <!-- Activations -->
      <rect x="500" y="295" width="220" height="12" fill="#F1EFE8" stroke="#888780" stroke-width="0.4"/>

      <!-- Phase 2 annotation (放上方一点指下来) -->
      <g transform="translate(610, 235)">
        <rect x="-90" y="-22" width="180" height="38" rx="4" fill="#FFFFFF" stroke="#378ADD" stroke-width="0.8"/>
        <text x="0" y="-7" font-size="12" font-weight="700" fill="#042C53" text-anchor="middle">≈ 5 GB（最低）</text>
        <text x="0" y="9" font-size="10.5" fill="#185FA5" text-anchor="middle">forward only · 激活很小</text>
      </g>
      <!-- 引导线 -->
      <line x1="610" y1="251" x2="610" y2="293" stroke="#378ADD" stroke-width="0.6" stroke-dasharray="3 2"/>

      <!-- ============================================== -->
      <!-- PHASE 3: Training (x=720..1240)                  -->
      <!-- Total peak ~27GB                                  -->
      <!-- params 0.22GB ≈ 1px (画 3px 便于看见)            -->
      <!-- grads 0.22GB ≈ 1px (画 3px)                      -->
      <!-- optimizer 0.88GB ≈ 4px (画 6px)                  -->
      <!-- gather buffer ~1GB ≈ 4px                          -->
      <!-- activations 25GB peak = 100px                    -->
      <!-- 总高 ≈ 27GB = 108px (y=320 到 y=212)             -->
      <!-- ============================================== -->

      <!-- params shard (持续) -->
      <rect x="720" y="317" width="520" height="3" fill="#F0997B" stroke="#993C1D" stroke-width="0.4"/>
      <!-- grads shard -->
      <rect x="720" y="314" width="520" height="3" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.4"/>
      <!-- optimizer state (持续, FP32) -->
      <rect x="720" y="308" width="520" height="6" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.4"/>
      <!-- FSDP gather buffer (脉动) -->
      <path d="M 720 308 L 720 304 L 740 296 L 800 296 L 860 304 L 920 296 L 980 296 L 1040 304 L 1100 296 L 1160 296 L 1220 304 L 1240 304 L 1240 308 Z" 
            fill="#F0997B" stroke="#993C1D" stroke-width="0.4" opacity="0.5"/>
      
      <!-- Activations: 上升期 (fwd)，在 bwd 开始时峰值，然后下降 -->
      <!-- fwd 阶段从 720 到 ~860 激活逐渐增加 -->
      <!-- bwd 开始 (~860) 激活峰值 -->
      <!-- bwd 进行中激活逐渐释放 -->
      <path d="M 720 296 
               L 740 280 L 760 260 L 790 240 L 820 220 L 850 212 L 880 212 L 920 212 L 960 215 L 1000 222 L 1040 235 L 1090 250 L 1140 270 L 1190 285 L 1240 296 Z" 
            fill="#F1EFE8" stroke="#888780" stroke-width="0.6"/>

      <!-- Phase 3 peak annotation -->
      <g transform="translate(880, 175)">
        <rect x="-100" y="-22" width="200" height="38" rx="4" fill="#FFFFFF" stroke="#BA7517" stroke-width="0.8"/>
        <text x="0" y="-7" font-size="12" font-weight="700" fill="#412402" text-anchor="middle">≈ 27 GB（峰值）</text>
        <text x="0" y="9" font-size="10.5" fill="#854F0B" text-anchor="middle">激活 25 + 训练态 1.3 + buffer 1</text>
      </g>
      <!-- 引导线 -->
      <line x1="880" y1="191" x2="880" y2="212" stroke="#BA7517" stroke-width="0.6" stroke-dasharray="3 2"/>

      <!-- 横向辅助线：Phase 1 和 Phase 3 高度对比 -->
      <line x1="420" y1="113" x2="720" y2="113" stroke="#993C1D" stroke-width="0.4" stroke-dasharray="2 3" opacity="0.5"/>
      <text x="722" y="116" font-size="10" fill="#993C1D" font-style="italic">↑ Phase 1 高度</text>

      <line x1="720" y1="212" x2="1240" y2="212" stroke="#854F0B" stroke-width="0.4" stroke-dasharray="2 3" opacity="0.5"/>
      
    </g>

    <!-- ============= LEGEND ============= -->
    <g transform="translate(80, 430)" font-size="11">
      <text x="0" y="0" font-size="12" font-weight="600" fill="#1a1a1a">图例</text>

      <g transform="translate(0, 14)">
        <rect x="0" y="0" width="14" height="10" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
        <text x="20" y="9" fill="#444441">vLLM KV pool (50 GB)</text>

        <rect x="180" y="0" width="14" height="10" fill="#F0997B" stroke="#993C1D" stroke-width="0.5"/>
        <text x="200" y="9" fill="#444441">Actor 参数 shard (0.22)</text>

        <rect x="380" y="0" width="14" height="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
        <text x="400" y="9" fill="#444441">优化器 (0.88)</text>

        <rect x="510" y="0" width="14" height="10" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.5"/>
        <text x="530" y="9" fill="#444441">梯度 (0.22)</text>

        <rect x="610" y="0" width="14" height="10" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
        <text x="630" y="9" fill="#444441">Ref 参数 (0.22)</text>

        <rect x="780" y="0" width="14" height="10" fill="#97C459" stroke="#3B6D11" stroke-width="0.5"/>
        <text x="800" y="9" fill="#444441">Reward 参数 (0.22)</text>

        <rect x="960" y="0" width="14" height="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
        <text x="980" y="9" fill="#444441">激活值（变化大）</text>
      </g>
    </g>
  </g>

  <!-- ============================================== -->
  <!-- 底：从图能读出的关键事实                          -->
  <!-- ============================================== -->
  <g transform="translate(60, 870)">
    <rect x="0" y="0" width="1360" height="290" rx="6" fill="#FFFFFF" stroke="#d4d2c7" stroke-width="0.8"/>
    <text x="22" y="28" font-size="14" font-weight="600" fill="#1a1a1a">这张图能读出三个反直觉事实</text>
    <line x1="22" y1="40" x2="380" y2="40" stroke="#d4d2c7" stroke-width="0.6"/>

    <g transform="translate(22, 60)" font-size="12">

      <text x="0" y="0" font-size="13" font-weight="700" fill="#993C1D">① rollout 阶段才是显存峰值，不是 training</text>
      <text x="0" y="22" fill="#444441">vLLM 预分配的 KV pool 高达 50GB · 是 training 峰值 (27GB) 的近 2 倍</text>
      <text x="0" y="40" fill="#444441">这就是为什么大模型 RL 不能简单"压缩 batch"——rollout 阶段的 KV pool 是吃满的，挤不出空间给 training</text>

      <text x="0" y="76" font-size="13" font-weight="700" fill="#185FA5">② Phase 2 (Ref+Reward) 几乎贴底</text>
      <text x="0" y="98" fill="#444441">forward only + 参数 FSDP 切到 1/64 + 激活值小 · 总共才 5GB</text>
      <text x="0" y="116" fill="#444441">这是为什么 ref 和 reward 经常被允许 colocate 在一起——它们根本占不了多少地方</text>

      <text x="0" y="152" font-size="13" font-weight="700" fill="#854F0B">③ training 阶段，激活值是大头（不是参数也不是优化器）</text>
      <text x="0" y="174" fill="#444441">FSDP 切到 1/64 后，参数 + 梯度 + 优化器一共才 1.32GB · 但激活值能到 25GB</text>
      <text x="0" y="192" fill="#444441">所以大模型 RL 训练的优化重点是 <tspan font-weight="700" fill="#854F0B">activation checkpointing</tspan>（用算力换显存），不是参数切分</text>
      <text x="0" y="210" fill="#5f5e5a" font-style="italic">如果不开 checkpointing，激活值能到 50GB+，那就真的撞 80GB cap 了</text>

      <text x="0" y="246" font-size="13" font-weight="700" fill="#26215C">把三件事放一起看：</text>
      <text x="160" y="246" fill="#444441">verl 的 colocate 模式之所以可行，是因为这三个阶段的<tspan font-weight="700" fill="#26215C">显存需求形态完全不同</tspan>，可以时间复用同一块物理显存</text>
      <text x="0" y="266" fill="#444441">如果三个阶段都需要 50GB（像 TRL 那样所有模型常驻），就只能空间堆叠 → 7B 已 OOM · 70B 完全不可能</text>
    </g>
  </g>

</svg>
