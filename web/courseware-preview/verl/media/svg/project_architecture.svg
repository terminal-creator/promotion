      <rect x="358" y="260" width="224" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="368" y="279">Load Balancer · 接入层</text>

      <rect x="358" y="294" width="224" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="368" y="313">Auth · ACL · API Key</text>

      <rect x="358" y="328" width="224" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="368" y="347">Router · intent → agent_id</text>

      <rect x="358" y="362" width="224" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="368" y="381">Session Manager · 会话状态</text>

      <rect x="358" y="396" width="224" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="368" y="415">Context Assembler · 历史拼装</text>

      <rect x="358" y="430" width="224" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="368" y="449">Rate Limit · Quota · 熔断</text>

      <rect x="358" y="464" width="224" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="368" y="483">A/B · Canary · 灰度</text>

      <rect x="358" y="498" width="224" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="368" y="517">Tracing · Logging · Metrics</text>
    </g>

    <text x="358" y="624" font-size="10" font-weight="700" fill="#888780" letter-spacing="1.5">前面专题已讲</text>
  </g>

  <!-- arrow 2 -->
  <path d="M605 398 L635 398" stroke="#888780" stroke-width="2" marker-end="url(#arr)" fill="none"/>

