      <rect x="1098" y="362" width="244" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="1108" y="381">Web Search · Browser</text>

      <rect x="1098" y="396" width="244" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="1108" y="415">RAG · Vector / Hybrid</text>

      <rect x="1098" y="430" width="244" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="1108" y="449">SQL / Database Connector</text>

      <rect x="1098" y="464" width="244" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="1108" y="483">HTTP · 业务系统连接器</text>

      <rect x="1098" y="498" width="244" height="30" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="1108" y="517">Result Validator · 重试 · 回写</text>
    </g>

    <text x="1098" y="624" font-size="10" font-weight="700" fill="#888780" letter-spacing="1.5">前面专题已讲</text>
  </g>

  <!-- ============= CROSS-CUTTING BAR ============= -->
  <rect x="60" y="688" width="1300" height="62" rx="6" fill="#FFFFFF" stroke="#A8A6A0" stroke-width="1.2"/>
  <text x="80" y="713" font-size="11" font-weight="700" fill="#888780" letter-spacing="2">CROSS-CUTTING · 横切关注点</text>
  <g font-size="12" fill="#444441">
    <text x="80" y="737">· Observability (Trace/Log/Metric)</text>
    <text x="338" y="737">· Storage (Object/KV/Vector)</text>
    <text x="588" y="737">· Config Center</text>
    <text x="788" y="737">· Scheduler / Queue</text>
    <text x="978" y="737">· Model Serving (vLLM/SGLang)</text>
    <text x="1228" y="737">· CI / CD</text>
  </g>

  <!-- ============= TWO BRANCH CALLOUTS FROM AGENT RUNTIME ============= -->
  <!-- Branch A · Agent Loop 设计 -->
  <path d="M780 670 Q 540 770 360 820" stroke="#888780" stroke-width="2" stroke-dasharray="6 5" fill="none"/>
  <!-- Branch B · 模型本身的 Agent 能力 -->
  <path d="M960 670 Q 1080 770 1100 820" stroke="#0055FF" stroke-width="2.6" stroke-dasharray="6 5" fill="none"/>

  <!-- Branch A box -->
  <rect x="80" y="820" width="540" height="200" rx="8" fill="#FFFFFF" stroke="#888780" stroke-width="1.4"/>
  <rect x="80" y="820" width="540" height="38" rx="8" fill="#F0EFE8"/>
  <circle cx="108" cy="839" r="10" fill="#888780"/>
  <text x="108" y="843" font-size="10" fill="#FFF" text-anchor="middle" font-weight="700">A</text>
  <text x="128" y="844" font-size="11" font-weight="700" fill="#888780" letter-spacing="2">BRANCH A · 工程问题 · 已经讲过</text>

  <text x="98" y="884" font-size="20" font-weight="600" fill="#1a1a1a">Agent Loop 的设计</text>
  <g font-size="12" fill="#444441">
    <text x="98" y="916">· 多轮对话调度 · 何时切换 turn / 终止</text>
    <text x="98" y="940">· tool schema 设计 · function calling 协议</text>
    <text x="98" y="964">· context 管理 · 截断 / 摘要 / 滑窗</text>
    <text x="98" y="988">· error handling · retry / fallback</text>
  </g>
  <text x="98" y="1010" font-size="11" font-style="italic" fill="#888780">→ 上限被"模型怎么决策"卡住</text>

  <!-- Branch B box -->
  <rect x="660" y="820" width="700" height="200" rx="8" fill="#FFFFFF" stroke="#0055FF" stroke-width="2.4"/>
  <rect x="660" y="820" width="700" height="38" rx="8" fill="#0055FF"/>
  <circle cx="688" cy="839" r="10" fill="#FFFFFF"/>
  <text x="688" y="843" font-size="10" fill="#0055FF" text-anchor="middle" font-weight="700">B</text>
  <text x="708" y="844" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="2">BRANCH B · 算法问题 · 本课程主线 ★</text>

  <text x="678" y="884" font-size="20" font-weight="700" fill="#0055FF">模型本身的 Agent 能力</text>
  <g font-size="12" fill="#26215C">
    <text x="678" y="916">· 工具该不该调用 · 调用哪个 · 参数怎么填</text>
    <text x="678" y="940">· 多轮规划 · 何时停止 · 错误后的纠正策略</text>
    <text x="678" y="964">· 长 trajectory 决策的稳定性</text>
  </g>
  <line x1="678" y1="978" x2="1340" y2="978" stroke="#0055FF" stroke-dasharray="3 3" stroke-width="0.8"/>
  <text x="678" y="1004" font-size="13" font-weight="700" fill="#0055FF">→ 这种"策略"靠 Agentic RL 训出来 · verl 是 Agentic RL 训练框架</text>

  <!-- Footer -->
  <text x="60" y="1060" font-size="11" font-weight="600" fill="#888780" letter-spacing="2">VERL · HYBRIDFLOW · AGENTIC RL TRAINING FRAMEWORK</text>
  <text x="1440" y="1060" font-size="11" font-weight="600" fill="#888780" letter-spacing="2" text-anchor="end">CH 0 · INTRO</text>

