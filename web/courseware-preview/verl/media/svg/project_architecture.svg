  <!-- Outer dashed highlight ring -->
  <rect x="628" y="130" width="412" height="540" rx="14" fill="none" stroke="#0055FF" stroke-width="2" stroke-dasharray="6 4" opacity="0.55"/>

  <g>
    <rect x="640" y="148" width="388" height="500" rx="8" fill="url(#brain)" stroke="#0055FF" stroke-width="2.4"/>
    <rect x="640" y="148" width="388" height="42" rx="8" fill="#0055FF"/>
    <text x="660" y="174" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="2">03 · BRAIN · ★ 本课程核心 ★</text>
    <text x="660" y="216" font-size="24" font-weight="700" fill="#0055FF" letter-spacing="-0.3">Agent Runtime</text>
    <text x="660" y="238" font-size="11" fill="#26215C" font-weight="600">决策中枢 · 决定 Agent 智商上限</text>

