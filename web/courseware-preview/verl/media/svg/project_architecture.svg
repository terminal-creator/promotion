      <rect x="660" y="394" width="172" height="36" fill="#FFFFFF" stroke="#0055FF" stroke-width="0.8"/>
      <text x="670" y="411" font-weight="600">Memory</text>
      <text x="670" y="424" font-size="9" fill="#6b6b66">short / long / vector</text>

      <rect x="660" y="436" width="172" height="36" fill="#FFFFFF" stroke="#0055FF" stroke-width="0.8"/>
      <text x="670" y="453" font-weight="600">Tool Dispatcher</text>
      <text x="670" y="466" font-size="9" fill="#6b6b66">parse · route · retry</text>

