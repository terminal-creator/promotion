      <rect x="660" y="302" width="172" height="44" fill="#FFFFFF" stroke="#0055FF" stroke-width="1.6"/>
      <text x="670" y="320" font-weight="700" fill="#0055FF">Agent Loop ★</text>
      <text x="670" y="334" font-size="9" fill="#26215C">think → act → observe</text>
      <circle cx="816" cy="324" r="9" fill="#0055FF"/>
      <text x="816" y="328" font-size="10" fill="#FFF" text-anchor="middle" font-weight="700">A</text>

