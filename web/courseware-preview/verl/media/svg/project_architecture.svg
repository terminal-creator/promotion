<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F3F2EC"/>
    </linearGradient>
    <linearGradient id="brain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAF1FF"/>
      <stop offset="100%" stop-color="#D7E4FF"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1500" height="1180" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="56" font-size="26" font-weight="600" fill="#1a1a1a" letter-spacing="-0.4">项目整体架构 · 4 层管道 · Agent Runtime 是核心算法层</text>
  <text x="60" y="84" font-size="13" fill="#6b6b66">channel → gateway → agent_runtime → tools_factory · 中间这一格决定 Agent 的智商上限</text>
  <line x1="60" y1="100" x2="1440" y2="100" stroke="#d4d2c7" stroke-width="0.8"/>

  <text x="60" y="128" font-size="11" font-weight="700" fill="#888780" letter-spacing="2">PIPELINE · LEFT TO RIGHT · USER REQUEST → ACTION</text>

  <!-- Legend (top right) -->
  <g>
    <circle cx="1250" cy="124" r="8" fill="#0055FF"/>
    <text x="1250" y="128" font-size="9" fill="#FFF" text-anchor="middle" font-weight="700">A</text>
    <text x="1262" y="128" font-size="11" fill="#26215C">Agent Loop 设计</text>
    <circle cx="1378" cy="124" r="8" fill="#0055FF"/>
    <text x="1378" y="128" font-size="9" fill="#FFF" text-anchor="middle" font-weight="700">B</text>
    <text x="1390" y="128" font-size="11" fill="#26215C">模型 Agent 能力</text>
  </g>

  <!-- ============= STAGE 1 · CHANNEL ============= -->
  <g>
    <rect x="60" y="148" width="240" height="500" rx="6" fill="#FFFFFF" stroke="#A8A6A0" stroke-width="1.2"/>
    <rect x="60" y="148" width="240" height="42" rx="6" fill="#F0EFE8"/>
    <text x="78" y="174" font-size="11" font-weight="700" fill="#888780" letter-spacing="2">01 · INGRESS</text>
    <text x="78" y="216" font-size="22" font-weight="600" fill="#1a1a1a" letter-spacing="-0.3">Channel</text>
    <text x="78" y="237" font-size="11" fill="#6b6b66">多形态接入 · 协议适配</text>

    <g font-size="11" fill="#444441">
      <rect x="78" y="260" width="204" height="32" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="88" y="280">Web · H5 / Web App</text>

      <rect x="78" y="296" width="204" height="32" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="88" y="316">Mobile · iOS / Android</text>

      <rect x="78" y="332" width="204" height="32" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="88" y="352">IM · 钉钉 / 企微 / Slack</text>

      <rect x="78" y="368" width="204" height="32" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="88" y="388">Voice · ASR / TTS</text>

      <rect x="78" y="404" width="204" height="32" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="88" y="424">Open API · OpenAI 兼容</text>

      <rect x="78" y="440" width="204" height="32" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="88" y="460">Webhook / Event</text>

      <rect x="78" y="476" width="204" height="32" fill="#F8F7F1" stroke="#D4D2C7"/>
      <text x="88" y="496">SDK / Embedded</text>
    </g>

    <text x="78" y="544" font-size="10" font-style="italic" fill="#888780">· 协议适配 · 鉴权前置</text>
    <text x="78" y="562" font-size="10" font-style="italic" fill="#888780">· 上行: 文本 / 文件 / tool 回执</text>
    <text x="78" y="624" font-size="10" font-weight="700" fill="#888780" letter-spacing="1.5">前面专题已讲</text>
  </g>

  <!-- arrow 1 -->
  <path d="M305 398 L335 398" stroke="#888780" stroke-width="2" marker-end="url(#arr)" fill="none"/>

