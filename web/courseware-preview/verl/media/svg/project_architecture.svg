      <text x="854" y="277" font-weight="600">Prompt Manager</text>
      <text x="854" y="290" font-size="9" fill="#6b6b66">system / role / tool schema</text>

      <rect x="844" y="302" width="172" height="44" fill="#FFFFFF" stroke="#0055FF" stroke-width="1.6"/>
      <text x="854" y="320" font-weight="700" fill="#0055FF">Model · LLM ★</text>
      <text x="854" y="334" font-size="9" fill="#26215C">是否调 · 调什么 · 何时停</text>
      <circle cx="1000" cy="324" r="9" fill="#0055FF"/>
      <text x="1000" y="328" font-size="10" fill="#FFF" text-anchor="middle" font-weight="700">B</text>

      <rect x="844" y="352" width="172" height="36" fill="#FFFFFF" stroke="#0055FF" stroke-width="0.8"/>
      <text x="854" y="369" font-weight="600">Reflection · Self-Critic</text>
      <text x="854" y="382" font-size="9" fill="#6b6b66">错误纠正 · 重试</text>

      <rect x="844" y="394" width="172" height="36" fill="#FFFFFF" stroke="#0055FF" stroke-width="0.8"/>
      <text x="854" y="411" font-weight="600">Guardrails</text>
      <text x="854" y="424" font-size="9" fill="#6b6b66">安全 · 越权 · 内容过滤</text>

      <rect x="844" y="436" width="172" height="36" fill="#FFFFFF" stroke="#0055FF" stroke-width="0.8"/>
      <text x="854" y="453" font-weight="600">Trajectory Buffer</text>
      <text x="854" y="466" font-size="9" fill="#6b6b66">轨迹采集 · 训练样本源</text>
    </g>

    <!-- Two branch markers inside the box -->
    <line x1="660" y1="495" x2="1016" y2="495" stroke="#0055FF" stroke-dasharray="2 3" stroke-width="0.8"/>
    <text x="660" y="514" font-size="11" font-weight="700" fill="#0055FF" letter-spacing="0.5">两条核心路线 ↓</text>
    <text x="660" y="535" font-size="11" fill="#26215C">A · Agent Loop 的设计 — <tspan font-style="italic" fill="#888780">工程问题</tspan></text>
    <text x="660" y="554" font-size="11" fill="#26215C">B · 模型本身的 Agent 能力 — <tspan font-weight="700" fill="#0055FF">算法问题 → Agentic RL</tspan></text>

    <text x="660" y="612" font-size="11" font-weight="700" fill="#0055FF" letter-spacing="1.5">本课程: 攻 B 路线 · 用 verl 训出更强的 Agent 能力</text>
  </g>

  <!-- "本课程" tag -->
  <rect x="956" y="116" width="84" height="22" rx="2" fill="#0055FF"/>
  <text x="998" y="132" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">本课程</text>

  <!-- arrow 3 -->
  <path d="M1045 398 L1075 398" stroke="#888780" stroke-width="2" marker-end="url(#arr)" fill="none"/>

