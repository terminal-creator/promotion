    <text x="358" y="216" font-size="22" font-weight="600" fill="#1a1a1a" letter-spacing="-0.3">Gateway</text>
    <text x="358" y="237" font-size="11" fill="#6b6b66">编排 · 路由 · 流控 · 灰度</text>

