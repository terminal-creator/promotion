<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F3F2EC"/>
    </linearGradient>

    <marker id="arrow-thin" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-anno" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1480" height="1100" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="58" font-size="28" font-weight="600" fill="#1a1a1a" letter-spacing="-0.4">单张 GPU 显存占用 · 一个 step 的全过程（修正版）</text>
  <text x="60" y="86" font-size="14" fill="#6b6b66" font-style="italic">7B 模型 · 64 卡 colocate · 80GB H100 · TP=8 节点内 / DP=8 节点间 · FSDP 参数 64 路切分</text>
  <line x1="60" y1="100" x2="1420" y2="100" stroke="#d4d2c7" stroke-width="0.8"/>

  <!-- ============================================== -->
  <!-- 关键说明                                         -->
  <!-- ============================================== -->
  <g transform="translate(60, 120)">
    <rect x="0" y="0" width="1360" height="100" rx="6" fill="#FFFFFF" stroke="#E24B4A" stroke-width="0.8"/>
    <text x="22" y="26" font-size="13" font-weight="700" fill="#501313">⚠ 上一版图的错误：折线图开头近似为 0，实际上一开始就有 vLLM 的参数和 KV cache 常驻</text>
    <text x="22" y="48" font-size="12" fill="#444441">vLLM 启动时一次性预分配 KV cache pool（不是 rollout 中逐渐增长），通常占满当前空闲显存的 70–90%</text>
    <text x="22" y="68" font-size="12" fill="#444441">参数 + KV pool 在 rollout 阶段是常驻的"地基"，response 生成只是把 pool 里的 slot 逐个填上，不再额外占显存</text>
    <text x="22" y="88" font-size="12" fill="#444441">所以 rollout 阶段的占用应该是从一开始就高位，平稳维持 · 而不是从 0 缓慢爬升</text>
  </g>

  <!-- ============================================== -->
  <!-- 主图：显存折线 + 数字标注                         -->
  <!-- ============================================== -->
  <g transform="translate(60, 250)">
    <rect x="0" y="0" width="1360" height="500" rx="6" fill="#FFFFFF" stroke="#d4d2c7" stroke-width="0.8"/>

    <text x="22" y="28" font-size="14" font-weight="600" fill="#1a1a1a">单卡显存随时间变化 · 每个阶段标注峰值组成</text>
    <line x1="22" y1="40" x2="500" y2="40" stroke="#d4d2c7" stroke-width="0.6"/>

    <!-- Plot area: x: 80..1320 (width 1240), y: 70..390 (height 320, scale 80GB → 320px → 4px/GB) -->
    <g transform="translate(80, 70)">

      <!-- Y axis -->
      <line x1="0" y1="0" x2="0" y2="320" stroke="#888780" stroke-width="0.8"/>
      <!-- X axis -->
      <line x1="0" y1="320" x2="1240" y2="320" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow-thin)"/>

      <!-- Y labels: 0..80GB, scale 4px/GB -->
      <g font-size="11" fill="#5f5e5a">
        <text x="-8" y="4"   text-anchor="end">80 GB</text>
        <line x1="-4" y1="0" x2="0" y2="0" stroke="#888780"/>
        <line x1="0" y1="0" x2="1240" y2="0" stroke="#A32D2D" stroke-width="0.6" stroke-dasharray="6 4"/>

        <text x="-8" y="84"  text-anchor="end">60</text>
        <line x1="-4" y1="80" x2="0" y2="80" stroke="#888780"/>
        <line x1="0" y1="80" x2="1240" y2="80" stroke="#d4d2c7" stroke-width="0.4" stroke-dasharray="3 3"/>

        <text x="-8" y="164" text-anchor="end">40</text>
        <line x1="-4" y1="160" x2="0" y2="160" stroke="#888780"/>
        <line x1="0" y1="160" x2="1240" y2="160" stroke="#d4d2c7" stroke-width="0.4" stroke-dasharray="3 3"/>

        <text x="-8" y="244" text-anchor="end">20</text>
        <line x1="-4" y1="240" x2="0" y2="240" stroke="#888780"/>
        <line x1="0" y1="240" x2="1240" y2="240" stroke="#d4d2c7" stroke-width="0.4" stroke-dasharray="3 3"/>

        <text x="-8" y="324" text-anchor="end">0</text>
      </g>

      <!-- Phase background shading -->
      <!-- Phase 1: rollout x=0..420 -->
      <rect x="0"    y="0" width="420" height="320" fill="#FAECE7" opacity="0.20"/>
      <!-- Reshard: x=420..500 -->
      <rect x="420"  y="0" width="80"  height="320" fill="#EEEDFE" opacity="0.40"/>
      <!-- Phase 2: ref+reward x=500..720 -->
      <rect x="500"  y="0" width="220" height="320" fill="#E6F1FB" opacity="0.20"/>
      <!-- Phase 3: training x=720..1240 -->
      <rect x="720"  y="0" width="520" height="320" fill="#FAEEDA" opacity="0.20"/>

      <!-- Phase labels -->
      <g font-size="12" text-anchor="middle">
        <text x="210" y="-12" font-weight="700" fill="#993C1D">Rollout (vLLM)</text>
        <text x="210" y="-30" font-size="10.5" fill="#993C1D">≈ 60% step time</text>

        <text x="460" y="-12" font-weight="700" fill="#534AB7">reshard</text>
        <text x="460" y="-30" font-size="10.5" fill="#534AB7">1–3s</text>

        <text x="610" y="-12" font-weight="700" fill="#185FA5">Ref + Reward</text>
        <text x="610" y="-30" font-size="10.5" fill="#185FA5">forward only</text>

        <text x="980" y="-12" font-weight="700" fill="#854F0B">Actor Training (FSDP)</text>
        <text x="980" y="-30" font-size="10.5" fill="#854F0B">≈ 35% step time</text>
      </g>

      <!-- Phase boundary lines -->
      <line x1="420" y1="0" x2="420" y2="320" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
      <line x1="500" y1="0" x2="500" y2="320" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
      <line x1="720" y1="0" x2="720" y2="320" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>

      <!-- ============================================== -->
      <!-- PHASE 1: Rollout · 显存从 t=0 就高位                -->
      <!-- vLLM TP=8 节点内: params shard 14/8 = 1.75GB         -->
      <!-- vLLM 预分配 KV pool: ~50GB（占满当前空闲）          -->
      <!-- Total ≈ 52GB · 从一开始就维持，不变化              -->
      <!-- 4 px/GB: 52GB = 208px, top y = 320-208 = 112        -->
      <!-- ============================================== -->

      <!-- vLLM params shard (bottom band) 1.75GB = 7px -->
      <rect x="0" y="313" width="420" height="7" fill="#F0997B" stroke="#993C1D" stroke-width="0.5"/>

      <!-- vLLM KV cache pool (pre-allocated, constant) ~50GB = 200px -->
      <rect x="0" y="113" width="420" height="200" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>

      <!-- Inside KV pool: faint indicator that responses fill slots over time (no extra memory) -->
      <g opacity="0.35">
        <rect x="20"  y="240" width="20" height="73" fill="#D85A30"/>
        <rect x="50"  y="220" width="20" height="93" fill="#D85A30"/>
        <rect x="80"  y="180" width="20" height="133" fill="#D85A30"/>
        <rect x="110" y="160" width="20" height="153" fill="#D85A30"/>
        <rect x="140" y="200" width="20" height="113" fill="#D85A30"/>
        <rect x="170" y="180" width="20" height="133" fill="#D85A30"/>
        <rect x="200" y="150" width="20" height="163" fill="#D85A30"/>
        <rect x="230" y="170" width="20" height="143" fill="#D85A30"/>
        <rect x="260" y="190" width="20" height="123" fill="#D85A30"/>
        <rect x="290" y="160" width="20" height="153" fill="#D85A30"/>
        <rect x="320" y="180" width="20" height="133" fill="#D85A30"/>
        <rect x="350" y="200" width="20" height="113" fill="#D85A30"/>
        <rect x="380" y="220" width="20" height="93" fill="#D85A30"/>
      </g>

      <!-- Phase 1 numeric annotation -->
      <g transform="translate(210, 130)">
        <rect x="-90" y="-22" width="180" height="44" rx="4" fill="#FFFFFF" stroke="#D85A30" stroke-width="0.8" opacity="0.95"/>
        <text x="0" y="-6" font-size="11" font-weight="700" fill="#4A1B0C" text-anchor="middle">vLLM 常驻 ≈ 52 GB</text>
        <text x="0" y="10" font-size="10.5" fill="#993C1D" text-anchor="middle">参数 1.75 + KV pool 50</text>
      </g>

      <!-- ============================================== -->
      <!-- RESHARD: x=420..500                              -->
      <!-- vLLM unload (KV pool 释放、参数释放)             -->
      <!-- FSDP 参数加载: 14GB / 64 ≈ 0.22GB shard          -->
      <!-- 但 reshard 中间瞬间显存会有峰值（new + old 共存） -->
      <!-- ============================================== -->

      <!-- 转移过渡 - vLLM KV 在 reshard 中段释放 -->
      <path d="M 420 113 L 460 220 L 460 313 L 420 313 Z" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.4" opacity="0.6"/>
      <!-- vLLM params 也释放 -->
      <path d="M 420 313 L 440 320 L 420 320 Z" fill="#F0997B" stroke="#993C1D" stroke-width="0.3"/>
      <!-- FSDP 参数加载 (右半段) -->
      <path d="M 460 320 L 460 318 L 500 316 L 500 320 Z" fill="#F0997B" stroke="#993C1D" stroke-width="0.5"/>

      <!-- Reshard annotation -->
      <g transform="translate(460, 270)">
        <rect x="-50" y="0" width="100" height="34" rx="4" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.8" opacity="0.95"/>
        <text x="0" y="14" font-size="10.5" font-weight="700" fill="#26215C" text-anchor="middle">权重换布局</text>
        <text x="0" y="28" font-size="10" fill="#534AB7" text-anchor="middle">vLLM 释放 / FSDP 加载</text>
      </g>

      <!-- ============================================== -->
      <!-- PHASE 2: Ref + Reward · 显存中等                  -->
      <!-- FSDP actor params: 14/64 ≈ 0.22GB (基本看不见)   -->
      <!-- Ref params loaded: 14/64 ≈ 0.22GB shard          -->
      <!-- Reward params loaded: 14/64 ≈ 0.22GB shard       -->
      <!-- BUT: 实际工程中 ref/reward 经常用更小切分或者整体加载 -->
      <!-- 简化为：每个组件展示 ~5GB（代表 working set）     -->
      <!-- Activations from forward: ~3GB                    -->
      <!-- Total ≈ 12GB · 从 t=420 起，到 720 结束          -->
      <!-- 4 px/GB: 12GB = 48px, top y = 320-48 = 272        -->
      <!-- ============================================== -->

      <!-- FSDP actor params (持续) -->
      <rect x="500" y="316" width="220" height="4" fill="#F0997B" stroke="#993C1D" stroke-width="0.4"/>
      <!-- Ref params (loaded for forward) -->
      <rect x="500" y="296" width="220" height="20" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
      <!-- Reward params -->
      <rect x="500" y="276" width="220" height="20" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
      <!-- Activations from forward -->
      <rect x="500" y="260" width="220" height="16" fill="#F1EFE8" stroke="#888780" stroke-width="0.4"/>

      <!-- Phase 2 annotation -->
      <g transform="translate(610, 220)">
        <rect x="-90" y="-22" width="180" height="44" rx="4" fill="#FFFFFF" stroke="#378ADD" stroke-width="0.8" opacity="0.95"/>
        <text x="0" y="-6" font-size="11" font-weight="700" fill="#042C53" text-anchor="middle">FSDP 加载 ≈ 15 GB</text>
        <text x="0" y="10" font-size="10.5" fill="#185FA5" text-anchor="middle">actor + ref + reward + 激活</text>
      </g>

      <!-- ============================================== -->
      <!-- PHASE 3: Actor Training · 显存峰值                -->
      <!-- 7B FP16 参数 14GB / 64 = 0.22GB shard            -->
      <!-- 梯度 14GB / 64 = 0.22GB shard                    -->
      <!-- Adam 优化器 (FP32 momentum + variance) 56GB / 64 ≈ 0.88GB -->
      <!-- BUT: FSDP all-gather working buffer 加载完整层  -->
      <!-- BUT: 激活值 (BF16 long sequence) 可达 30GB!     -->
      <!-- 实际峰值大约 50GB                                 -->
      <!-- ref / reward 已 unload                           -->
      <!-- 4 px/GB: 50GB = 200px, top y = 320-200 = 120     -->
      <!-- ============================================== -->

      <!-- params shard (持续) -->
      <rect x="720" y="312" width="520" height="8" fill="#F0997B" stroke="#993C1D" stroke-width="0.5"/>
      <!-- 梯度 shard (从 fwd 后开始累积) -->
      <path d="M 720 312 L 880 312 L 1180 304 L 1240 304 L 1240 312 Z" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.5"/>
      <!-- 优化器状态 (常驻) -->
      <rect x="720" y="280" width="520" height="24" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
      <!-- FSDP working buffer (all-gather full layer transient) -->
      <path d="M 720 280 L 760 264 L 840 256 L 920 252 L 1000 252 L 1080 256 L 1160 268 L 1240 280 Z" fill="#F0997B" stroke="#993C1D" stroke-width="0.4" opacity="0.4"/>
      <!-- 激活值（峰值在 bwd 开始时） -->
      <path d="M 720 252 Q 800 200 880 160 Q 960 132 1040 124 Q 1120 132 1200 180 L 1240 252 Z" fill="#F1EFE8" stroke="#888780" stroke-width="0.6"/>

      <!-- Phase 3 peak annotation -->
      <g transform="translate(1040, 80)">
        <rect x="-100" y="-22" width="200" height="44" rx="4" fill="#FFFFFF" stroke="#BA7517" stroke-width="0.8" opacity="0.95"/>
        <text x="0" y="-6" font-size="11" font-weight="700" fill="#412402" text-anchor="middle">峰值 ≈ 60 GB</text>
        <text x="0" y="10" font-size="10.5" fill="#854F0B" text-anchor="middle">激活 + 优化器 + 梯度 + 参数</text>
      </g>

      <!-- Annotation: leader from peak label down to peak point -->
      <line x1="1040" y1="102" x2="1040" y2="124" stroke="#BA7517" stroke-width="0.6" stroke-dasharray="3 2"/>

      <!-- Annotation arrow: vLLM KV pool 提示 -->
      <line x1="210" y1="155" x2="210" y2="200" stroke="#993C1D" stroke-width="0.6" stroke-dasharray="3 2"/>

      <!-- 80GB cap label -->
      <text x="1244" y="4" font-size="11" fill="#A32D2D" font-weight="600">80 GB cap</text>

    </g>

    <!-- ============= LEGEND ============= -->
    <g transform="translate(80, 430)" font-size="11">
      <text x="0" y="0" font-size="12" font-weight="600" fill="#1a1a1a">图例</text>

      <g transform="translate(0, 14)">
        <rect x="0" y="0" width="14" height="10" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
        <text x="20" y="9" fill="#444441">vLLM KV cache pool</text>

        <rect x="180" y="0" width="14" height="10" fill="#F0997B" stroke="#993C1D" stroke-width="0.5"/>
        <text x="200" y="9" fill="#444441">Actor 参数 shard</text>

        <rect x="340" y="0" width="14" height="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
        <text x="360" y="9" fill="#444441">优化器状态 (FP32)</text>

        <rect x="500" y="0" width="14" height="10" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.5"/>
        <text x="520" y="9" fill="#444441">梯度</text>

        <rect x="600" y="0" width="14" height="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
        <text x="620" y="9" fill="#444441">Ref 参数 (forward only)</text>

        <rect x="800" y="0" width="14" height="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
        <text x="820" y="9" fill="#444441">Reward 参数 (forward only)</text>

        <rect x="1020" y="0" width="14" height="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
        <text x="1040" y="9" fill="#444441">激活值</text>
      </g>
    </g>
  </g>

  <!-- ============================================== -->
  <!-- 关键观察                                         -->
  <!-- ============================================== -->
  <g transform="translate(60, 780)">
    <rect x="0" y="0" width="1360" height="280" rx="6" fill="#FFFFFF" stroke="#d4d2c7" stroke-width="0.8"/>
    <text x="22" y="28" font-size="14" font-weight="600" fill="#1a1a1a">从这张图能读出三件事</text>
    <line x1="22" y1="40" x2="380" y2="40" stroke="#d4d2c7" stroke-width="0.6"/>

    <g transform="translate(22, 60)" font-size="12">

      <text x="0" y="0" font-size="13" font-weight="700" fill="#993C1D">① rollout 阶段从一开始就是高位</text>
      <text x="0" y="22" fill="#444441">vLLM 是"先吃干净再吐出来"——启动时一次性预分配 KV pool（默认占当前空闲显存的 90%）</text>
      <text x="0" y="40" fill="#444441">所以 t=0 起占用就 ≈ 52GB · response 生成只是把 pool 里的 slot 逐个填满（图中浅色矩形示意），不再额外占显存</text>
      <text x="0" y="58" fill="#5f5e5a" font-style="italic">这也是为什么 vLLM 比 transformers.generate 快 10x · KV 不需要在每次 generate 时反复分配释放</text>

      <text x="0" y="92" font-size="13" font-weight="700" fill="#534AB7">② reshard 是真实的"清空-重建"过程</text>
      <text x="0" y="114" fill="#444441">vLLM 必须先把 KV pool 全部释放（否则没空间装 FSDP 参数）· 优化器状态从 CPU offload 加载回 GPU</text>
      <text x="0" y="132" fill="#444441">这个过程有几秒延迟 · 如果做得不好（比如双副本短暂共存）会触发 OOM · 这就是 sharding_manager 要小心处理的地方</text>

      <text x="0" y="166" font-size="13" font-weight="700" fill="#854F0B">③ training 的峰值不在参数也不在优化器，在激活值</text>
      <text x="0" y="188" fill="#444441">7B 模型 64 路 FSDP 切分后，参数+梯度+优化器三者加起来 shard 后 ≈ 14GB（图中下半部分）</text>
      <text x="0" y="206" fill="#444441">真正的峰值来自激活值——长 response 的 activation 可达 30GB · 在 bwd 开始那一刻最高（图中灰色区域峰值）</text>
      <text x="0" y="224" fill="#5f5e5a" font-style="italic">所以 RL 训练里降低显存最有效的不是模型切得更细，而是 activation checkpointing（用算力换显存）</text>
    </g>
  </g>

</svg>
