<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F3F2EC"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0055FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1480" height="1100" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="58" font-size="28" font-weight="600" fill="#1a1a1a" letter-spacing="-0.4">Agent Loop 时序 · 多轮 · tool call · advantage 只回最终 token</text>
  <text x="60" y="86" font-size="14" fill="#6b6b66" font-style="italic">RL 训练里 rollout 不再是"采一段 response" · 是一个完整对话循环 · verl 把它塞进 worker 内部</text>
  <line x1="60" y1="100" x2="1420" y2="100" stroke="#d4d2c7" stroke-width="0.8"/>

  <!-- Lanes header -->
  <g font-size="12" font-weight="700" letter-spacing="1.8">
    <text x="100"  y="148" fill="#888780">USER</text>
    <text x="380"  y="148" fill="#0055FF">ASSISTANT (POLICY)</text>
    <text x="780"  y="148" fill="#0F6E56">TOOL FACTORY</text>
    <text x="1110" y="148" fill="#993C1D">REWARD / ADV</text>
  </g>

  <!-- Lane separators (vertical dashed) -->
  <line x1="350" y1="160" x2="350" y2="970" stroke="#D4D2C7" stroke-width="0.8" stroke-dasharray="4 4"/>
  <line x1="750" y1="160" x2="750" y2="970" stroke="#D4D2C7" stroke-width="0.8" stroke-dasharray="4 4"/>
  <line x1="1080" y1="160" x2="1080" y2="970" stroke="#D4D2C7" stroke-width="0.8" stroke-dasharray="4 4"/>

  <!-- ====== TURN 0 · user prompt ====== -->
  <g>
    <rect x="80" y="170" width="240" height="74" rx="6" fill="#FFFFFF" stroke="#A8A6A0" stroke-width="1.2"/>
    <text x="92" y="194" font-size="11" font-weight="600" fill="#888780" letter-spacing="1.5">TURN 0 · PROMPT</text>
    <text x="92" y="218" font-size="13" fill="#1a1a1a">"sin(2π/3) + cos(π/4) =?</text>
    <text x="92" y="234" font-size="13" fill="#1a1a1a">用 calculator"</text>
    <line x1="320" y1="208" x2="380" y2="208" stroke="#888780" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- ====== TURN 1 · model speak + tool call ====== -->
  <g>
    <rect x="380" y="170" width="340" height="120" rx="6" fill="#FFFFFF" stroke="#0055FF" stroke-width="1.4"/>
    <text x="394" y="194" font-size="11" font-weight="700" fill="#0055FF" letter-spacing="1.5">TURN 1 · ROLLOUT (gen by actor)</text>
    <text x="394" y="220" font-size="13" fill="#1a1a1a">"我先算第一项。"</text>
    <rect x="394" y="232" width="312" height="48" rx="3" fill="#F0F6FF" stroke="#0055FF" stroke-width="0.8"/>
    <text x="404" y="252" font-size="11" font-weight="600" fill="#0055FF" letter-spacing="1">▸ TOOL CALL</text>
    <text x="404" y="270" font-size="12" fill="#0055FF" font-family="ui-monospace, Menlo, monospace">calculator(sin(2*pi/3))</text>
    <line x1="720" y1="256" x2="780" y2="256" stroke="#0F6E56" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- ====== TURN 1 · tool result ====== -->
  <g>
    <rect x="780" y="218" width="270" height="74" rx="6" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1.2"/>
    <text x="794" y="240" font-size="11" font-weight="700" fill="#0F6E56" letter-spacing="1.5">TURN 1 · TOOL RESPONSE</text>
    <text x="794" y="266" font-size="14" font-weight="600" fill="#1a1a1a" font-family="ui-monospace, Menlo, monospace">0.8660254038</text>
    <text x="794" y="282" font-size="11" fill="#5f5e5a">外部沙箱 / Python eval / 业务 API</text>
    <path d="M780 274 L 600 282 L 380 310" fill="none" stroke="#888780" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  </g>

  <!-- ====== TURN 2 · model second tool call ====== -->
  <g>
    <rect x="380" y="320" width="340" height="120" rx="6" fill="#FFFFFF" stroke="#0055FF" stroke-width="1.4"/>
    <text x="394" y="344" font-size="11" font-weight="700" fill="#0055FF" letter-spacing="1.5">TURN 2 · ROLLOUT (continue)</text>
    <text x="394" y="370" font-size="13" fill="#1a1a1a">"再算第二项。"</text>
    <rect x="394" y="382" width="312" height="48" rx="3" fill="#F0F6FF" stroke="#0055FF" stroke-width="0.8"/>
    <text x="404" y="402" font-size="11" font-weight="600" fill="#0055FF" letter-spacing="1">▸ TOOL CALL</text>
    <text x="404" y="420" font-size="12" fill="#0055FF" font-family="ui-monospace, Menlo, monospace">calculator(cos(pi/4))</text>
    <line x1="720" y1="406" x2="780" y2="406" stroke="#0F6E56" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- ====== TURN 2 · tool result ====== -->
  <g>
    <rect x="780" y="368" width="270" height="74" rx="6" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1.2"/>
    <text x="794" y="390" font-size="11" font-weight="700" fill="#0F6E56" letter-spacing="1.5">TURN 2 · TOOL RESPONSE</text>
    <text x="794" y="416" font-size="14" font-weight="600" fill="#1a1a1a" font-family="ui-monospace, Menlo, monospace">0.7071067812</text>
    <text x="794" y="432" font-size="11" fill="#5f5e5a">第二轮回调 · 同 sandbox</text>
    <path d="M780 424 L 600 432 L 380 460" fill="none" stroke="#888780" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  </g>

  <!-- ====== TURN 3 · final answer ====== -->
  <g>
    <rect x="380" y="470" width="340" height="100" rx="6" fill="#FFFFFF" stroke="#0055FF" stroke-width="1.8"/>
    <text x="394" y="494" font-size="11" font-weight="700" fill="#0055FF" letter-spacing="1.5">TURN 3 · ROLLOUT · FINAL</text>
    <text x="394" y="520" font-size="13" fill="#1a1a1a">"0.866 + 0.707 = 1.573"</text>
    <text x="394" y="544" font-size="13" font-weight="700" fill="#0055FF" font-family="ui-monospace, Menlo, monospace">###1.573</text>
    <text x="394" y="562" font-size="11" fill="#5f5e5a">EOS · 退出 agent loop</text>
    <line x1="720" y1="535" x2="1110" y2="535" stroke="#993C1D" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- ====== Reward / Advantage ====== -->
  <g>
    <rect x="1110" y="490" width="290" height="90" rx="6" fill="#FFFFFF" stroke="#993C1D" stroke-width="1.4"/>
    <text x="1124" y="514" font-size="11" font-weight="700" fill="#993C1D" letter-spacing="1.5">REWARD · VERIFIABLE</text>
    <text x="1124" y="538" font-size="13" fill="#1a1a1a">parse("###1.573") · gold = 1.573</text>
    <text x="1124" y="558" font-size="13" font-weight="700" fill="#993C1D">r = 1.0  (✓)</text>
    <text x="1124" y="574" font-size="11" fill="#5f5e5a">外部 verifier · 不调 RM</text>
  </g>

  <!-- ====== Advantage attribution ====== -->
  <rect x="60" y="610" width="1340" height="200" rx="8" fill="#FFFFFF" stroke="#0055FF" stroke-width="1.4"/>
  <text x="80" y="650" font-size="12" font-weight="700" fill="#0055FF" letter-spacing="1.8">▸ KEY · ADVANTAGE 怎么回传</text>
  <text x="80" y="688" font-size="18" font-weight="600" fill="#1a1a1a">所有 turn 的 assistant token 共享同一个最终 reward · 但只在<tspan fill="#0055FF" font-weight="700"> assistant 生成的 token 位置 </tspan>反传</text>

  <!-- Token-level mask visualization -->
  <g font-size="11" font-family="ui-monospace, Menlo, monospace">
    <text x="80" y="724" fill="#888780" letter-spacing="0.5">tokens:</text>
    <g transform="translate(150 712)">
      <rect x="0"   y="0" width="60"  height="20" fill="#F4F2EC" stroke="#A8A6A0"/>
      <rect x="62"  y="0" width="120" height="20" fill="#E6F0FF" stroke="#0055FF"/>
      <rect x="184" y="0" width="100" height="20" fill="#E6F2EC" stroke="#0F6E56"/>
      <rect x="286" y="0" width="120" height="20" fill="#E6F0FF" stroke="#0055FF"/>
      <rect x="408" y="0" width="100" height="20" fill="#E6F2EC" stroke="#0F6E56"/>
      <rect x="510" y="0" width="160" height="20" fill="#E6F0FF" stroke="#0055FF"/>

      <text x="30"  y="14" fill="#888780" text-anchor="middle">prompt</text>
      <text x="122" y="14" fill="#0055FF" text-anchor="middle">turn1 · gen</text>
      <text x="234" y="14" fill="#0F6E56" text-anchor="middle">turn1 · tool</text>
      <text x="346" y="14" fill="#0055FF" text-anchor="middle">turn2 · gen</text>
      <text x="458" y="14" fill="#0F6E56" text-anchor="middle">turn2 · tool</text>
      <text x="590" y="14" fill="#0055FF" text-anchor="middle">turn3 · gen + ###</text>
    </g>
    <text x="80" y="754" fill="#888780" letter-spacing="0.5">mask:</text>
    <g transform="translate(150 742)" font-size="11">
      <text x="30"  y="14" fill="#888780" text-anchor="middle">0</text>
      <text x="122" y="14" fill="#0055FF" font-weight="700" text-anchor="middle">1</text>
      <text x="234" y="14" fill="#888780" text-anchor="middle">0</text>
      <text x="346" y="14" fill="#0055FF" font-weight="700" text-anchor="middle">1</text>
      <text x="458" y="14" fill="#888780" text-anchor="middle">0</text>
      <text x="590" y="14" fill="#0055FF" font-weight="700" text-anchor="middle">1</text>
    </g>
    <text x="80" y="784" fill="#888780" letter-spacing="0.5">adv:</text>
    <text x="150" y="784" fill="#993C1D" font-weight="700">0  ·  +A  ·  0  ·  +A  ·  0  ·  +A    （A 来自上面 reward = 1.0 标准化）</text>
  </g>

  <!-- ====== Bottom · 实现位置 ====== -->
  <text x="60" y="858" font-size="14" font-weight="600" fill="#1a1a1a" letter-spacing="-0.2">关键代码位置（Ch 6.3 改点）</text>
  <line x1="60" y1="868" x2="1420" y2="868" stroke="#D4D2C7" stroke-width="0.8"/>
  <g font-size="12" font-family="ui-monospace, Menlo, monospace">
    <text x="60"  y="894" fill="#0055FF">verl/experimental/agent_loop/agent_loop.py</text>
    <text x="60"  y="912" fill="#5f5e5a">    AgentLoop.run() — 主循环 · 多轮调度</text>
    <text x="60"  y="934" fill="#0055FF">verl/workers/rollout/sglang_rollout/</text>
    <text x="60"  y="952" fill="#5f5e5a">    SGLangRollout — 多轮 KV cache 复用</text>

    <text x="780" y="894" fill="#0055FF">verl/workers/reward_manager/batch.py</text>
    <text x="780" y="912" fill="#5f5e5a">    并发调用外部 verifier / sandbox</text>
    <text x="780" y="934" fill="#0055FF">verl/utils/dataset/multi_turn.py</text>
    <text x="780" y="952" fill="#5f5e5a">    response_mask · 只在 gen token 上回传 advantage</text>
  </g>

  <text x="60" y="1010" font-size="11" font-weight="600" fill="#888780" letter-spacing="2">VERL · AGENT LOOP · MULTI-TURN ROLLOUT</text>
  <text x="1420" y="1010" font-size="11" font-weight="600" fill="#888780" letter-spacing="2" text-anchor="end">CH 6.3 · ROLLOUT EXTENSION</text>
</svg>
