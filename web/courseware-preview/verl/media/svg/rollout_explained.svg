<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1020" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F3F2EC"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1480" height="1020" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="58" font-size="28" font-weight="600" fill="#1a1a1a" letter-spacing="-0.4">Rollout · 用当前 policy 生成响应</text>
  <text x="60" y="86" font-size="14" fill="#6b6b66" font-style="italic">RL 训练里最长的一段（占 step ≈ 40%）· 显存峰值不在权重，<tspan font-weight="700" fill="#993C1D" font-style="normal">在 KV cache</tspan></text>
  <line x1="60" y1="100" x2="1420" y2="100" stroke="#d4d2c7" stroke-width="0.8"/>

  <!-- ============ ① 生成过程 ============ -->
  <text x="60" y="148" font-size="14" font-weight="700" fill="#1a1a1a">① 自回归生成 · 一个 token 一个 token 蹦</text>

  <g font-size="11" font-family="ui-monospace, Menlo, monospace">
    <!-- prompt boxes -->
    <g>
      <rect x="60"  y="180" width="42" height="32" rx="2" fill="#F4F2EC" stroke="#A8A6A0"/>
      <text x="81"  y="201" text-anchor="middle" fill="#444441">小</text>
      <rect x="106" y="180" width="42" height="32" rx="2" fill="#F4F2EC" stroke="#A8A6A0"/>
      <text x="127" y="201" text-anchor="middle" fill="#444441">明</text>
      <rect x="152" y="180" width="42" height="32" rx="2" fill="#F4F2EC" stroke="#A8A6A0"/>
      <text x="173" y="201" text-anchor="middle" fill="#444441">买</text>
      <rect x="198" y="180" width="42" height="32" rx="2" fill="#F4F2EC" stroke="#A8A6A0"/>
      <text x="219" y="201" text-anchor="middle" fill="#444441">了</text>
      <rect x="244" y="180" width="42" height="32" rx="2" fill="#F4F2EC" stroke="#A8A6A0"/>
      <text x="265" y="201" text-anchor="middle" fill="#444441">3</text>
      <rect x="290" y="180" width="42" height="32" rx="2" fill="#F4F2EC" stroke="#A8A6A0"/>
      <text x="311" y="201" text-anchor="middle" fill="#444441">支</text>

      <text x="350" y="200" font-size="13" fill="#888780">prompt · 6 tok</text>
    </g>

    <!-- generated tokens (flowing) -->
    <g>
      <rect x="490" y="180" width="42" height="32" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="511" y="201" text-anchor="middle" fill="#0055FF">铅</text>
      <rect x="536" y="180" width="42" height="32" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="557" y="201" text-anchor="middle" fill="#0055FF">笔</text>
      <rect x="582" y="180" width="42" height="32" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="603" y="201" text-anchor="middle" fill="#0055FF">,</text>
      <rect x="628" y="180" width="42" height="32" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="649" y="201" text-anchor="middle" fill="#0055FF">3</text>
      <rect x="674" y="180" width="42" height="32" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="695" y="201" text-anchor="middle" fill="#0055FF">×</text>
      <rect x="720" y="180" width="42" height="32" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="741" y="201" text-anchor="middle" fill="#0055FF">2</text>
      <rect x="766" y="180" width="42" height="32" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="787" y="201" text-anchor="middle" fill="#0055FF">=</text>
      <rect x="812" y="180" width="42" height="32" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="833" y="201" text-anchor="middle" fill="#0055FF">6</text>
      <text x="868" y="200" font-size="13" fill="#0055FF" font-family="-apple-system">··· 1500 tok ···</text>
      <rect x="1010" y="180" width="42" height="32" rx="2" fill="#FFF7EC" stroke="#993C1D"/>
      <text x="1031" y="201" text-anchor="middle" fill="#993C1D">EOS</text>
      <text x="1075" y="200" font-size="13" fill="#993C1D" font-family="-apple-system">response 结束</text>
    </g>
  </g>

  <text x="60" y="244" font-size="13" fill="#5f5e5a">每生成一个 token 都要做一次 forward · 但 attention 不重算前面的 K/V → 进 <tspan font-weight="700" fill="#993C1D">KV cache</tspan></text>

  <!-- ============ ② KV cache 显存账 ============ -->
  <text x="60" y="298" font-size="14" font-weight="700" fill="#1a1a1a">② 显存账本 · 7B 模型 · response 1500 tok · batch = 64</text>

  <g>
    <!-- weight bar -->
    <text x="60" y="340" font-size="12" fill="#444441">权重 (BF16)</text>
    <rect x="220" y="324" width="180" height="22" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
    <text x="310" y="340" text-anchor="middle" font-size="11" font-weight="600" fill="#0055FF">14 GB</text>
    <text x="420" y="340" font-size="11" fill="#888780">· 模型参数 · 不变</text>

    <!-- activation -->
    <text x="60" y="380" font-size="12" fill="#444441">activation</text>
    <rect x="220" y="364" width="60" height="22" rx="2" fill="#F4F2EC" stroke="#A8A6A0"/>
    <text x="250" y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#444441">3 GB</text>
    <text x="300" y="380" font-size="11" fill="#888780">· 推理时较小（无 backward）</text>

    <!-- KV cache - HUGE -->
    <text x="60" y="420" font-size="12" font-weight="700" fill="#993C1D">KV cache · ★</text>
    <rect x="220" y="404" width="900" height="22" rx="2" fill="#FFF7EC" stroke="#993C1D" stroke-width="1.4"/>
    <text x="670" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#993C1D">~ 50 GB · 显存峰值大头</text>
    <text x="1140" y="420" font-size="11" fill="#993C1D" font-weight="600">← 真正吃显存的</text>

    <!-- formula -->
    <rect x="60" y="450" width="1340" height="42" rx="3" fill="#FFFFFF" stroke="#D4D2C7"/>
    <text x="80" y="476" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#444441">
      KV_size  =  2(K+V)  ×  L (1500)  ×  layers (32)  ×  hidden (4096)  ×  batch (64)  ×  bytes (2 BF16)  ≈  50 GB
    </text>
  </g>

  <!-- ============ ③ vLLM PagedAttention ============ -->
  <text x="60" y="540" font-size="14" font-weight="700" fill="#1a1a1a">③ vLLM 用<tspan fill="#0055FF" font-weight="700"> PagedAttention </tspan>把 KV cache 切块·像 OS 的虚拟内存</text>

  <g transform="translate(60 560)">
    <!-- pages -->
    <g font-family="ui-monospace, Menlo, monospace" font-size="10">
      <rect x="0"   y="0" width="60" height="38" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="30" y="22" text-anchor="middle" fill="#0055FF" font-weight="600">P00</text>
      <rect x="68"  y="0" width="60" height="38" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="98" y="22" text-anchor="middle" fill="#0055FF" font-weight="600">P01</text>
      <rect x="136" y="0" width="60" height="38" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="166" y="22" text-anchor="middle" fill="#0055FF" font-weight="600">P02</text>
      <rect x="204" y="0" width="60" height="38" rx="2" fill="#F4F2EC" stroke="#A8A6A0"/>
      <text x="234" y="22" text-anchor="middle" fill="#888780">free</text>
      <rect x="272" y="0" width="60" height="38" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="302" y="22" text-anchor="middle" fill="#0055FF" font-weight="600">P03</text>
      <rect x="340" y="0" width="60" height="38" rx="2" fill="#FFF7EC" stroke="#993C1D"/>
      <text x="370" y="22" text-anchor="middle" fill="#993C1D" font-weight="600">P04</text>
      <rect x="408" y="0" width="60" height="38" rx="2" fill="#F4F2EC" stroke="#A8A6A0"/>
      <text x="438" y="22" text-anchor="middle" fill="#888780">free</text>
      <rect x="476" y="0" width="60" height="38" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="506" y="22" text-anchor="middle" fill="#0055FF" font-weight="600">P05</text>
      <rect x="544" y="0" width="60" height="38" rx="2" fill="#FFF7EC" stroke="#993C1D"/>
      <text x="574" y="22" text-anchor="middle" fill="#993C1D" font-weight="600">P06</text>
      <rect x="612" y="0" width="60" height="38" rx="2" fill="#F4F2EC" stroke="#A8A6A0"/>
      <text x="642" y="22" text-anchor="middle" fill="#888780">free</text>
      <rect x="680" y="0" width="60" height="38" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="710" y="22" text-anchor="middle" fill="#0055FF" font-weight="600">P07</text>
      <rect x="748" y="0" width="60" height="38" rx="2" fill="#F0F6FF" stroke="#0055FF"/>
      <text x="778" y="22" text-anchor="middle" fill="#0055FF" font-weight="600">P08</text>
      <rect x="816" y="0" width="60" height="38" rx="2" fill="#FFF7EC" stroke="#993C1D"/>
      <text x="846" y="22" text-anchor="middle" fill="#993C1D" font-weight="600">P09</text>
    </g>
    <text x="900" y="24" font-size="13" font-weight="600" fill="#0055FF">+ PagedAttention</text>
    <text x="900" y="42" font-size="11" fill="#5f5e5a">不连续也能跑 attention · KV 利用率 ≈ 95%+</text>
  </g>

  <g transform="translate(60 615)">
    <text x="0" y="14" font-size="12" font-weight="700" fill="#888780">SEQ A</text>
    <text x="80" y="14" font-size="12" fill="#444441">[ P00, P01, P02, P03, P05, P07, P08 ]</text>
    <text x="0" y="36" font-size="12" font-weight="700" fill="#993C1D">SEQ B</text>
    <text x="80" y="36" font-size="12" fill="#444441">[ P04, P06, P09 ]</text>
  </g>

  <!-- ============ ④ verl 里的 rollout ============ -->
  <text x="60" y="708" font-size="14" font-weight="700" fill="#1a1a1a">④ 在 verl 里 · rollout 是一次 RPC</text>

  <rect x="60" y="724" width="640" height="200" rx="8" fill="#FFFFFF" stroke="#0055FF" stroke-width="1.4"/>
  <text x="80" y="752" font-size="11" font-weight="700" fill="#0055FF" letter-spacing="1.5">DRIVER · single line</text>
  <g font-family="ui-monospace, Menlo, monospace" font-size="13">
    <text x="80" y="784" fill="#0055FF">out = actor_rollout_wg.generate_sequences(batch)</text>
  </g>
  <text x="80" y="816" font-size="12" fill="#444441">·  框架自动按 DP 切 batch · 每张 GPU 上的 vLLM 实例并行采样</text>
  <text x="80" y="838" font-size="12" fill="#444441">·  返回 DataProto · 含 input_ids / responses / old_log_probs ...</text>
  <text x="80" y="860" font-size="12" fill="#444441">·  可选 backend: vLLM (默认) / SGLang (多轮 / tool) / HF (debug)</text>
  <text x="80" y="894" font-size="11" fill="#888780" font-style="italic">→ 详见 Ch3 Layer 4 · Dispatch / Execute / Collect</text>

  <!-- Insight -->
  <rect x="720" y="724" width="680" height="200" rx="8" fill="#FFFFFF" stroke="#993C1D" stroke-width="1.4"/>
  <text x="740" y="752" font-size="11" font-weight="700" fill="#993C1D" letter-spacing="1.5">▸ 关键参数（决定显存）</text>
  <g font-size="13" font-family="ui-monospace, Menlo, monospace">
    <text x="740" y="788" fill="#993C1D">rollout.tensor_model_parallel_size = 2</text>
    <text x="740" y="814" fill="#5f5e5a" font-family="-apple-system" font-size="12">    vLLM 的 TP · 越小 KV cache 池越大</text>
    <text x="740" y="840" fill="#993C1D">rollout.gpu_memory_utilization = 0.5</text>
    <text x="740" y="866" fill="#5f5e5a" font-family="-apple-system" font-size="12">    单卡留多少给 vLLM · colocate 时要给 actor 训练留余地</text>
    <text x="740" y="892" fill="#993C1D">rollout.max_num_seqs = 1024</text>
    <text x="740" y="916" fill="#5f5e5a" font-family="-apple-system" font-size="12">    并发上限 · 配合 KV cache 大小</text>
  </g>

  <text x="60" y="998" font-size="11" font-weight="600" fill="#888780" letter-spacing="2">VERL · CH 2.3 · ROLLOUT · vLLM / SGLang / HF</text>
</svg>
