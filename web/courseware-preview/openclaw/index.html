/* === components/primitives.jsx === */
/* components/primitives.jsx
   Shared React primitives used by every module.
   Exports to window so other Babel scripts can use them.
*/

const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ---------- Section ---------- */
function Section({ id, idx, eyebrow, title, lead, children }) {
  return (
    <section id={id} className="section">
      <div className="section-head">
        <div>
          {eyebrow ? <div className="eyebrow">{eyebrow}</div> : null}
          <h2 className="h-section">{title}</h2>
        </div>
        <div className="section-idx">{idx}</div>
      </div>
      {lead ? <p className="lead" style={{ marginTop: 0, marginBottom: 22 }}>{lead}</p> : null}
      {children}
    </section>
  );
}

/* ---------- Card ---------- */
function Card({ title, right, children, style, className }) {
  return (
    <div className={"card " + (className || "")} style={style}>
      {(title || right) && (
        <div className="card-title" style={{ justifyContent: "space-between" }}>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 10 }}>
            <span className="dot" />
            {title}
          </span>
          {right}
        </div>
      )}
      {children}
    </div>
  );
}

/* ---------- Badge ---------- */
function Badge({ tone = "", children }) {
  return <span className={"badge " + tone}>{children}</span>;
}

/* ---------- Key/Value row ---------- */
function KV({ k, v, mono }) {
  return (
    <div
      style={{
        display: "flex",
        justifyContent: "space-between",
        padding: "6px 0",
        borderBottom: "1px dashed var(--line-soft)",

      <span style={{ fontFamily: mono ? "var(--font-mono)" : undefined, fontSize: 12.5 }}>{v}</span>
    </div>
  );
}

/* ---------- Step Player ----------
   A controllable timeline: prev / play / next / step / jump.
   Renders children as a function of the current step index.
*/
function StepPlayer({ steps, render, autoPlayMs = 0, storageKey }) {
  const [i, setI] = useState(0);
  const [playing, setPlaying] = useState(false);
  const timer = useRef(null);

  const safeSet = useCallback(
    (ni) => {
      setI(Math.max(0, Math.min(steps.length - 1, ni)));
    },
    [steps.length]
  );

  useEffect(() => {
    if (playing) {
      timer.current = setInterval(() => {
        setI((prev) => {
          if (prev >= steps.length - 1) {
            setPlaying(false);
            return prev;
          }
          return prev + 1;
        });
      }, autoPlayMs || 1800);
    } else if (timer.current) {
      clearInterval(timer.current);
      timer.current = null;
    }
    return () => timer.current && clearInterval(timer.current);
  }, [playing, steps.length, autoPlayMs]);

  useEffect(() => {
    if (storageKey) {
      try {
        const v = parseInt(localStorage.getItem(storageKey) || "0", 10);
        if (!Number.isNaN(v) && v < steps.length) setI(v);
      } catch (e) {}
    }
  }, [storageKey, steps.length]);
  useEffect(() => {
    if (storageKey) {
      try { localStorage.setItem(storageKey, String(i)); } catch (e) {}
    }
  }, [storageKey, i]);

  const current = steps[i];

  return (
    <div className="player">
      <div className="player-stage">{render(i, current)}</div>
      <div className="player-controls">
        <button
          className="ctrl-btn"
          onClick={() => safeSet(0)}
          title="回到开头"
          disabled={i === 0}
        >
          ⏮
        </button>
        <button
          className="ctrl-btn"
          onClick={() => safeSet(i - 1)}
          disabled={i === 0}
          title="上一步"
        >
          ◀
        </button>
        <button
          className="ctrl-btn primary"
          onClick={() => setPlaying((p) => !p)}
          title={playing ? "暂停" : "播放"}
        >
          {playing ? "❚❚" : "▶"}
        </button>
        <button
          className="ctrl-btn"
          onClick={() => safeSet(i + 1)}
          disabled={i >= steps.length - 1}
          title="下一步"
        >
          ▶
        </button>
        <div className="ctrl-step-indicator">
          {String(i + 1).padStart(2, "0")} / {String(steps.length).padStart(2, "0")}
        </div>
        <div className="ctrl-track">
          {steps.map((s, k) => (
            <div
              key={k}
              className={"ctrl-tick " + (k === i ? "active" : k < i ? "done" : "")}
              onClick={() => {
                setPlaying(false);
                safeSet(k);
              }}
              title={s.label || `步骤 ${k + 1}`}
            />
          ))}
        </div>
        <div className="ctrl-label" title={current?.label}>
          {current?.label || ""}
        </div>
      </div>
    </div>
  );
}

/* ---------- Narration (step description) ---------- */
function Narration({ tag, children }) {
  return (
    <div className="narration fade-in" key={String(children)}>
      {tag ? <span className="tag">{tag}</span> : null}
      {children}
    </div>
  );
}

/* ---------- Toggle / Checkbox ---------- */
function Toggle({ on, onChange, label }) {
  return (
    <label
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 8,
        cursor: "pointer",
        userSelect: "none",
        fontSize: 13,
      }}
    >
      <span
        style={{
          width: 34,
          height: 18,
          background: on ? "var(--claw)" : "var(--bg-chip)",
          border: "1px solid " + (on ? "var(--claw-line)" : "var(--line)"),
          borderRadius: 10,
          position: "relative",
          transition: "background 150ms",
        }}
      >
        <span
          style={{
            position: "absolute",
            top: 1,
            left: on ? 16 : 1,
            width: 14,
            height: 14,
            background: "#fff",
            borderRadius: "50%",
            transition: "left 150ms",
          }}
        />
      </span>
      {label}
      <input
        type="checkbox"
        checked={on}
        onChange={(e) => onChange(e.target.checked)}
        style={{ display: "none" }}
      />
    </label>
  );
}

/* ---------- Context chip (message in agent context window) ---------- */
function CtxChip({ type, children, fresh }) {
  const labels = {
    sys: "SYSTEM",
    mem: "MEMORY",
    tool: "TOOL",
    usr: "USER",
    asst: "AGENT",
    skill: "SKILL",
    boot: "BOOT",
  };
  return (
    <div className={"ctx-chip " + (fresh ? "new" : "")}>
      <span className={"ctype " + type}>{labels[type] || type.toUpperCase()}</span>
      <span style={{ flex: 1 }}>{children}</span>
    </div>
  );
}

    </svg>
  );
}

/* === components/learn_mode.jsx === */
/* components/learn_mode.jsx
   新手/老手模式全局开关 + <Primer>（先搞懂这件事）+ <Recap>（总结+自测）+ <T>（术语标注）
   全部通过 window.__ocLearn 广播状态，避免 Context。
*/

const { useSyncExternalStore } = React;

/* ---------------- global mode store ---------------- */
(function initLearnStore() {
  if (window.__ocLearn) return;
  const KEY = "oc_learn_mode"; // "beginner" | "veteran"
  let mode = "beginner";
  try {
    const stored = localStorage.getItem(KEY);
    if (stored === "beginner" || stored === "veteran") mode = stored;
  } catch (e) {}
  const listeners = new Set();
  window.__ocLearn = {
    get() { return mode; },
    set(next) {
      if (mode === next) return;
      mode = next;
      try { localStorage.setItem(KEY, next); } catch (e) {}
      listeners.forEach((fn) => fn());
    },
    subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); },
  };
})();

function useLearnMode() {
  return useSyncExternalStore(
    (cb) => window.__ocLearn.subscribe(cb),
    () => window.__ocLearn.get(),
    () => "beginner"
  );
}

/* ---------------- Mode Toggle (top-right floating) ---------------- */
function LearnModeToggle() {
  const mode = useLearnMode();
  const set = (m) => window.__ocLearn.set(m);
  return (
    <div className="learn-toggle">
      <span className="learn-toggle-label">学习模式</span>
      <div className="learn-toggle-group">
        <button
          className={"learn-toggle-btn " + (mode === "beginner" ? "active" : "")}
          onClick={() => set("beginner")}
          title="新手模式：所有补课/总结盒子默认展开，术语高亮"
        >
          新手
        </button>
        <button
          className={"learn-toggle-btn " + (mode === "veteran" ? "active" : "")}
          onClick={() => set("veteran")}
          title="老手模式：所有补课/总结盒子收起，密度优先"
        >
          老手
        </button>
      </div>
    </div>
  );
}

/* ---------------- <Primer>  先搞懂这件事 ---------------- */
/* 放在 Section 的 lead 下方、可视化上方。
   三段结构：analogy（类比）/ contrast（对照组）/ tech（技术解释）
   props:
     - analogy:  string | JSX — 生活类比
     - contrast: string | JSX — 不这样会怎样
     - tech:     string | JSX — 技术上到底是什么
     - terms:    [{ term, def }] — 这个模块首次出现的术语速查
     - title:    可选，默认 "先搞懂这件事"
*/
function Primer({ analogy, contrast, tech, terms, title }) {
  const mode = useLearnMode();
  const [open, setOpen] = React.useState(mode === "beginner");
  React.useEffect(() => { setOpen(mode === "beginner"); }, [mode]);

  return (
    <div className={"primer " + (open ? "open" : "")}>
      <button className="primer-head" onClick={() => setOpen(!open)}>
        <span className="primer-icon">📖</span>
        <span className="primer-title">{title || "先搞懂这件事"}</span>
        <span className="primer-hint dim">{open ? "点击收起" : "点击展开"}</span>
        <span className="primer-chev">{open ? "▾" : "▸"}</span>
      </button>
      {open && (
        <div className="primer-body">
          {analogy && (
            <div className="primer-row">
              <div className="primer-row-tag">类比</div>
              <div className="primer-row-body">{analogy}</div>
            </div>
          )}
          {contrast && (
            <div className="primer-row">
              <div className="primer-row-tag">如果不这么做</div>
              <div className="primer-row-body">{contrast}</div>
            </div>
          )}
          {tech && (
            <div className="primer-row">
              <div className="primer-row-tag">技术上是什么</div>
              <div className="primer-row-body">{tech}</div>
            </div>
          )}
          {terms && terms.length > 0 && (
            <div className="primer-terms">
              <div className="primer-terms-title">本节新术语</div>
              <div className="primer-terms-list">
                {terms.map((t, i) => (
                  <div key={i} className="primer-term">
                    <span className="primer-term-name">{t.term}</span>
                    <span className="primer-term-def">{t.def}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ---------------- <Recap> 一句话总结 + 自测 ----------------
   放在 Section 的可视化下方。
   props:
     - summary: string | JSX — 一句话总结
     - quiz:    [{ q, a }] — 自测问答，点击展开答案
*/
function Recap({ summary, quiz }) {
  const mode = useLearnMode();
  if (mode !== "beginner") return null;
  return (
    <div className="recap">
      <div className="recap-head">
        <span className="recap-icon">🎯</span>
        <span className="recap-title">一句话记住</span>
      </div>
      {summary && <div className="recap-summary">{summary}</div>}
      {quiz && quiz.length > 0 && (
        <div className="recap-quiz">
          <div className="recap-quiz-title">自测（点击查看答案）</div>
          {quiz.map((item, i) => (
            <RecapQA key={i} q={item.q} a={item.a} />
          ))}
        </div>
      )}
    </div>
  );
}

function RecapQA({ q, a }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div className={"recap-qa " + (open ? "open" : "")}>
      <button className="recap-q" onClick={() => setOpen(!open)}>
        <span className="recap-q-chev">{open ? "▾" : "▸"}</span>
        <span>{q}</span>
      </button>
      {open && <div className="recap-a">{a}</div>}
    </div>
  );
}

/* ---------------- <T> 术语标记 ----------------
   用法: <T k="websocket">WebSocket</T>
   - 渲染一个带下划虚线的行内 span
   - hover 显示 tooltip（从 GLOSSARY 取定义，精简版）
   - 点击 → 打开术语表抽屉并定位到该术语
*/
function T({ k, children }) {
  const [hover, setHover] = React.useState(false);
  const entry = (window.GLOSSARY || {})[k];
  const def = entry ? entry.short : null;
  const onClick = (e) => {

  };

    <span

      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      onClick={onClick}
    >

          <span className="term-tip-hint dim">点击查看完整解释</span>

}

(function initGlossaryStore() {
  if (window.__ocGlossary) return;
  let snapshot = { open: false, focusKey: null };
  const listeners = new Set();
  const emit = () => listeners.forEach((fn) => fn());
  window.__ocGlossary = {
    open(key) {
      snapshot = { open: true, focusKey: key || null };
      emit();
    },
    close() {
      snapshot = { open: false, focusKey: null };
      emit();
    },
    toggle() {
      snapshot = snapshot.open
        ? { open: false, focusKey: null }
        : { open: true, focusKey: snapshot.focusKey };
      emit();
    },
    getState() { return snapshot; },
    subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); },
  };
})();

function useGlossary() {
  return React.useSyncExternalStore(
    (cb) => window.__ocGlossary.subscribe(cb),
    () => window.__ocGlossary.getState()
  );
}

function GlossaryFab() {
  const { open } = useGlossary();
  return (
    <button
      className={"glossary-fab " + (open ? "open" : "")}
      onClick={() => window.__ocGlossary.toggle()}
      title="术语表"
    >
      <span className="glossary-fab-icon">📖</span>
      <span className="glossary-fab-label">术语表</span>
    </button>
  );

function GlossaryDrawer() {
  const { open, focusKey } = useGlossary();
  const [q, setQ] = React.useState("");
  const itemRefs = React.useRef({});

  React.useEffect(() => {
    if (open && focusKey && itemRefs.current[focusKey]) {
      setTimeout(() => {
        itemRefs.current[focusKey]?.scrollIntoView({ block: "center", behavior: "smooth" });
      }, 80);
    }
  }, [open, focusKey]);

  // 按首次出现模块分组
  const grouped = React.useMemo(() => {
    const G = window.GLOSSARY || {};
    const groups = {};
    Object.entries(G).forEach(([k, v]) => {
      const m = v.where || "misc";
      if (!groups[m]) groups[m] = [];
      groups[m].push({ k, ...v });
    });
    const order = ["m0", "m1", "m2a", "m2b", "m2c", "m3a", "m3b", "m3c", "m3d",
                   "m4a", "m4b", "m4c", "m4d", "m5a", "m5b", "m6a", "m6b", "misc"];
    return order.filter((m) => groups[m]).map((m) => ({ m, items: groups[m] }));
  }, []);

  const MODULE_NAMES = {
    m0: "预备知识", m1: "开场",
    m2a: "Gateway", m2b: "通道", m2c: "远程暴露",
    m3a: "Session", m3b: "Agent Loop", m3c: "Runtime 上下文", m3d: "记忆",

    m6a: "Plugin/Skill/MCP", m6b: "ClawHub",
    misc: "其他",

  const filter = q.trim().toLowerCase();

  if (!open) return null;
  return (
    <>
      <div className="glossary-backdrop" onClick={() => window.__ocGlossary.close()} />
      <aside className="glossary-drawer">
        <div className="glossary-drawer-head">

        </div>

        <div className="glossary-search">
          <input
            type="text"
            placeholder="搜索术语（中英文均可）…"
            value={q}
            onChange={(e) => setQ(e.target.value)}
          />
        </div>

        <div className="glossary-body">
          {grouped.map((g) => {
            const visibleItems = g.items.filter((it) => {
              if (!filter) return true;
              return (
                it.term.toLowerCase().includes(filter) ||
                it.short.toLowerCase().includes(filter) ||
                it.k.toLowerCase().includes(filter)
              );
            });
            if (visibleItems.length === 0) return null;
            return (
              <div key={g.m} className="glossary-group">
                <div className="glossary-group-title">
                  <span>{MODULE_NAMES[g.m] || g.m}</span>
                </div>
                {visibleItems.map((it) => (
                  <div
                    key={it.k}
                    ref={(el) => { itemRefs.current[it.k] = el; }}
                    className={"glossary-item " + (focusKey === it.k ? "focus" : "")}
                  >
                    <div className="glossary-item-head">
                      <span className="glossary-item-name">{it.term}</span>
                      {it.where && it.where !== "misc" && (
                        <button
                          className="glossary-jump"
                          onClick={() => {
                            const el = document.getElementById(it.where);
                            if (el) {

                            }

                    </div>
                    <div className="glossary-item-short">{it.short}</div>
                    {it.analogy && (
                      <div className="glossary-item-analogy">

function useScrollSpy(ids) {
  const [active, setActive] = useState(ids[0]);
  const [visited, setVisited] = useState(() => {
    try {
      const v = JSON.parse(localStorage.getItem("oc_visited") || "[]");
      return new Set(v);
    } catch (e) { return new Set(); }
  });

  useEffect(() => {
    const onScroll = () => {
      const y = window.scrollY + 120;
      let cur = ids[0];
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) cur = id;
      }
      setActive(cur);
      setVisited((old) => {
        if (old.has(cur)) return old;
        const next = new Set(old);
        next.add(cur);
        try { localStorage.setItem("oc_visited", JSON.stringify([...next])); } catch (e) {}
        return next;
      });
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, [ids.join("|")]);

  return { active, visited };
}

/* ================= Prism loader (idempotent) ================= */
(function loadPrism() {
  if (window.__prismLoaded) return;
  window.__prismLoaded = true;

  const css = document.createElement("link");
  css.rel = "stylesheet";
  css.href = "./assets/vendor/prism-tomorrow.min.css";
  document.head.appendChild(css);

  const core = document.createElement("script");
  core.src = "./assets/vendor/prism.min.js";
  core.onload = () => {
    const py = document.createElement("script");
    py.src = "./assets/vendor/prism-python.min.js";
    py.onload = () => {
      window.__prismReady = true;
      document.dispatchEvent(new CustomEvent("prism-ready"));
    };
    document.head.appendChild(py);
  };
  document.head.appendChild(core);
})();

function usePrismReady() {
  const [ready, setReady] = React.useState(!!window.__prismReady);
  React.useEffect(() => {
    if (window.__prismReady) { setReady(true); return; }
    const h = () => setReady(true);
    document.addEventListener("prism-ready", h);
    return () => document.removeEventListener("prism-ready", h);
  }, []);
  return ready;
}

/* ================= <CodeBlock> ================= */
/* 渲染一段 Python 代码，行号 + 高亮。可选 highlightLines (1-based)，会把这些行染成橙色底。 */
function CodeBlock({ code, lang = "python", highlightLines = [], startLine = 1 }) {
  const ready = usePrismReady();
  const ref = React.useRef(null);

  React.useEffect(() => {
    if (ready && ref.current && window.Prism) {
      window.Prism.highlightElement(ref.current);
    }
  }, [ready, code]);

  const lines = code.split("\n");
  const hiSet = new Set(highlightLines);

  return (
    <div className="cd-codeblock">
      <div className="cd-lineno">
        {lines.map((_, i) => (
          <span
            key={i}
            className={hiSet.has(i + 1) ? "cd-ln hi" : "cd-ln"}
          >
            {startLine + i}
          </span>
        ))}
      </div>
      <pre className="cd-code">
        <code ref={ref} className={"language-" + lang}>{code}</code>
      </pre>
      {hiSet.size > 0 && (
        <div className="cd-hi-overlay" aria-hidden="true">
          {lines.map((_, i) => (
            <div
              key={i}
              className={hiSet.has(i + 1) ? "cd-hi-row" : "cd-hi-row gap"}
            />
          ))}
        </div>
      )}
    </div>
  );
}

/* ================= <CodeTree> =================
   显示相关文件的小型树。
   props.files: [{ path, role, key }]
   path 用 "/" 分段，自动拼成树状。
*/
function CodeTree({ files, activeKey, onPick }) {
  // Group by top-level folder
  const tree = React.useMemo(() => {
    const root = {};
    for (const f of files) {
      const parts = f.path.split("/");
      let cur = root;
      for (let i = 0; i < parts.length; i++) {
        const seg = parts[i];
        const last = i === parts.length - 1;
        if (last) {
          cur.__files = cur.__files || [];
          cur.__files.push({ ...f, name: seg });
        } else {
          cur[seg] = cur[seg] || {};
          cur = cur[seg];
        }
      }
    }
    return root;
  }, [files]);

  const renderNode = (node, depth) => {
    const entries = [];
    // Dirs first
    Object.keys(node).filter((k) => k !== "__files").sort().forEach((k) => {
      entries.push(
        <div key={"d-" + depth + "-" + k}>
          <div className="cd-tree-dir" style={{ paddingLeft: 10 + depth * 14 }}>
            <span className="cd-tree-chev">▾</span>
            <span className="cd-tree-folder">📁</span>
            <span>{k}/</span>
          </div>
          {renderNode(node[k], depth + 1)}
        </div>
      );
    });
    // Files
    (node.__files || []).forEach((f) => {
      entries.push(
        <div
          key={"f-" + f.key}
          className={"cd-tree-file " + (activeKey === f.key ? "active" : "")}
          style={{ paddingLeft: 10 + depth * 14 }}
          onClick={() => onPick && onPick(f.key)}
        >
          <span className="cd-tree-icon">🐍</span>
          <span className="cd-tree-name">{f.name}</span>
          {f.role && <span className="cd-tree-role">{f.role}</span>}
        </div>
      );
    });
    return entries;
  };

  return (
    <div className="cd-tree">
      <div className="cd-tree-head">📂 涉及的文件</div>
      {renderNode(tree, 0)}
    </div>
  );
}

        除了"翻译地址",邮局还得管<span className="mono">分发</span> · <span className="mono">安检</span> · <span className="mono">广播</span> · <span className="mono">挂号补发</span>——下面这 4 件,缺一个就出问题。
      </div>

      <div style={{
        display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12,
      }}>
        {items.map((it) => (
          <div key={it.key} style={{
            padding: 14,
            background: "var(--bg)",
            border: "1px solid var(--line-soft)",
            borderTop: `3px solid ${it.color}`,
            borderRadius: 4,
            display: "flex", flexDirection: "column", gap: 12,
          }}>
            {/* 顶部:编号 + 名字 + 一句话 */}
            <div>
              <div style={{
                display: "flex", alignItems: "baseline", gap: 8, marginBottom: 6,
              }}>
                <span className="mono" style={{
                  fontSize: 11, color: it.color, letterSpacing: "0.06em",
                }}>{it.no}</span>
                <span style={{ fontSize: 15, fontWeight: 700, color: "var(--fg)" }}>
                  {it.name}
                </span>
              </div>
              <div className="mono" style={{
                fontSize: 9.5, color: "var(--fg-dim)",
                letterSpacing: "0.16em", marginBottom: 4,
              }}>
                {it.en}
              </div>
              <div style={{ fontSize: 12, color: "var(--fg-mute)", lineHeight: 1.55 }}>
                {it.what}
              </div>
            </div>

            {/* 中部:小图示 */}
            <div style={{
              padding: 10,
              background: "oklch(0.16 0.01 60)",
              border: "1px solid var(--line-soft)",
              borderRadius: 4,
              minHeight: 90,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              <RespDiagram kind={it.diagram} color={it.color} />
            </div>

            {/* 详情 */}
            <div style={{
              fontSize: 11.5, color: "var(--fg-mute)", lineHeight: 1.7,
            }}>
              {it.detail}
            </div>

            {/* 底部:如果没它 */}
            <div style={{
              marginTop: "auto",
              padding: "10px 12px",
              background: "oklch(0.18 0.04 30 / 0.40)",
              borderLeft: "2px solid oklch(0.62 0.16 30)",
              borderRadius: "0 3px 3px 0",
            }}>
              <div className="mono" style={{
                fontSize: 9.5, color: "oklch(0.78 0.14 30)",
                letterSpacing: "0.10em", marginBottom: 4,
              }}>
                ⚠ 如果没它
              </div>
              <div style={{ fontSize: 11.5, color: "var(--fg-mute)", lineHeight: 1.65 }}>
                {it.ifNot}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* 底部小结 */}
      <div style={{
        marginTop: 16,
        fontSize: 12.5, color: "var(--fg-dim)", lineHeight: 1.75,
        paddingTop: 14, borderTop: "1px dashed var(--line-soft)",
      }}>
        所以更准确的描述是 ——
        <strong style={{ color: "var(--fg)" }}>Gateway 是无 AI 的、有状态的、协议层的死逻辑</strong>。
        "死"是优点(可预测 · 易测试),但它管的是消息<span className="mono">怎么流</span>,不是消息<span className="mono">说了什么</span>。
      </div>
    </div>
  );
}

function RespDiagram({ kind, color }) {
  const [tick, setTick] = m0_useState(0);
  React.useEffect(() => {
    const t = setInterval(() => setTick((x) => (x + 1) % 4), 1000);
    return () => clearInterval(t);
  }, []);

  const dim = "oklch(0.55 0.04 60)";
  const fg = "oklch(0.88 0.01 60)";

  if (kind === "route") {
    // 三个入口 → Gateway → 决定路由到哪个 session
    const targets = ["S1", "S2", "S3"];
    const target = tick % 3;
    return (
      <svg viewBox="0 0 200 90" width="100%" height="90">
        {/* 入口 */}
        {["微信", "飞书", "Tg"].map((c, i) => (
          <g key={i}>
            <circle cx="20" cy={20 + i * 25} r="3" fill={dim} />
            <text x="8" y={24 + i * 25} fill={dim} fontSize="9">{c}</text>
            <line x1="24" y1={20 + i * 25} x2="80" y2="45" stroke={dim} strokeWidth="0.8" />
          </g>
        ))}
        {/* Gateway 节点 */}
        <rect x="80" y="36" width="34" height="18" rx="3"
          fill="oklch(0.30 0.05 60)" stroke={color} strokeWidth="1.2" />
        <text x="97" y="48" textAnchor="middle" fill={color} fontSize="9" fontWeight="700">GW</text>
        {/* 三个 session */}
        {targets.map((s, i) => (
          <g key={i}>
            <rect x="160" y={14 + i * 25} width="32" height="16" rx="2"
              fill={target === i ? "oklch(0.30 0.10 220)" : "oklch(0.22 0.01 60)"}
              stroke={target === i ? color : dim} strokeWidth={target === i ? "1.2" : "0.6"} />
            <text x="176" y={25 + i * 25} textAnchor="middle"
              fill={target === i ? fg : dim} fontSize="8.5">{s}</text>
            <line x1="114" y1="45" x2="160" y2={22 + i * 25}
              stroke={target === i ? color : dim} strokeWidth={target === i ? "1.4" : "0.6"}
              strokeDasharray={target === i ? "0" : "2 2"} />
          </g>
        ))}
      </svg>
    );
  }

  if (kind === "auth") {
    // 三个请求,一个红 X(被拒) 两个绿 √
    const states = [
      { label: "已知", ok: true },
      { label: "陌生", ok: false },
      { label: "过期", ok: false },
      { label: "已知", ok: true },
    ];
    const cur = states[tick];
    return (
      <svg viewBox="0 0 200 90" width="100%" height="90">
        <rect x="20" y="35" width="50" height="20" rx="3"
          fill="oklch(0.22 0.01 60)" stroke={dim} strokeWidth="0.8" />
        <text x="45" y="48" textAnchor="middle" fill={fg} fontSize="9.5">{cur.label}请求</text>
        {/* 门 */}
        <rect x="90" y="22" width="6" height="46" fill={cur.ok ? "oklch(0.55 0.16 140)" : "oklch(0.55 0.18 30)"} />
        <text x="93" y="14" textAnchor="middle" fill={cur.ok ? "oklch(0.78 0.14 140)" : "oklch(0.82 0.16 30)"}
          fontSize="11" fontWeight="700">{cur.ok ? "✓" : "✕"}</text>
        {/* Agent */}
        <rect x="120" y="35" width="60" height="20" rx="3"
          fill={cur.ok ? "oklch(0.30 0.05 220)" : "oklch(0.20 0.01 60)"}
          stroke={cur.ok ? color : dim} strokeWidth="0.8"
          strokeDasharray={cur.ok ? "0" : "2 2"} />
        <text x="150" y="48" textAnchor="middle" fill={cur.ok ? fg : dim} fontSize="9.5">Agent</text>
      </svg>
    );
  }

  if (kind === "fanout") {
    // 一个 event 同时推到 3 个 client
    return (
      <svg viewBox="0 0 200 90" width="100%" height="90">
        <rect x="14" y="36" width="36" height="20" rx="3"
          fill="oklch(0.30 0.05 60)" stroke={color} strokeWidth="1.2" />
        <text x="32" y="49" textAnchor="middle" fill={color} fontSize="9" fontWeight="700">GW</text>
        {[20, 45, 70].map((y, i) => (
          <g key={i}>
            <line x1="50" y1="46" x2="160" y2={y + 6}
              stroke={color} strokeWidth="0.9" strokeOpacity="0.6" />
            <circle cx={50 + (110 * (((tick * 0.5 + i * 0.33) % 1)))}
              cy={46 + ((y + 6 - 46) * (((tick * 0.5 + i * 0.33) % 1)))}
              r="2.4" fill={color} />
            <rect x="160" y={y - 4} width="34" height="20" rx="2"
              fill="oklch(0.22 0.01 60)" stroke={dim} strokeWidth="0.6" />
            <text x="177" y={y + 8} textAnchor="middle" fill={fg} fontSize="9">
              {["UI", "节点", "通道"][i]}
            </text>
          </g>
        ))}
      </svg>
    );
  }

  if (kind === "version") {
    // 显示一个版本计数器在跳, 客户端断线重连补差量
    const v = 142 + tick;
    return (
      <svg viewBox="0 0 200 90" width="100%" height="90">
        <text x="100" y="22" textAnchor="middle" fill={dim}
          fontSize="9" fontFamily="var(--font-mono)" letterSpacing="0.1em">
          stateVersion
        </text>
        <text x="100" y="50" textAnchor="middle" fill={color}
          fontSize="22" fontWeight="700" fontFamily="var(--font-mono)">
          {v}
        </text>
        <text x="100" y="72" textAnchor="middle" fill={fg}
          fontSize="9.5">
          客户端报 v={v - 3} → 补发 3 条
        </text>
      </svg>
    );
  }
  return null;
}

        },

      label: "iMessage",
      sub: "Bridge · macOS 桥接",
      color: "oklch(0.72 0.13 320)",
      raw: {
        guid: "p:0/+8613800138000",
        handle_id: 87,
        text: "帮我把仓库里过期的依赖升一下",
        is_from_me: 0,
        date: 738531090000000000,
        service: "iMessage",
      },
      hint: "Apple Core Data 风格 · 时间是 nanoseconds since 2001 · 用 phone+ 标识用户",
    },
  ];

  // 统一 envelope 长一样
  const makeEnvelope = (ch) => ({
    type: "channel.message.in",
    envelope_id: "env_01HXKJ7Q...",
    channel: { kind: ch.id, adapter: ch.sub.split(" · ")[0] },
    user: { id: "user:li.xiao", display: "李霄" },
    session: "main",
    payload: {
      kind: "text",
      text: "帮我把仓库里过期的依赖升一下",

    timestamp: "2024-04-27T10:11:30.123Z",
  });

  const [idx, setIdx] = m0_useState(0);
  const [paused, setPaused] = m0_useState(false);
  React.useEffect(() => {
    if (paused) return;
    const t = setInterval(() => setIdx((x) => (x + 1) % channels.length), 3200);
    return () => clearInterval(t);
  }, [paused, channels.length]);

  const cur = channels[idx];
  const env = makeEnvelope(cur);

  // 高亮：哪几行是"用户内容"——它在不同渠道里藏在不同字段
  const contentPaths = new Set([
    "raw.Content",
    "raw.event.message.content",
    "raw.message.text",
    "raw.text",
    "envelope.payload.text",
  ]);
  const renderJSON = (obj, path = []) => {
    if (obj === null) return <span style={{ color: "oklch(0.65 0.01 60)" }}>null</span>;
    if (typeof obj === "string") {
      const isContent = contentPaths.has(path.join("."));
      return (
        <span style={{
          color: isContent ? "oklch(0.85 0.16 60)" : "oklch(0.78 0.10 140)",
          background: isContent ? "oklch(0.85 0.16 60 / 0.12)" : "transparent",
          padding: isContent ? "0 3px" : 0, borderRadius: 2,
        }}>"{obj}"</span>
      );
    }
    if (typeof obj === "number") {
      return <span style={{ color: "oklch(0.78 0.13 250)" }}>{obj}</span>;
    }
    if (Array.isArray(obj)) {
      return <>[{obj.map((v, i) => <span key={i}>{renderJSON(v, path.concat(String(i)))}{i < obj.length - 1 ? ", " : ""}</span>)}]</>;
    }
    if (typeof obj === "object") {
      const keys = Object.keys(obj);
      return (
        <>{"{"}
          {keys.map((k, i) => (
            <div key={k} style={{ paddingLeft: 14 }}>
              <span style={{ color: "oklch(0.78 0.10 60)" }}>"{k}"</span>
              <span style={{ color: "oklch(0.65 0.01 60)" }}>: </span>
              {renderJSON(obj[k], path.concat(k))}
              {i < keys.length - 1 && <span style={{ color: "oklch(0.65 0.01 60)" }}>,</span>}
            </div>
          ))}
          {"}"}</>
      );
    }
    return String(obj);
  };

  return (
    <div style={{
      display: "grid", gridTemplateColumns: "1fr 80px 1fr", gap: 14, alignItems: "stretch",
    }}>
      {/* 左:原始 payload */}
      <div style={{
        padding: 14, background: "var(--bg)", border: "1px solid var(--line-soft)",
        borderLeft: `3px solid ${cur.color}`, borderRadius: 4,
        display: "flex", flexDirection: "column", minHeight: 360,
      }}>
        <div style={{
          display: "flex", alignItems: "baseline", justifyContent: "space-between",
          marginBottom: 4, gap: 8, flexWrap: "wrap",
        }}>
          <div>
            <div style={{ fontSize: 13.5, fontWeight: 700, color: "var(--fg)" }}>{cur.label} 原始 payload</div>
            <div className="mono" style={{ fontSize: 10.5, color: "var(--fg-dim)", letterSpacing: "0.04em" }}>
              {cur.sub}

          </div>
          <span className="mono" style={{
            fontSize: 10, color: cur.color, padding: "2px 7px",
            border: `1px solid ${cur.color}`, borderRadius: 100, letterSpacing: "0.06em",
          }}>{idx + 1} / {channels.length}</span>
        </div>
        <pre className="mono" style={{
          flex: 1, margin: "10px 0 0 0", padding: 12,
          background: "oklch(0.16 0.01 60)",
          border: "1px solid var(--line-soft)", borderRadius: 4,
          fontSize: 11, lineHeight: 1.6, color: "var(--fg-mute)",
          overflow: "auto", whiteSpace: "pre-wrap",
        }}>
          {renderJSON(cur.raw, ["raw"])}
        </pre>
        <div style={{
          marginTop: 8, fontSize: 11, color: "var(--fg-dim)", lineHeight: 1.65,
        }}>
          <span style={{ color: cur.color }}>· </span>{cur.hint}
        </div>
      </div>

      {/* 中:Gateway 标识 */}
      <div style={{
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        gap: 12, position: "relative",
      }}>
        <div style={{
          width: 56, height: 56, borderRadius: 12,
          background: "linear-gradient(135deg, oklch(0.32 0.10 60), oklch(0.24 0.05 60))",
          border: "1.4px solid oklch(0.75 0.16 60 / 0.5)",
          boxShadow: "0 0 0 4px oklch(0.75 0.16 60 / 0.08), 0 4px 18px oklch(0.55 0.18 30 / 0.25)",
          display: "flex", alignItems: "center", justifyContent: "center",
          color: "oklch(0.92 0.10 60)", fontFamily: "var(--font-mono)",
          fontSize: 11, fontWeight: 700, letterSpacing: "0.06em",
          animation: "envPulse 1.6s ease-in-out infinite",
        }}>GATE</div>
        <div className="mono" style={{

        }}>NORMALIZE</div>

        <svg width="80" height="32" style={{ marginTop: -6 }}>

          <div style={{ fontSize: 13.5, fontWeight: 700, color: "var(--fg)" }}>
            OpenClaw 内部 envelope

          <div className="mono" style={{ fontSize: 10.5, color: "var(--fg-dim)", letterSpacing: "0.04em" }}>

          <span style={{ color: "oklch(0.85 0.16 60)" }}>· </span>

      {/* 底部:渠道切换器 */}
      <div style={{ gridColumn: "1 / -1", marginTop: 6 }}>

            <button key={c.id} onClick={() => { setIdx(i); setPaused(true); }}
              style={{
                padding: "5px 11px", fontSize: 11.5,
                background: idx === i ? c.color : "var(--bg-soft)",
                color: idx === i ? "oklch(0.16 0.01 60)" : "var(--fg-mute)",
                border: `1px solid ${idx === i ? c.color : "var(--line-soft)"}`,
                borderRadius: 100, cursor: "pointer", fontFamily: "inherit",
                fontWeight: idx === i ? 600 : 400, transition: "all 160ms ease",
              }}>{c.label}</button>
          ))}
          <button onClick={() => setPaused(!paused)} style={{
            marginLeft: 6, padding: "5px 11px", fontSize: 11,
            background: "transparent", color: "var(--fg-dim)",
            border: "1px solid var(--line-soft)", borderRadius: 100,
            cursor: "pointer", fontFamily: "var(--font-mono)", letterSpacing: "0.04em",

            marginLeft: "auto", fontSize: 11, color: "var(--fg-dim)",

            不管左边怎么变,它的位置和字段名都不变。
          </span>
        </div>
      </div>
    </div>
  );
}

    { id: "store",    x: 700, y: 310, w: 200, h: 60, label: "State / Memory",  sub: "SQLite · Vector · KV" },
    { id: "cron",     x: 700, y: 400, w: 200, h: 60, label: "Cron / Scheduler",sub: "后台任务 · 订阅" },
  ];

  const gw = { x: 380, y: 200, w: 200, h: 120 };

  const edges = nodes.map(n => ({
    from: n.id,
    x1: n.x < 400 ? n.x + n.w : n.x,
    y1: n.y + n.h / 2,
    x2: n.x < 400 ? gw.x : gw.x + gw.w,
    y2: gw.y + gw.h / 2 + (n.y - 220) * 0.12,
  }));

  return (
    <div className="card" style={{ padding: 18 }}>
      <svg viewBox="0 0 960 500" width="100%" style={{ display: "block" }}>
        {edges.map((e) => (
          <path key={e.from}
            d={`M${e.x1} ${e.y1} C ${(e.x1+e.x2)/2} ${e.y1}, ${(e.x1+e.x2)/2} ${e.y2}, ${e.x2} ${e.y2}`}
            className={"edge " + (hover === e.from ? "active" : "")}
            fill="none" />
        ))}
        {nodes.map((n) => (
          <g key={n.id}
             onMouseEnter={() => setHover(n.id)}
             onMouseLeave={() => setHover(null)}
             style={{ cursor: "pointer" }}>
            <rect x={n.x} y={n.y} width={n.w} height={n.h} rx="8"
              className={"node-box " + (hover === n.id ? "active" : "")} />
            <text x={n.x + n.w/2} y={n.y + 26} textAnchor="middle" className="node-label" style={{ fontWeight: 600 }}>{n.label}</text>
            <text x={n.x + n.w/2} y={n.y + 44} textAnchor="middle" className="node-sub">{n.sub}</text>
          </g>
        ))}
        {/* Gateway core */}
        <rect x={gw.x} y={gw.y} width={gw.w} height={gw.h} rx="12"
          fill="var(--claw-wash)" stroke="var(--claw)" strokeWidth="1.4" />
        <text x={gw.x + gw.w/2} y={gw.y + 38} textAnchor="middle"
          style={{ fontSize: 16, fontWeight: 600, fill: "var(--fg)" }}>Gateway</text>
        <text x={gw.x + gw.w/2} y={gw.y + 60} textAnchor="middle" className="node-sub">WebSocket hub · single-user</text>
        <text x={gw.x + gw.w/2} y={gw.y + 80} textAnchor="middle" className="node-sub">ws://127.0.0.1:18789</text>
        <text x={gw.x + gw.w/2} y={gw.y + 102} textAnchor="middle" className="node-sub" style={{ fill: "var(--claw-soft)" }}>
          routes · auth · fanout · sessions
        </text>
      </svg>

      <div style={{ fontSize: 13, color: "var(--fg-mute)", marginTop: 6 }}>
        {hover ? (
          <>悬停：<span className="mono" style={{ color: "var(--claw-soft)" }}>{hover}</span> — 点亮它与 Gateway 之间的连线。</>
        ) : (
          <>鼠标移到任意节点查看它如何接入 Gateway。所有组件——包括通道适配器、CLI、设备节点、模型、工具——都以 <span className="kbd">WebSocket</span> 客户端身份连回同一个枢纽。</>
        )}
      </div>
    </div>
  );
}

function PreviewGateway() {
  return (
    <Section
      id="m2a"
      idx="MODULE · 02 · 预览"
      eyebrow="架构"
      title="Gateway 控制平面"
      lead="OpenClaw 的所有组件都是 WebSocket 客户端，回连本机的单进程 Gateway。枢纽之外，没有任何共享状态——这是 local-first 的关键。"
    >
      <Primer
        title="为什么要有一个「Gateway」？"
        analogy={<>想象一个<strong>公司前台</strong>：快递、客户、外卖、员工都得经过前台登记 + 分发。没有前台，每个部门都要自己处理进出，乱成一团。Gateway 就是 OpenClaw 的前台——<strong>唯一的「进/出」</strong>。</>}
        contrast={<>没有 Gateway 的做法：每个渠道直接调模型、每台设备直接走自己的授权。结果：应用之间状态不一致（微信说过的事电脑上不知道）、权限无法统一管控、审计也没地方记。</>}
        tech={<>Gateway 是一个单用户、单进程的 <T k="websocket">WebSocket</T> 枢纽，默认跑在 <code>ws://127.0.0.1:18789</code>。所有组件以客户端身份回连，消息按 envelope（<T k="session">session</T> + source + user + time）路由。Gateway 自己不跑模型也不存数据——只负责路由、授权、fanout。</>}
      />
      <GatewayDiagram />

      <h3 className="h-sub" style={{ marginTop: 30 }}>Gateway 在做什么 · 把"五花八门"翻译成"长得一样"</h3>
      <div style={{ fontSize: 14, color: "var(--fg-mute)", lineHeight: 1.75, marginBottom: 14 }}>
        每个外部平台都有自己的消息格式——字段名、嵌套结构、时间格式、用户 ID 编码方式都不一样。
        Gateway 通过 <strong style={{ color: "var(--fg)" }}>Channel 适配器</strong>把它们统一翻译成一种内部 envelope,
        后面所有组件(Session / Agent / Tool)只需要认这一种格式。
      </div>
      <EnvelopeNormalizer />

      <h3 className="h-sub" style={{ marginTop: 30 }}>但 Gateway 不只是翻译 · 4 件正经活</h3>
      <GatewayResponsibilities />
    </Section>
  );
}

  return (

  );
}
