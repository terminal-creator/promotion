<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>S5 · 2026 · Brutalist</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Inter+Tight:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F2EC;             /* off-white */
  --bg-2:#FFFFFF;
  --ink:#0A0A0A;
  --ink-2:#1F1F1F;
  --ink-3:#5C5A52;
  --ink-4:#8F8C82;
  --rule:#0A0A0A;
  --rule-soft:#0A0A0A;       /* same; brutalism is binary */
  --rule-fade:rgba(10,10,10,0.18);
  --acc:#E2FF40;             /* electric chartreuse / hi-vis */
  --acc-2:#FF3A1F;           /* warning red */
  --acc-3:#0066FF;           /* electric blue */
  --sans:"Inter Tight","Inter","PingFang SC","Microsoft YaHei",ui-sans-serif,system-ui,sans-serif;
  --body:"Inter","PingFang SC","Microsoft YaHei",ui-sans-serif,system-ui,sans-serif;
  --mono:"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
}
html,body{background:var(--bg);color:var(--ink);font-family:var(--body);font-weight:400;line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em}
a{color:inherit;text-decoration:none}
::selection{background:var(--ink);color:var(--acc)}

.wrap{max-width:1320px;margin:0 auto;padding:0 32px;position:relative}
@media(max-width:680px){.wrap{padding:0 18px}}

/* ============= Top — minimal bar ============= */
.top{position:sticky;top:0;z-index:60;background:var(--bg);border-bottom:3px solid var(--ink)}
.top-in{max-width:1320px;margin:0 auto;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11.5px;letter-spacing:0.04em;text-transform:uppercase}
.top-in b{font-weight:700}
.top-in .acc{background:var(--ink);color:var(--acc);padding:4px 10px;font-weight:700;letter-spacing:0.08em}
.top-in nav{display:flex;gap:24px}
.top-in nav a{position:relative}
.top-in nav a:hover{color:var(--ink);font-weight:700}
.top-in nav a::after{content:'→';margin-left:6px;opacity:0;transition:opacity 0.12s}
.top-in nav a:hover::after{opacity:1}
@media(max-width:760px){.top-in nav{display:none}.top-in{padding:11px 18px;font-size:10.5px}}

/* ============= Hero ============= */
.hero{padding:48px 0 24px;position:relative}
.hero-meta{display:flex;align-items:baseline;justify-content:space-between;gap:18px;font-family:var(--mono);font-size:12px;letter-spacing:0.06em;text-transform:uppercase;padding-bottom:18px;border-bottom:1px solid var(--ink);margin-bottom:36px;flex-wrap:wrap}
.hero-meta b{font-weight:700}
.hero-meta .lab{padding:5px 10px;background:var(--ink);color:var(--acc);font-weight:700;letter-spacing:0.08em}
.hero-meta .red{color:var(--acc-2);font-weight:700}

.hero-h{font-family:var(--sans);font-weight:900;letter-spacing:-0.045em;line-height:1;color:var(--ink);text-wrap:balance}
.hero-h .l1{display:block;font-family:var(--body);font-size:clamp(13px,1.4vw,16px);font-weight:500;color:var(--ink-3);letter-spacing:0.04em;line-height:1.4;margin-bottom:24px;text-transform:uppercase}
.hero-h .l2,.hero-h .l3{display:block;font-size:clamp(56px,11vw,180px);line-height:1.06;margin-top:0.06em}
.hero-h .acc{background:var(--acc);padding:0 0.08em 0.02em;color:var(--ink);box-decoration-break:clone;-webkit-box-decoration-break:clone}
.hero-h .it{font-style:italic;font-weight:600}
.hero-h .dot{display:inline-block;width:0.18em;height:0.18em;background:var(--acc-2);border-radius:50%;vertical-align:0.06em;margin-left:0.04em}

.hero-row{margin-top:48px;display:grid;grid-template-columns:1fr 460px;gap:48px;align-items:start;padding-top:24px;border-top:1px solid var(--ink)}
@media(max-width:980px){.hero-row{grid-template-columns:1fr;gap:24px}}
.hero-sub{font-size:clamp(18px,1.6vw,22px);line-height:1.5;color:var(--ink);font-weight:500;max-width:760px;letter-spacing:-0.01em}
.hero-sub b{font-weight:800;background:var(--acc);padding:0 4px}

/* hero stats */
.hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border-top:3px solid var(--ink);border-bottom:3px solid var(--ink)}
.hero-stats .s{padding:14px 18px;border-right:1px solid var(--ink);border-bottom:1px solid var(--ink);position:relative}
.hero-stats .s:nth-child(2n){border-right:none}
.hero-stats .s:nth-last-child(-n+2){border-bottom:none}
.hero-stats .s .n{font-family:var(--sans);font-size:42px;font-weight:900;letter-spacing:-0.04em;line-height:1;color:var(--ink)}
.hero-stats .s .n .u{font-size:15px;color:var(--ink-3);font-weight:600;margin-left:3px;letter-spacing:0}
.hero-stats .s .l{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-3);margin-top:6px;font-weight:600}

/* self-check */
.check{margin-top:48px;border-top:3px solid var(--ink);padding-top:32px}
.check .head{display:flex;align-items:baseline;justify-content:space-between;gap:18px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--ink);font-family:var(--mono);font-size:11.5px;letter-spacing:0.16em;text-transform:uppercase}
.check .head .l b{background:var(--acc);padding:3px 8px;font-weight:700;letter-spacing:0.08em}
.check h3{font-family:var(--sans);font-size:clamp(28px,3.6vw,40px);font-weight:900;letter-spacing:-0.025em;line-height:1.05;color:var(--ink);margin-bottom:20px;text-wrap:balance}
.check h3 .acc{background:var(--acc);padding:0 6px}
.check .qs{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-top:1px solid var(--ink)}
@media(max-width:880px){.check .qs{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.check .qs{grid-template-columns:1fr}}
.check .q{padding:18px 18px 20px;border-right:1px solid var(--ink);border-bottom:1px solid var(--ink);background:var(--bg-2)}
.check .q:nth-child(5n){border-right:none}
@media(max-width:880px){.check .q:nth-child(5n){border-right:1px solid var(--ink)}.check .q:nth-child(2n){border-right:none}}
@media(max-width:520px){.check .q{border-right:none!important}}
.check .q .n{font-family:var(--mono);font-size:11px;color:var(--ink-3);font-weight:700;letter-spacing:0.08em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.check .q .n .pill{background:var(--ink);color:var(--acc);padding:2px 6px;font-size:10px;letter-spacing:0.1em}
.check .q .t{font-size:13.5px;line-height:1.55;color:var(--ink);font-weight:500}
.check .q .t b{font-weight:800;background:var(--acc);padding:0 3px}
.check .foot{margin-top:18px;font-family:var(--mono);font-size:11.5px;letter-spacing:0.08em;color:var(--ink-3);text-align:right}
.check .foot b{color:var(--ink);font-weight:700}

/* hook (pain) */
.hook{margin-top:36px;padding:42px 40px;background:var(--ink);color:var(--bg)}
@media(max-width:680px){.hook{padding:28px 22px}}
.hook .head{display:flex;justify-content:space-between;align-items:baseline;gap:18px;font-family:var(--mono);font-size:11.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:20px;flex-wrap:wrap}
.hook h2{font-family:var(--sans);font-size:clamp(36px,5.4vw,68px);font-weight:900;letter-spacing:-0.035em;line-height:1.04;color:var(--bg);margin-bottom:24px;text-wrap:balance}
.hook .rows{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid rgba(255,255,255,0.15)}
@media(max-width:760px){.hook .rows{grid-template-columns:1fr}}
.hook .row{padding:18px 0;border-bottom:1px solid rgba(255,255,255,0.15);display:grid;grid-template-columns:60px 1fr;align-items:baseline;gap:14px}
.hook .row:nth-child(2n+1){border-right:1px solid rgba(255,255,255,0.15);padding-right:24px}
.hook .row:nth-child(2n){padding-left:24px}
@media(max-width:760px){.hook .row{border-right:none!important;padding-left:0!important;padding-right:0!important}}
.hook .row .n{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--acc);letter-spacing:0.04em}
.hook .row .t{font-size:16px;line-height:1.5;font-weight:500;color:var(--bg)}
.hook .row .t s{color:rgba(244,242,236,0.4);text-decoration:line-through;font-weight:400}
.hook .row .t em{font-style:normal;background:var(--acc);color:var(--ink);padding:0 4px;font-weight:700}
.hook .row .t b{font-weight:800;color:var(--bg)}

/* ============= Section primitives ============= */
.section{padding:96px 0 56px;border-top:3px solid var(--ink)}
.section-head{display:grid;grid-template-columns:auto 1fr auto;gap:32px;align-items:end;margin-bottom:36px;padding-bottom:14px;border-bottom:1px solid var(--ink)}
@media(max-width:880px){.section-head{grid-template-columns:auto 1fr;gap:18px}}
.section-head .num{font-family:var(--sans);font-size:clamp(80px,11vw,160px);font-weight:900;letter-spacing:-0.055em;line-height:0.78;color:var(--ink);align-self:end}
.section-head .num .sl{color:var(--ink-4);font-weight:600}
.section-head .l .lab{font-family:var(--mono);font-size:11.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px;font-weight:600;display:flex;align-items:center;gap:10px}
.section-head .l .lab b{background:var(--acc);color:var(--ink);padding:3px 8px;font-weight:700;letter-spacing:0.08em}
.section-head .l h2{font-family:var(--sans);font-size:clamp(36px,5.2vw,68px);font-weight:900;letter-spacing:-0.035em;line-height:1.04;color:var(--ink);margin:0;text-wrap:balance}
.section-head .l h2 .acc{background:var(--acc);padding:0 6px}
.section-head .l h2 .it{font-style:italic;font-weight:700}
.section-head .r{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);text-align:right;line-height:1.6;align-self:end;padding-bottom:8px}
.section-head .r b{display:block;font-family:var(--sans);font-size:36px;color:var(--ink);font-weight:900;letter-spacing:-0.02em}
@media(max-width:880px){.section-head .r{display:none}}

.lede{font-size:clamp(17px,1.6vw,21px);line-height:1.55;color:var(--ink);max-width:840px;font-weight:500;letter-spacing:-0.01em}
.lede b{font-weight:800;background:var(--acc);padding:0 4px}

/* ============= Series ============= */
.series{margin-top:32px;border-top:3px solid var(--ink);border-bottom:3px solid var(--ink)}
.series .row{display:grid;grid-template-columns:140px 80px 1fr 200px 120px;border-bottom:1px solid var(--ink);align-items:center;padding:22px 0;gap:24px}
.series .row:last-child{border-bottom:none}
.series .row.now{background:var(--acc)}
.series .row.now::before{display:none}
.series .row .id{font-family:var(--sans);font-size:64px;font-weight:900;letter-spacing:-0.04em;line-height:0.86;color:var(--ink)}
.series .row .tag{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.series .row.now .tag{color:var(--ink);font-weight:700}
.series .row .ti{font-family:var(--sans);font-size:22px;font-weight:800;letter-spacing:-0.015em;line-height:1.2}
.series .row .span{font-family:var(--mono);font-size:12px;letter-spacing:0.04em;color:var(--ink-3)}
.series .row.now .span{color:var(--ink);font-weight:700}
.series .row .pin{font-family:var(--mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-3);text-align:right;font-weight:600}
.series .row.now .pin{background:var(--ink);color:var(--acc);padding:6px 10px;font-weight:700}
@media(max-width:880px){.series .row{grid-template-columns:80px 1fr 110px;padding:18px 0;gap:14px}.series .row .tag,.series .row .span{display:none}.series .row .id{font-size:44px}.series .row .ti{font-size:18px}}

.series-detail{margin-top:32px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;border-top:3px solid var(--ink)}
@media(max-width:980px){.series-detail{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.series-detail{grid-template-columns:1fr}}
.series-detail .c{padding:24px 24px;border-right:1px solid var(--ink);border-bottom:1px solid var(--ink);background:var(--bg-2)}
.series-detail .c:nth-child(4n){border-right:none}
@media(max-width:980px){.series-detail .c:nth-child(4n){border-right:1px solid var(--ink)}.series-detail .c:nth-child(2n){border-right:none}}
@media(max-width:560px){.series-detail .c{border-right:none!important}}
.series-detail .c.now{background:var(--acc)}
.series-detail .c .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin:14px 0 6px}
.series-detail .c.now .lab{color:var(--ink-2)}
.series-detail .c .lab:first-of-type{margin-top:0}
.series-detail .c ul{margin:0;padding-left:16px;font-size:13.5px;line-height:1.55;color:var(--ink-2)}
.series-detail .c.now ul{color:var(--ink);font-weight:500}
.series-detail .c ul li{margin-bottom:2px}
.series-detail .c ul li b{color:var(--ink);font-weight:700}
.series-detail .c ul li .new{background:var(--ink);color:var(--acc);font-weight:700;padding:0 4px}
.series-detail .c.now ul li .new{background:var(--bg-2);color:var(--ink)}
.series-detail .c .id-mini{font-family:var(--sans);font-size:42px;font-weight:900;letter-spacing:-0.04em;line-height:0.85;color:var(--ink);margin-bottom:6px}
.series-detail .c .ti-mini{font-family:var(--sans);font-size:16px;font-weight:800;line-height:1.2;margin-bottom:14px}

.delta-card{margin-top:48px;padding:48px 44px;background:var(--ink);color:var(--bg)}
@media(max-width:680px){.delta-card{padding:32px 22px}}
.delta-card .lab{font-family:var(--mono);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.delta-card h3{font-family:var(--sans);font-size:clamp(32px,4.4vw,54px);font-weight:900;letter-spacing:-0.03em;line-height:1.06;color:var(--bg);margin-bottom:10px;text-wrap:balance}
.delta-card h3 .acc{background:var(--acc);color:var(--ink);padding:0 6px}
.delta-card .d{font-size:16.5px;color:rgba(244,242,236,0.7);line-height:1.55;max-width:640px;margin-bottom:32px;font-weight:500}
.delta-card .items{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid rgba(255,255,255,0.18)}
@media(max-width:760px){.delta-card .items{grid-template-columns:1fr}}
.delta-card .item{padding:22px 22px 22px 0;border-right:1px solid rgba(255,255,255,0.18)}
.delta-card .item:nth-child(2),.delta-card .item:nth-child(3){padding-left:22px}
.delta-card .item:nth-child(3){padding-right:0;border-right:none}
@media(max-width:760px){.delta-card .item{padding:18px 0!important;border-right:none;border-bottom:1px solid rgba(255,255,255,0.18)}.delta-card .item:last-child{border-bottom:none}}
.delta-card .item .n{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:8px}
.delta-card .item .h2{font-family:var(--sans);font-size:22px;font-weight:800;letter-spacing:-0.015em;line-height:1.2;margin-bottom:6px;color:var(--bg)}
.delta-card .item .b{font-size:14px;line-height:1.6;color:rgba(244,242,236,0.78)}

/* ============= Essay ============= */
.essay-quote{margin:24px 0 32px;padding:32px 0;border-top:3px solid var(--ink);border-bottom:3px solid var(--ink);font-family:var(--sans);font-size:clamp(24px,3vw,38px);font-weight:700;letter-spacing:-0.025em;line-height:1.18;color:var(--ink);text-wrap:balance;max-width:1100px}
.essay-quote b{background:var(--acc);padding:0 6px;font-weight:800}
.essay-quote .em{color:var(--ink);font-weight:900;font-style:italic}

.essay-grid{margin-top:8px;display:grid;grid-template-columns:1fr 1fr;border-bottom:3px solid var(--ink)}
@media(max-width:760px){.essay-grid{grid-template-columns:1fr}}
.essay-grid .c{padding:32px 32px 32px 0;border-right:1px solid var(--ink)}
.essay-grid .c:nth-child(2){padding-left:32px;padding-right:0;border-right:none}
@media(max-width:760px){.essay-grid .c{padding:24px 0!important;border-right:none;border-bottom:1px solid var(--ink)}.essay-grid .c:last-child{border-bottom:none}}
.essay-grid .c .lab{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:12px}
.essay-grid .c .lab b{background:var(--ink);color:var(--acc);padding:3px 8px;letter-spacing:0.08em;font-weight:700}
.essay-grid .c .ans{font-family:var(--sans);font-size:clamp(26px,3.2vw,36px);font-weight:900;letter-spacing:-0.025em;line-height:1.1;margin-bottom:14px;text-wrap:balance}
.essay-grid .c .ans s{font-weight:400;color:var(--ink-4);text-decoration-thickness:2px}
.essay-grid .c .desc{font-size:16px;line-height:1.7;color:var(--ink-2);font-weight:500}
.essay-grid .c .desc b{font-weight:800;color:var(--ink)}

.essay-merge{margin-top:0;padding:48px 44px;background:var(--acc);color:var(--ink);position:relative}
@media(max-width:680px){.essay-merge{padding:32px 22px}}
.essay-merge .lab{font-family:var(--mono);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink);font-weight:700;margin-bottom:10px}
.essay-merge .lab b{background:var(--ink);color:var(--acc);padding:3px 8px;letter-spacing:0.08em;font-weight:700}
.essay-merge .ans{font-family:var(--sans);font-size:clamp(32px,4.2vw,56px);font-weight:900;letter-spacing:-0.03em;line-height:1.05;margin-bottom:14px;color:var(--ink);text-wrap:balance}
.essay-merge .desc{font-size:17px;line-height:1.6;color:var(--ink);max-width:780px;font-weight:600}
.essay-merge .desc b{background:var(--ink);color:var(--acc);padding:0 4px;font-weight:800}

.tenets{margin-top:48px;display:grid;grid-template-columns:repeat(4,1fr);border-top:3px solid var(--ink);border-bottom:3px solid var(--ink)}
@media(max-width:760px){.tenets{grid-template-columns:1fr 1fr}}
@media(max-width:460px){.tenets{grid-template-columns:1fr}}
.tenets .t{padding:24px 22px;border-right:1px solid var(--ink);border-bottom:1px solid var(--ink)}
.tenets .t:nth-child(4n){border-right:none}
.tenets .t:nth-last-child(-n+4){border-bottom:none}
.tenets .t .n{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;color:var(--ink-3);font-weight:700;margin-bottom:10px}
.tenets .t .ti{font-family:var(--sans);font-size:19px;font-weight:800;letter-spacing:-0.015em;line-height:1.2;margin-bottom:6px}
.tenets .t .d{font-size:14px;line-height:1.65;color:var(--ink-2);font-weight:500}

/* ============= Roadmap ============= */
.arc{margin-top:32px;display:grid;grid-template-columns:repeat(6,1fr);border-top:3px solid var(--ink);border-bottom:3px solid var(--ink)}
@media(max-width:880px){.arc{grid-template-columns:repeat(3,1fr)}}
@media(max-width:460px){.arc{grid-template-columns:1fr 1fr}}
.arc .a{padding:22px 18px;border-right:1px solid var(--ink);border-bottom:1px solid var(--ink)}
.arc .a:last-child,.arc .a:nth-child(6n){border-right:none}
.arc .a:nth-last-child(-n+6){border-bottom:none}
@media(max-width:880px){.arc .a:nth-child(6n){border-right:1px solid var(--ink)}.arc .a:nth-child(3n){border-right:none}}
.arc .a .n{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;color:var(--ink-3);font-weight:700;margin-bottom:12px}
.arc .a .t{font-family:var(--sans);font-size:18px;font-weight:800;letter-spacing:-0.015em;line-height:1.2;color:var(--ink)}

.schedule{margin-top:48px;border-top:3px solid var(--ink);border-bottom:3px solid var(--ink)}
.schedule .row{display:grid;grid-template-columns:80px 1fr 1.5fr 180px;align-items:baseline;padding:22px 0;border-bottom:1px solid var(--ink);gap:24px}
.schedule .row:last-child{border-bottom:none}
.schedule .row:hover{background:var(--acc)}
.schedule .row .wk{font-family:var(--sans);font-size:38px;font-weight:900;letter-spacing:-0.04em;color:var(--ink);line-height:0.9}
