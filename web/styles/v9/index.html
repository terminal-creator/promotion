<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>S5/2026 · Bento · Agentic & Post-Train</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EEEDE9;
  --bg-2:#E2E0D8;
  --card:#FFFFFF;
  --card-dark:#0A0A0A;
  --card-ink:#1E1D1A;
  --card-acc:#FF5A1F;       /* vibrant orange */
  --card-acc-2:#0F4C2A;     /* deep emerald */
  --card-acc-3:#FFD66B;     /* sunflower */
  --card-acc-4:#0048CB;     /* royal blue */
  --ink:#0A0A0A;
  --ink-2:#1F1F1F;
  --ink-3:#525252;
  --ink-4:#8A8A8A;
  --line:#0A0A0A;
  --line-soft:#D8D5CC;
  --acc:#FF5A1F;
  --r:24px;
  --r-sm:14px;
  --sans:"Inter","PingFang SC","Microsoft YaHei",ui-sans-serif,system-ui,sans-serif;
  --mono:"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
}
html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:400;line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em}
a{color:inherit;text-decoration:none}
::selection{background:var(--card-dark);color:#fff}
.mono{font-family:var(--mono)}

/* ============= Container ============= */
.wrap{max-width:1320px;margin:0 auto;padding:0 28px}
@media(max-width:680px){.wrap{padding:0 16px}}

/* ============= Top bar ============= */
.top{
  position:sticky;top:0;z-index:60;background:var(--bg);
  border-bottom:1px solid rgba(10,10,10,0.08);
  backdrop-filter:saturate(180%) blur(12px);background:rgba(238,237,233,0.85);
}
.top-in{max-width:1320px;margin:0 auto;padding:14px 28px;display:flex;justify-content:space-between;align-items:center;gap:18px}
.top-l{display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:12px;letter-spacing:0.04em;color:var(--ink-3)}
.top-l b{color:var(--ink);font-weight:700;letter-spacing:0}
.top-l .sq{width:12px;height:12px;background:var(--acc);border-radius:3px}
.top-l .badge{background:var(--card-dark);color:#fff;padding:4px 10px;border-radius:99px;font-size:10.5px;letter-spacing:0.08em;font-weight:600}
.top nav{display:flex;gap:6px}
.top nav a{padding:6px 12px;border-radius:99px;font-size:13px;font-weight:500;color:var(--ink-2);transition:all 0.15s}
.top nav a:hover{background:rgba(10,10,10,0.08);color:var(--ink)}
@media(max-width:880px){.top nav{display:none}.top-in{padding:12px 16px}}

/* ============= Bento grid ============= */
.section{padding:36px 0}
.section + .section{padding-top:0}
.section-h{padding:36px 0 22px;display:flex;align-items:end;justify-content:space-between;gap:20px;flex-wrap:wrap}
.section-h .l{flex:1;min-width:240px}
.section-h .lab{font-family:var(--mono);font-size:11.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-h .lab::before{content:'';width:14px;height:14px;background:var(--acc);border-radius:4px}
.section-h h2{font-size:clamp(34px,5vw,52px);font-weight:800;letter-spacing:-0.035em;line-height:1.04;color:var(--ink);margin:0;text-wrap:balance}
.section-h h2 em{font-style:normal;background:linear-gradient(180deg,transparent 62%,var(--card-acc-3) 62%);padding:0 4px;color:var(--ink)}
.section-h h2 .acc{color:var(--acc)}
.section-h .lead{font-size:17px;line-height:1.6;color:var(--ink-2);max-width:520px;margin-top:14px}
.section-h .lead b{font-weight:700;color:var(--ink)}

.bento{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
@media(max-width:980px){.bento{grid-template-columns:repeat(6,1fr)}}
@media(max-width:560px){.bento{grid-template-columns:1fr 1fr}}

.tile{
  background:var(--card);border-radius:var(--r);padding:28px;
  position:relative;overflow:hidden;
  border:1px solid rgba(10,10,10,0.06);
  transition:transform 0.2s,box-shadow 0.2s;
}
.tile:hover{transform:translateY(-2px);box-shadow:0 12px 30px -10px rgba(10,10,10,0.12)}
.tile.dark{background:var(--card-dark);color:#fff;border-color:var(--card-dark)}
.tile.dark *{color:inherit}
.tile.acc{background:var(--acc);color:#fff;border-color:var(--acc)}
.tile.acc2{background:var(--card-acc-2);color:#fff;border-color:var(--card-acc-2)}
.tile.acc3{background:var(--card-acc-3);color:var(--ink);border-color:var(--card-acc-3)}
.tile.acc4{background:var(--card-acc-4);color:#fff;border-color:var(--card-acc-4)}
.tile.flat{background:transparent;border:none;padding:0}
.tile.flat:hover{transform:none;box-shadow:none}
.tile.pad-lg{padding:36px}
.tile.pad-sm{padding:18px}

/* spans */
.col-2{grid-column:span 2}
.col-3{grid-column:span 3}
.col-4{grid-column:span 4}
.col-5{grid-column:span 5}
.col-6{grid-column:span 6}
.col-7{grid-column:span 7}
.col-8{grid-column:span 8}
.col-9{grid-column:span 9}
.col-12{grid-column:span 12}
@media(max-width:980px){
  .col-2,.col-3,.col-4,.col-5,.col-6,.col-7,.col-8,.col-9,.col-12{grid-column:span 6}
  .col-md-3{grid-column:span 3}
  .col-md-6{grid-column:span 6}
}
@media(max-width:560px){
  .col-2,.col-3,.col-4,.col-5,.col-6,.col-7,.col-8,.col-9,.col-12,.col-md-3,.col-md-6{grid-column:span 2}
}

/* ============= Hero bento ============= */
.hero-bento{padding-top:18px;padding-bottom:0}
.tile-main{padding:42px 44px;min-height:440px;display:flex;flex-direction:column;justify-content:space-between;gap:24px;position:relative}
@media(max-width:680px){.tile-main{padding:28px;min-height:auto}}
.tile-main .pill{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);padding:7px 16px;border-radius:99px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;font-weight:500;align-self:flex-start;border:1px solid rgba(255,255,255,0.2)}
.tile-main .pill .dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:0.45}50%{opacity:1}}
.tile-main .pill b{font-weight:700;letter-spacing:0}
.tile-main h1{font-size:clamp(38px,5.8vw,72px);font-weight:800;line-height:0.96;letter-spacing:-0.045em;color:#fff;margin:0;text-wrap:balance}
.tile-main h1 .l1{display:block;font-size:0.32em;font-weight:500;color:rgba(255,255,255,0.6);margin-bottom:14px;letter-spacing:-0.01em}
.tile-main h1 .l2{display:block;color:#fff}
.tile-main h1 .acc{background:linear-gradient(90deg,#FF8050,#FFD66B);-webkit-background-clip:text;background-clip:text;color:transparent}
.tile-main h1 .it{font-style:italic;font-weight:500;color:var(--card-acc-3)}
.tile-main p{font-size:17px;line-height:1.6;color:rgba(255,255,255,0.78);max-width:680px;margin-top:14px}
.tile-main p b{color:#fff;font-weight:700}

.hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:8px}
@media(max-width:680px){.hero-grid{grid-template-columns:1fr 1fr}}
.hero-grid .s{background:rgba(255,255,255,0.07);padding:14px 16px;border-radius:var(--r-sm);border:1px solid rgba(255,255,255,0.1)}
.hero-grid .s .n{font-size:30px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:#fff}
.hero-grid .s .n .u{font-size:13px;font-weight:500;color:rgba(255,255,255,0.55);margin-left:3px}
.hero-grid .s .l{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-top:8px}

/* Self-check tile */
.tile-check .h{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.tile-check .h .dot{width:8px;height:8px;background:var(--acc);border-radius:50%;animation:blink 2s ease-in-out infinite}
.tile-check h3{font-size:24px;font-weight:800;letter-spacing:-0.02em;line-height:1.2;margin-bottom:14px}
.tile-check h3 .sub{display:block;font-size:13px;font-weight:500;color:var(--ink-3);margin-top:4px;letter-spacing:0}
.tile-check .qs{margin-top:8px;display:flex;flex-direction:column;gap:0}
.tile-check .q{display:grid;grid-template-columns:auto 1fr;gap:12px;padding:11px 0;border-top:1px dashed var(--line-soft)}
.tile-check .q:first-of-type{border-top:none}
.tile-check .q .n{font-family:var(--mono);font-size:11.5px;color:var(--acc);font-weight:700;letter-spacing:0.04em;padding-top:2px}
.tile-check .q .t{font-size:14px;line-height:1.55;color:var(--ink)}
.tile-check .q .t b{color:var(--acc);font-weight:700}
.tile-check .foot{margin-top:14px;padding-top:12px;border-top:1px solid var(--line-soft);font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:0.04em}
.tile-check .foot b{color:var(--acc);font-weight:700}

/* Pain rows tile */
.tile-pain .h{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.7);font-weight:700;margin-bottom:8px}
.tile-pain h3{font-size:30px;font-weight:800;letter-spacing:-0.025em;line-height:1.05;margin-bottom:20px;color:#fff}
.tile-pain .row{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:baseline;padding:9px 0;border-top:1px solid rgba(255,255,255,0.12)}
.tile-pain .row:first-of-type{border-top:none;padding-top:0}
.tile-pain .row .n{font-family:var(--mono);font-size:11px;color:var(--card-acc-3);font-weight:700;letter-spacing:0.04em}
.tile-pain .row .t{font-size:14.5px;line-height:1.5;color:rgba(255,255,255,0.9)}
.tile-pain .row .t s{color:rgba(255,255,255,0.42);font-weight:400}
.tile-pain .row .t em{font-style:normal;color:var(--card-acc-3);font-weight:600}
.tile-pain .row .t b{color:#fff;font-weight:700}

/* ============= Chronicle tiles ============= */
.chron .tile-coh{display:flex;flex-direction:column;height:100%;min-height:480px}
.chron .tile-coh .tag{font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:14px}
.chron .tile-coh .id{font-size:80px;font-weight:900;letter-spacing:-0.05em;line-height:0.86;color:var(--ink);margin-bottom:8px}
.chron .tile-coh .ti{font-size:18px;font-weight:700;line-height:1.25;margin-bottom:4px}
.chron .tile-coh .span{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:0.04em;margin-bottom:18px}
.chron .tile-coh .lab{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--acc);font-weight:700;margin:14px 0 6px}
.chron .tile-coh .lab:first-of-type{margin-top:0}
.chron .tile-coh ul{margin:0;padding-left:16px;font-size:13px;line-height:1.55;color:var(--ink-2)}
.chron .tile-coh ul li{margin-bottom:2px}
.chron .tile-coh ul li b{color:var(--ink);font-weight:600}
.chron .tile-coh ul li .new{background:var(--card-acc-3);padding:0 3px;border-radius:3px;color:var(--ink);font-weight:600}
.chron .tile-coh .foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line-soft);font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:0.04em}
.chron .tile-coh.now{background:var(--card-dark);color:#fff;border-color:var(--card-dark)}
.chron .tile-coh.now .id{color:var(--acc)}
.chron .tile-coh.now .tag{color:var(--acc);font-weight:700}
.chron .tile-coh.now .span{color:rgba(255,255,255,0.55)}
.chron .tile-coh.now .lab{color:var(--card-acc-3)}
.chron .tile-coh.now ul{color:rgba(255,255,255,0.85)}
.chron .tile-coh.now ul li b{color:#fff}
.chron .tile-coh.now .foot{color:var(--card-acc-3);font-weight:700;border-color:rgba(255,255,255,0.15)}
.chron .tile-coh .pin{position:absolute;top:14px;right:14px;background:var(--card-acc-3);color:var(--ink);padding:4px 10px;border-radius:99px;font-family:var(--mono);font-size:10.5px;letter-spacing:0.08em;font-weight:700}

.tile-delta .lab{font-family:var(--mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--card-acc-3);font-weight:700;margin-bottom:10px}
.tile-delta h3{font-size:32px;font-weight:800;letter-spacing:-0.025em;line-height:1.1;margin-bottom:10px;color:#fff}
.tile-delta p{font-size:14.5px;color:rgba(255,255,255,0.7);line-height:1.6;margin-bottom:22px;max-width:520px}
.tile-delta .items{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:680px){.tile-delta .items{grid-template-columns:1fr}}
.tile-delta .item{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);padding:18px;border-radius:var(--r-sm)}
.tile-delta .item .n{font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--card-acc-3);font-weight:700;margin-bottom:6px}
.tile-delta .item .h2{font-size:17px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:6px}
.tile-delta .item .b{font-size:13.5px;line-height:1.6;color:rgba(255,255,255,0.78)}

/* ============= Essay tiles ============= */
.essay .tile{display:flex;flex-direction:column}
.essay .lab{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:10px}
.essay .lab b{color:var(--acc)}
.essay .ans{font-size:26px;font-weight:800;letter-spacing:-0.02em;line-height:1.2;margin-bottom:10px}
.essay .ans s{color:var(--ink-4);font-weight:400}
.essay .desc{font-size:14.5px;line-height:1.65;color:var(--ink-2)}
.essay .desc b{color:var(--ink);font-weight:700}
.essay .merge{background:var(--card-dark);color:#fff;text-align:center;padding:48px 36px;position:relative}
.essay .merge::before{content:'×';position:absolute;top:-18px;left:50%;transform:translateX(-50%);width:48px;height:48px;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;border-radius:50%;border:4px solid var(--bg)}
.essay .merge .lab{color:var(--card-acc-3)}
.essay .merge .ans{color:#fff;font-size:32px}
.essay .merge .desc{color:rgba(255,255,255,0.78);max-width:620px;margin:0 auto;font-size:15.5px}
.essay .merge .desc b{color:#fff}

.tenets{margin-top:16px}
.tenets .tile{padding:22px}
.tenets .n{font-family:var(--mono);font-size:11px;color:var(--acc);font-weight:700;letter-spacing:0.06em;margin-bottom:6px}
.tenets .t{font-size:16px;font-weight:700;line-height:1.3;margin-bottom:6px}
.tenets .d{font-size:13.5px;line-height:1.6;color:var(--ink-2)}

/* ============= Roadmap tiles ============= */
.arc .tile{padding:22px;display:flex;flex-direction:column;justify-content:space-between;min-height:140px;background:var(--card)}
.arc .n{font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:12px}
.arc .t{font-size:17px;font-weight:700;line-height:1.3;color:var(--ink);letter-spacing:-0.01em}

.tile-table{padding:0;overflow:hidden}
.tile-table .head{padding:14px 24px;background:var(--card-dark);color:#fff;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase}
.tile-table .head b{color:var(--card-acc-3)}
.tile-table .row{display:grid;grid-template-columns:80px 1fr 1.4fr 200px;padding:14px 24px;border-bottom:1px solid rgba(10,10,10,0.07);align-items:center;gap:18px}
.tile-table .row:last-child{border-bottom:none}
.tile-table .row:hover{background:rgba(255,90,31,0.04)}
.tile-table .row .wk{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--acc);letter-spacing:0.04em}
.tile-table .row .topic{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-0.01em}
.tile-table .row .pos{font-size:14px;color:var(--ink-2)}
.tile-table .row .stage{font-family:var(--mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-3);text-align:right}
@media(max-width:760px){
  .tile-table .row{grid-template-columns:60px 1fr;gap:8px;padding:12px 18px}
  .tile-table .head{padding:12px 18px}
  .tile-table .row .pos,.tile-table .row .stage{display:none}
}

/* ============= Week bento ============= */
.week-block{padding:36px 0 0}
.week-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
@media(max-width:980px){.week-bento{grid-template-columns:repeat(6,1fr)}}
@media(max-width:560px){.week-bento{grid-template-columns:1fr 1fr}}

.week-title-tile{
  background:var(--card-dark);color:#fff;padding:36px;border-radius:var(--r);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:space-between;min-height:240px;
}
.week-title-tile::before{content:'';position:absolute;right:-40px;top:-40px;width:280px;height:280px;background:radial-gradient(circle,rgba(255,90,31,0.32) 0%,transparent 70%);pointer-events:none}
.week-title-tile .top-row{display:flex;justify-content:space-between;align-items:start;gap:14px;position:relative}
.week-title-tile .wk{font-size:80px;font-weight:900;line-height:0.84;letter-spacing:-0.04em;color:var(--acc);font-family:var(--sans);font-feature-settings:"ss01"}
.week-title-tile .prog{text-align:right;font-family:var(--mono);font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.5);line-height:1.6}
.week-title-tile .prog b{display:block;font-family:var(--sans);font-size:22px;color:#fff;font-weight:700;letter-spacing:-0.02em}
.week-title-tile .meta{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--card-acc-3);font-weight:700;margin-top:14px}
.week-title-tile h3{font-size:28px;font-weight:800;letter-spacing:-0.025em;line-height:1.15;margin-top:6px;color:#fff;position:relative}
@media(max-width:680px){.week-title-tile{padding:24px;min-height:auto}.week-title-tile .wk{font-size:56px}.week-title-tile h3{font-size:22px}}

.week-narr-tile{padding:32px}
.week-narr-tile .lab{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px;display:flex;gap:10px;align-items:center}
.week-narr-tile .lab::before{content:'§';font-family:var(--sans);font-weight:900;font-size:14px}
.week-narr-tile p{font-size:16px;line-height:1.7;color:var(--ink);margin-bottom:14px}
.week-narr-tile p:last-child{margin-bottom:0}
.week-narr-tile p b{font-weight:700;color:var(--ink)}
.week-narr-tile p em{font-style:normal;background:var(--card-acc-3);padding:0 3px;font-weight:600}
.week-narr-tile p .strong{font-weight:700;color:var(--ink)}
.week-narr-tile .sub{margin-top:14px;padding:14px 16px;background:var(--bg-2);border-radius:var(--r-sm);font-size:14.5px;color:var(--ink-2);line-height:1.6}
.week-narr-tile .sub b{font-weight:700;color:var(--ink)}

.week-hl-tile{padding:24px}
.week-hl-tile .lab{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:8px}
.week-hl-tile .lab b{color:var(--ink)}
.week-hl-tile .h{font-size:18px;font-weight:800;letter-spacing:-0.015em;line-height:1.2;margin-bottom:8px}
.week-hl-tile .h .acc{color:var(--acc)}
.week-hl-tile .b{font-size:13.5px;line-height:1.6;color:var(--ink-2)}
.week-hl-tile .b code{font-family:var(--mono);font-size:12px;background:var(--bg-2);padding:1px 5px;border-radius:4px;color:var(--ink)}

.week-ch-tile{padding:0;overflow:hidden}
