<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>$ s5 --help # 2026 大模型冲刺营 · CLI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0E0A;
  --bg-2:#10140E;
  --bg-3:#171C13;
  --panel:#0E1209;
  --line:#27331F;
  --line-soft:#1B221A;
  --ink:#E8E2C7;
  --ink-2:#B4AE91;
  --ink-3:#6F6D55;
  --ink-4:#3F4434;
  --amber:#F0B23A;        /* CRT amber */
  --green:#7FC36B;        /* phosphor green */
  --red:#E55050;
  --blue:#5DA9D4;
  --magenta:#C792EA;
  --mono:"JetBrains Mono","SF Mono","IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
  --sans:"Inter","PingFang SC","Microsoft YaHei",ui-sans-serif,system-ui,sans-serif;
}
html,body{background:var(--bg);color:var(--ink);font-family:var(--mono);font-weight:400;line-height:1.65;-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","calt"}
body{
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(240,178,58,0.04), transparent 50%),
    repeating-linear-gradient(0deg, rgba(127,195,107,0.025) 0 1px, transparent 1px 4px);
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
a:hover{color:var(--amber)}
::selection{background:var(--amber);color:var(--bg)}

.wrap{max-width:1080px;margin:0 auto;padding:0 28px}
@media(max-width:680px){.wrap{padding:0 16px}}
.amber{color:var(--amber)}
.green{color:var(--green)}
.red{color:var(--red)}
.blue{color:var(--blue)}
.mag{color:var(--magenta)}
.dim{color:var(--ink-3)}
.bri{color:var(--ink);font-weight:600}

/* cursor blink */
.cur::after{content:'▮';color:var(--amber);margin-left:2px;animation:cur 1s steps(2,end) infinite}
@keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}

/* top bar — fake terminal tabs */
.top{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line)}
.top-bar{display:flex;align-items:center;background:#000;border-bottom:1px solid var(--line)}
.top-dots{display:flex;gap:7px;padding:0 12px}
.top-dots span{width:11px;height:11px;border-radius:50%;background:#3a3a3a}
.top-dots span:nth-child(1){background:#E55050}
.top-dots span:nth-child(2){background:#F0B23A}
.top-dots span:nth-child(3){background:#7FC36B}
.top-title{flex:1;text-align:center;padding:8px 0;font-size:11.5px;letter-spacing:0.06em;color:var(--ink-3)}
.top-title b{color:var(--ink);font-weight:600}
.top-meta{padding:0 12px;font-size:10px;color:var(--ink-4);letter-spacing:0.08em}
.top-nav{max-width:1080px;margin:0 auto;padding:9px 28px;display:flex;gap:16px;font-size:11.5px;color:var(--ink-3);letter-spacing:0.04em;overflow-x:auto;scrollbar-width:none}
.top-nav::-webkit-scrollbar{display:none}
.top-nav a{display:inline-flex;gap:6px;align-items:center;white-space:nowrap}
.top-nav a::before{content:'$';color:var(--green);font-weight:700}
.top-nav a:hover{color:var(--amber)}

/* shell prompt */
.shell{padding:24px 0;font-size:13.5px;color:var(--ink-2)}
.shell .ln{display:flex;gap:8px;align-items:baseline;margin-bottom:4px;font-size:13px}
.shell .ln .p{color:var(--green);font-weight:700;flex-shrink:0}
.shell .ln .p::after{content:'~/s5'}
.shell .ln.alt .p::after{content:'~/s5/curriculum'}
.shell .ln.weeks .p::after{content:'~/s5/weeks'}
.shell .ln.proj .p::after{content:'~/s5/capstone'}
.shell .ln.colo .p::after{content:'~/s5/enroll'}
.shell .ln .p b{color:var(--amber);font-weight:700;margin-right:2px}
.shell .ln .p b::before{content:'➜ '}
.shell .ln .c{color:var(--ink);font-weight:500}
.shell .out{color:var(--ink-2);padding:4px 0 14px 22px;font-size:12.5px;line-height:1.65}

/* ASCII separator */
.sep-line{font-size:12.5px;color:var(--ink-3);letter-spacing:0;line-height:1;margin:24px 0;white-space:nowrap;overflow:hidden;font-weight:500;user-select:none}
.sep-h{
  margin:48px 0 14px;border-top:1px solid var(--line);padding:18px 0 4px;
  font-size:14px;color:var(--amber);letter-spacing:0.04em;font-weight:600;display:flex;align-items:baseline;gap:14px
}
.sep-h .meta{color:var(--ink-3);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;font-weight:500}
.sep-h::before{content:'##';color:var(--green);font-weight:700;margin-right:4px}

/* HERO === ASCII banner ============== */
.hero{padding:32px 0 18px;border-bottom:1px solid var(--line)}
.hero-banner{margin:14px 0 18px;padding:28px 0 22px;border-top:1px dashed var(--line);border-bottom:1px dashed var(--line)}
.brand-block{display:flex;flex-wrap:wrap;align-items:baseline;gap:0 18px;justify-content:flex-start}
.bb-big{
  font-family:var(--mono);font-weight:800;
  font-size:clamp(56px,11vw,140px);letter-spacing:-0.04em;line-height:0.92;
  color:var(--amber);text-shadow:0 0 14px rgba(240,178,58,0.45),0 0 28px rgba(240,178,58,0.18);
  font-feature-settings:"tnum","ss01";
}
.bb-sep{
  font-family:var(--mono);font-weight:800;color:var(--green);
  font-size:clamp(36px,7vw,90px);letter-spacing:-0.02em;line-height:0.92;
  align-self:baseline;opacity:0.85;
}
.bb-sub{width:100%;margin-top:18px;font-family:var(--mono);font-size:clamp(11px,1vw,13.5px);letter-spacing:0.06em;color:var(--ink-2);font-weight:500}
.bb-sub:nth-of-type(2){color:var(--ink-3);margin-top:2px}
.bb-sub::before{content:'  ';color:var(--green);font-weight:700;margin-right:8px}
.hero-tag{font-size:13px;color:var(--green);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.hero-tag::before{content:'>';color:var(--amber);font-weight:700}
.hero-tag .bullet{display:inline-block;width:8px;height:8px;background:var(--amber);border-radius:50%;box-shadow:0 0 8px rgba(240,178,58,0.6);animation:pulse 1.4s ease-in-out infinite;margin-right:2px}
@keyframes pulse{0%,100%{opacity:0.35}50%{opacity:1}}

.hero-sub{margin:18px 0 22px;font-size:14px;color:var(--ink-2);line-height:1.75;max-width:820px}
.hero-sub b{color:var(--amber);font-weight:600}

.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);font-size:12.5px}
.hero-stat{background:var(--bg-2);padding:14px 16px}
.hero-stat .k{color:var(--ink-3);font-size:11px;letter-spacing:0.08em}
.hero-stat .k::before{content:'$ '}
.hero-stat .v{color:var(--amber);font-size:24px;font-weight:700;letter-spacing:-0.01em;line-height:1.1;margin-top:6px}
.hero-stat .v .u{font-size:13px;color:var(--ink-2);font-weight:500;margin-left:3px}
.hero-stat .d{color:var(--ink-3);font-size:11px;margin-top:4px}
@media(max-width:680px){.hero-stats{grid-template-columns:1fr 1fr}}

/* self-check */
.tile-check{margin-top:24px;border:1px solid var(--line);background:var(--bg-2)}
.tile-check .h{padding:9px 14px;border-bottom:1px solid var(--line);background:#000;font-size:12px;color:var(--green);font-weight:700;display:flex;justify-content:space-between;align-items:center}
.tile-check .h .l{display:flex;gap:8px;align-items:center}
.tile-check .h .l::before{content:'$ man self-check.5';color:var(--ink-3);font-weight:500;margin-right:6px}
.tile-check .h .r{color:var(--ink-3);font-size:10.5px;letter-spacing:0.04em;font-weight:500}
.tile-check .body{padding:6px 16px 4px}
.tile-check .q{display:grid;grid-template-columns:auto 1fr;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line-soft);font-size:13px;line-height:1.55}
.tile-check .q:last-of-type{border-bottom:none}
.tile-check .q .n{color:var(--amber);font-weight:700}
.tile-check .q .t{color:var(--ink-2)}
.tile-check .q .t b{color:var(--amber);font-weight:700}
.tile-check .foot{padding:10px 14px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-3);letter-spacing:0.02em}
.tile-check .foot b{color:var(--amber);font-weight:700}

/* hook (pain) */
.hook{margin-top:24px;border:1px solid var(--red);background:rgba(229,80,80,0.05)}
.hook .h{padding:9px 14px;background:rgba(229,80,80,0.1);border-bottom:1px solid var(--red);color:var(--red);font-size:12px;font-weight:700;display:flex;gap:12px;align-items:center;letter-spacing:0.04em}
.hook .h::before{content:'! WARN';background:var(--red);color:#000;padding:1px 6px;font-weight:700;font-size:10.5px;letter-spacing:0.08em}
.hook .body{padding:14px 16px}
.hook .row{display:grid;grid-template-columns:auto 1fr;gap:14px;padding:6px 0;font-size:13px;line-height:1.55}
.hook .row .n{color:var(--red);font-weight:700;width:32px}
.hook .row .t{color:var(--ink-2)}
.hook .row .t s{color:var(--ink-4);text-decoration:line-through}
.hook .row .t em{font-style:normal;color:var(--amber);font-weight:600}
.hook .row .t b{color:var(--ink);font-weight:600}

/* S-series as fake `ls -l` ===========*/
.ls-table{margin-top:14px;font-size:13px;border:1px solid var(--line);background:var(--bg-2)}
.ls-table .head{padding:9px 14px;background:#000;border-bottom:1px solid var(--line);color:var(--green);font-weight:700;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.ls-table .head::before{content:'$ ls -l ~/s5/cohorts'}
.ls-table .head .r{color:var(--ink-3);font-size:10.5px;font-weight:500;letter-spacing:0.04em}
.ls-row{display:grid;grid-template-columns:90px 70px 1fr 130px 90px;gap:14px;padding:8px 14px;border-bottom:1px solid var(--line-soft);font-size:12.5px;align-items:baseline}
.ls-row:last-child{border-bottom:none}
.ls-row .perm{color:var(--ink-3)}
.ls-row .perm::before{content:'drwxr-x---'}
.ls-row .id{color:var(--amber);font-weight:700}
.ls-row .name{color:var(--ink);font-weight:500}
.ls-row.now .name{color:var(--green);font-weight:700}
.ls-row.now .id{color:var(--green)}
.ls-row .span{color:var(--ink-3);font-size:11.5px;text-align:right}
.ls-row .tag{color:var(--ink-3);font-size:10.5px;text-align:right;letter-spacing:0.04em}
.ls-row.now .tag{color:var(--green);font-weight:700}
@media(max-width:680px){.ls-row{grid-template-columns:60px 1fr 70px;gap:10px}.ls-row .perm,.ls-row .tag{display:none}}

.cohorts{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.cohorts{grid-template-columns:1fr}}
.coh{border:1px solid var(--line);background:var(--bg-2);padding:18px 18px;font-size:12.5px}
.coh.now{border-color:var(--amber);background:rgba(240,178,58,0.05);position:relative}
.coh.now::before{content:'★ CURRENT';position:absolute;top:8px;right:8px;background:var(--amber);color:var(--bg);padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:0.08em}
.coh .tag{color:var(--ink-3);font-size:11px;letter-spacing:0.06em;margin-bottom:6px}
.coh .id{color:var(--amber);font-size:38px;font-weight:800;line-height:0.9;letter-spacing:-0.03em;margin-bottom:4px}
.coh.now .id{color:var(--green)}
.coh .ti{color:var(--ink);font-weight:700;font-size:14.5px;line-height:1.3;margin:4px 0 2px}
.coh .span{color:var(--ink-3);font-size:11.5px;margin-bottom:12px}
.coh .lab{color:var(--green);font-weight:700;font-size:11px;letter-spacing:0.06em;margin:10px 0 6px}
.coh .lab::before{content:'# '}
.coh ul{list-style:none;padding:0;margin:0;color:var(--ink-2);line-height:1.6}
.coh ul li{padding-left:14px;position:relative;font-size:12px}
.coh ul li::before{content:'-';position:absolute;left:0;color:var(--ink-3)}
.coh ul li b{color:var(--ink);font-weight:600}
.coh ul li .new{color:var(--amber);font-weight:700;background:rgba(240,178,58,0.12);padding:0 3px}
.coh .foot{color:var(--ink-3);font-style:italic;font-size:11.5px;margin-top:12px;padding-top:10px;border-top:1px dashed var(--line-soft)}
.coh.now .foot{color:var(--amber);font-weight:700;font-style:normal}

.delta{margin-top:18px;border:1px solid var(--amber);background:rgba(240,178,58,0.04);padding:18px 20px}
.delta .lab{color:var(--amber);font-size:11px;letter-spacing:0.1em;font-weight:700;margin-bottom:4px}
.delta .lab::before{content:'+ DIFF · '}
.delta .h{color:var(--ink);font-size:18px;font-weight:700;letter-spacing:-0.01em;margin-bottom:4px}
.delta .d{color:var(--ink-3);font-size:12.5px;font-style:italic;margin-bottom:14px}
.delta .items{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:680px){.delta .items{grid-template-columns:1fr}}
.delta .item{border-left:2px solid var(--amber);padding-left:12px;font-size:12px}
.delta .item .n{color:var(--amber);font-weight:700;font-size:10.5px;letter-spacing:0.06em;margin-bottom:4px}
.delta .item .h2{color:var(--ink);font-size:14px;font-weight:700;line-height:1.25;margin-bottom:4px}
.delta .item .b{color:var(--ink-2);font-size:12px;line-height:1.55}

/* essay ============= */
.essay-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
@media(max-width:760px){.essay-grid{grid-template-columns:1fr}}
.essay-col{border:1px solid var(--line);background:var(--bg-2);padding:18px 20px}
.essay-col .lab{font-size:11px;color:var(--ink-3);letter-spacing:0.06em;margin-bottom:8px}
.essay-col .lab b{color:var(--red);font-weight:700}
.essay-col .lab::before{content:'// '}
.essay-col .ans{color:var(--ink);font-size:18px;font-weight:700;letter-spacing:-0.01em;line-height:1.2;margin-bottom:8px}
.essay-col .ans s{color:var(--ink-4);text-decoration:line-through;font-weight:400}
.essay-col .desc{color:var(--ink-2);font-size:12.5px;line-height:1.65}
.essay-col .desc b{color:var(--amber);font-weight:600}
.essay-merge{margin-top:14px;border:1px solid var(--green);background:rgba(127,195,107,0.05);padding:24px 24px;text-align:left}
.essay-merge .lab{color:var(--green);font-size:11px;letter-spacing:0.08em;font-weight:700;margin-bottom:6px}
.essay-merge .lab::before{content:'== '}
.essay-merge .lab::after{content:' =='}
.essay-merge .ans{color:var(--ink);font-size:22px;font-weight:800;letter-spacing:-0.02em;line-height:1.18;margin-bottom:8px}
.essay-merge .desc{color:var(--ink-2);font-size:13px;line-height:1.65;max-width:700px}
.essay-merge .desc b{color:var(--green);font-weight:600}

.essay-quote{margin:14px 0;padding:14px 18px;border-left:3px solid var(--amber);font-size:14px;line-height:1.6;color:var(--ink);background:var(--bg-2);font-style:italic}
.essay-quote b{color:var(--amber);font-style:normal;font-weight:700}
.essay-quote .em{color:var(--green);font-style:normal;font-weight:700}

.tenets{margin-top:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
@media(max-width:680px){.tenets{grid-template-columns:1fr 1fr}}
.ten{background:var(--bg-2);padding:14px 14px;font-size:12px}
.ten .n{color:var(--amber);font-weight:700;font-size:10.5px;letter-spacing:0.08em;margin-bottom:4px}
.ten .n::before{content:'['}
.ten .n::after{content:']'}
.ten .t{color:var(--ink);font-weight:700;font-size:13px;line-height:1.3;margin-bottom:4px}
.ten .d{color:var(--ink-3);font-size:11.5px;line-height:1.55}

/* Roadmap arc tiles */
.arc-tiles{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:14px}
@media(max-width:760px){.arc-tiles{grid-template-columns:repeat(3,1fr)}}
@media(max-width:460px){.arc-tiles{grid-template-columns:1fr 1fr}}
.arc-tile{background:var(--bg-2);padding:14px 14px;font-size:12px}
.arc-tile .n{color:var(--green);font-weight:700;font-size:10.5px;letter-spacing:0.06em;margin-bottom:6px}
.arc-tile .n::before{content:'> '}
.arc-tile .t{color:var(--ink);font-weight:600;line-height:1.3;font-size:12.5px}

/* Roadmap table */
.route-tbl{margin-top:18px;border:1px solid var(--line);background:var(--bg-2)}
.route-tbl .h{padding:9px 14px;background:#000;border-bottom:1px solid var(--line);color:var(--green);font-weight:700;font-size:12px}
.route-tbl .h::before{content:'$ cat ~/s5/roadmap.txt'}
.route-tbl .row{display:grid;grid-template-columns:60px 1fr 1.2fr 160px;padding:8px 14px;border-bottom:1px solid var(--line-soft);font-size:12px;align-items:baseline;gap:14px}
.route-tbl .row:last-child{border-bottom:none}
.route-tbl .row:hover{background:rgba(240,178,58,0.04)}
.route-tbl .wk{color:var(--amber);font-weight:700}
.route-tbl .topic{color:var(--ink);font-weight:600}
.route-tbl .pos{color:var(--ink-3);font-style:italic}
.route-tbl .stage{color:var(--green);font-size:11px;letter-spacing:0.04em;text-align:right}
@media(max-width:680px){.route-tbl .row{grid-template-columns:50px 1fr}.route-tbl .pos,.route-tbl .stage{display:none}}

/* ============= Weeks ============== */
.week{margin-top:36px;border:1px solid var(--line);background:var(--bg-2)}
.week + .week{margin-top:22px}
.week-head{padding:14px 16px;background:#000;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.week-head .l{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.week-head .wk{color:var(--amber);font-weight:800;font-size:22px;letter-spacing:-0.02em;line-height:1}
.week-head .ti{color:var(--ink);font-weight:700;font-size:15.5px;line-height:1.3;letter-spacing:-0.005em}
.week-head .ti .sl{color:var(--ink-3);font-weight:500;margin-right:6px}
.week-head .ti .sl::before{content:'/'}
.week-head .meta{color:var(--green);font-size:10.5px;letter-spacing:0.06em;font-weight:600}
.week-head .stage{color:var(--ink-3);font-size:10.5px;letter-spacing:0.06em}
.week-head .stage b{color:var(--amber);font-weight:700}

.week-body{padding:14px 18px}

.why-line{font-size:11.5px;color:var(--green);font-weight:700;letter-spacing:0.06em;margin-bottom:8px;padding-top:6px}
.why-line::before{content:'# '}

.narr{font-size:13.5px;line-height:1.75;color:var(--ink-2);margin-bottom:14px}
.narr b{color:var(--ink);font-weight:600}
.narr em{font-style:normal;color:var(--amber);font-weight:600;background:rgba(240,178,58,0.1);padding:0 3px}
.narr .strong{color:var(--ink);font-weight:700;font-style:normal}
.narr-sub{font-size:12.5px;color:var(--ink-3);line-height:1.65;padding:10px 12px;background:var(--bg-3);border-left:2px solid var(--line);margin-bottom:14px}
.narr-sub b{color:var(--ink);font-weight:700}

.hl-list{margin-top:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
@media(max-width:760px){.hl-list{grid-template-columns:1fr}}
.hl{background:var(--bg-2);padding:12px 14px;font-size:12px}
.hl .lab{color:var(--ink-3);font-size:10.5px;letter-spacing:0.06em;margin-bottom:4px}
.hl .lab::before{content:'> '}
.hl .lab b{color:var(--amber);font-weight:700}
.hl .h{color:var(--ink);font-weight:700;font-size:13px;line-height:1.3;margin-bottom:4px}
.hl .h .acc{color:var(--amber)}
.hl .b{color:var(--ink-2);font-size:11.5px;line-height:1.6}
.hl .b code{color:var(--green);background:rgba(127,195,107,0.08);padding:1px 4px}

.ch-block{margin-top:14px;border:1px solid var(--line)}
.ch-block .h{padding:7px 14px;background:#000;border-bottom:1px solid var(--line);font-size:11px;color:var(--green);font-weight:700;display:flex;justify-content:space-between;align-items:center;letter-spacing:0.04em}
.ch-block .h::before{content:'$ tree '}
.ch-block .h .ct{color:var(--ink-3);font-weight:500;font-style:italic}
.ch-block table{width:100%;border-collapse:collapse;font-size:12px}
.ch-block td{padding:6px 14px;border-bottom:1px dashed var(--line-soft);line-height:1.55}
.ch-block tr:last-child td{border-bottom:none}
.ch-block .ch{color:var(--green);font-size:11px;width:160px;font-weight:600;letter-spacing:0.02em;vertical-align:top;padding-top:7px}
.ch-block .ch::before{content:'├─ '}
.ch-block .ti{color:var(--ink-2)}
.ch-block .ti b{color:var(--amber);font-weight:700}
@media(max-width:680px){
  .ch-block .ch{width:auto;display:block;padding-bottom:0;border-bottom:none}
  .ch-block .ti{display:block;padding-top:0;padding-bottom:8px}
  .ch-block tr{display:block;border-bottom:1px solid var(--line-soft)}
  .ch-block tr:last-child{border-bottom:none}
  .ch-block td{border-bottom:none}
}

.player{margin-top:14px;border:1px solid var(--line);background:#000}
.player .bar{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-bottom:1px solid var(--line);font-size:11px;color:var(--ink-3)}
.player .bar .ll{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.player .bar .dot{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px rgba(240,178,58,0.6);animation:pulse 1.5s infinite}
.player .bar .name{color:var(--amber);font-weight:700}
.player .bar .openlk{border:1px solid var(--green);color:var(--green);padding:3px 10px;font-size:10px;letter-spacing:0.08em;font-weight:700}
.player .bar .openlk::before{content:'[ '}
.player .bar .openlk::after{content:' ]'}
.player .bar .openlk:hover{background:var(--green);color:#000}
.player .frame-wrap{position:relative;aspect-ratio:16/10;background:#000}
.player iframe{width:100%;height:100%;border:0;display:block;background:#fff}
.player .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;text-align:center;background:repeating-linear-gradient(0deg,#0a0a0a 0 14px,#111 14px 28px);color:var(--ink-3);font-size:12px}
.player .ph .ph-h{font-size:18px;font-weight:700;color:var(--amber);letter-spacing:-0.01em}
.player .ph .ph-d{font-size:12px;color:var(--ink-3);line-height:1.6;max-width:500px}
.player .ph button{border:1px solid var(--amber);background:transparent;color:var(--amber);padding:7px 16px;font-size:11px;letter-spacing:0.08em;font-weight:700;cursor:pointer;font-family:var(--mono)}
.player .ph button:hover{background:var(--amber);color:#000}

.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.tag{font-size:11px;padding:3px 8px;border:1px solid var(--line);background:var(--bg-3);color:var(--ink-2);letter-spacing:0.02em}
.tag::before{content:'#';color:var(--green);margin-right:3px}

.output{margin-top:14px;border:1px solid var(--green);background:rgba(127,195,107,0.04);padding:14px 16px}
.output .lab{color:var(--green);font-size:11px;letter-spacing:0.06em;font-weight:700;margin-bottom:6px}
.output .lab::before{content:'$ echo '}
.output .b{color:var(--ink);font-size:13px;line-height:1.65}
.output .b b{color:var(--amber);font-weight:700}
.output ul{margin:10px 0 0;padding:0;list-style:none;display:grid;gap:5px}
.output li{font-size:12px;line-height:1.55;color:var(--ink-2);padding-left:18px;position:relative}
.output li::before{content:'> ';position:absolute;left:0;color:var(--green);font-weight:700}
.output li b{color:var(--ink);font-weight:700}
.output li code{color:var(--amber);background:rgba(240,178,58,0.1);padding:0 4px}

/* Capstone =============*/
.feature{margin-top:14px;border:1px solid var(--line);background:var(--bg-2)}
.feature .h{padding:9px 14px;background:#000;border-bottom:1px solid var(--line);color:var(--green);font-weight:700;font-size:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.feature .h::before{content:'$ cd ~/s5/capstone && ./run.sh'}
.feature .h .r{color:var(--ink-3);font-weight:500;font-size:10.5px}
.feature .body{padding:16px 18px}

.feat-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:14px}
@media(max-width:760px){.feat-stats{grid-template-columns:repeat(2,1fr)}}
.feat-stat{background:var(--bg-2);padding:12px 14px;font-size:11.5px}
.feat-stat .n{color:var(--amber);font-weight:800;font-size:22px;letter-spacing:-0.02em;line-height:1}
.feat-stat .l{color:var(--ink-3);font-size:10.5px;letter-spacing:0.06em;margin-top:6px}
.feat-stat .d{color:var(--ink-2);font-size:11px;margin-top:4px;line-height:1.5}

.arch-block{margin-top:8px;background:#000;border:1px solid var(--line);padding:10px;overflow-x:auto}
.arch-block svg{display:block;min-width:1400px;width:100%;height:auto}
.arch-zoom{display:none;margin:12px auto 0;background:transparent;border:1px solid var(--amber);color:var(--amber);font-family:var(--mono);font-size:11px;letter-spacing:0.08em;cursor:pointer;padding:8px 18px;font-weight:700}
@media(max-width:760px){.arch-zoom{display:block}}
.arch-modal{display:none;position:fixed;inset:0;z-index:9999;background:#000;flex-direction:column}
.arch-modal.open{display:flex}
.arch-modal-bar{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line);font-size:11px;color:var(--ink-3)}
.arch-modal-bar b{color:var(--amber)}
.arch-modal-close{background:transparent;border:1px solid var(--amber);color:var(--amber);padding:6px 12px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.06em}
.arch-modal-body{flex:1;overflow:auto;padding:14px;background:#000}
.arch-modal-body svg{display:block;min-width:1600px;width:1600px;height:auto;max-width:none}

.feat-grid{margin-top:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
@media(max-width:760px){.feat-grid{grid-template-columns:1fr 1fr}}
@media(max-width:460px){.feat-grid{grid-template-columns:1fr}}
.feat-grid .c{background:var(--bg-2);padding:12px 14px;font-size:11.5px;color:var(--ink-2);line-height:1.55}
.feat-grid .c .h{color:var(--green);font-size:10.5px;letter-spacing:0.06em;font-weight:700;margin-bottom:4px;background:none;padding:0;border:none}
.feat-grid .c .h::before{content:'-'}
.biz{margin-top:14px;border:1px solid var(--amber);background:rgba(240,178,58,0.04);padding:14px 16px;font-size:13px;color:var(--ink-2);line-height:1.7}
.biz .lab{color:var(--amber);font-size:11px;letter-spacing:0.06em;font-weight:700;margin-bottom:6px}
.biz .lab::before{content:'# '}

/* Stack as `cat` output */
.stack-tbl{margin-top:14px;border:1px solid var(--line);background:var(--bg-2);font-size:12px}
.stack-tbl .h{padding:9px 14px;background:#000;border-bottom:1px solid var(--line);color:var(--green);font-weight:700;font-size:12px}
.stack-tbl .h::before{content:'$ cat ~/s5/stack.toml'}
.stack-tbl .row{display:grid;grid-template-columns:170px 1fr 80px;padding:7px 14px;border-bottom:1px solid var(--line-soft);align-items:baseline;gap:12px;font-size:12px}
.stack-tbl .row:last-child{border-bottom:none}
.stack-tbl .row:hover{background:rgba(127,195,107,0.04)}
.stack-tbl .layer{color:var(--amber);font-weight:700}
.stack-tbl .layer::before{content:'[ '}
.stack-tbl .layer::after{content:' ]'}
.stack-tbl .tech{color:var(--ink-2);font-size:11.5px}
.stack-tbl .wk{color:var(--green);font-weight:700;text-align:right;font-size:11px;letter-spacing:0.04em}
@media(max-width:680px){.stack-tbl .row{grid-template-columns:110px 1fr 50px}}

/* Support */
.sup-grid{margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
@media(max-width:680px){.sup-grid{grid-template-columns:1fr 1fr}}
@media(max-width:460px){.sup-grid{grid-template-columns:1fr}}
.sup-grid .c{background:var(--bg-2);padding:14px 14px;font-size:12px}
.sup-grid .c .n{color:var(--amber);font-weight:700;font-size:10.5px;letter-spacing:0.06em;margin-bottom:8px}
.sup-grid .c .n::before{content:'$ '}
.sup-grid .c .h{color:var(--ink);font-weight:700;font-size:14px;line-height:1.3;margin-bottom:6px}
.sup-grid .c .b{color:var(--ink-2);font-size:11.5px;line-height:1.6}

.extra-block{margin-top:14px;border:1px solid var(--line);padding:14px 16px;background:var(--bg-2)}
.extra-block .h{color:var(--amber);font-size:11px;letter-spacing:0.06em;font-weight:700;margin-bottom:10px}
.extra-block .h::before{content:'# '}
.extra-list{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
@media(max-width:680px){.extra-list{grid-template-columns:1fr}}
.extra-list .it{background:var(--bg-3);padding:12px 14px;font-size:11.5px}
.extra-list .it .t{color:var(--green);font-weight:700;font-size:10.5px;letter-spacing:0.04em;margin-bottom:3px}
.extra-list .it .ti{color:var(--ink);font-weight:700;font-size:13px;line-height:1.3;margin-bottom:4px}
.extra-list .it .d{color:var(--ink-3);font-size:11px;line-height:1.55}

/* Fit */
.fit{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line)}
@media(max-width:680px){.fit{grid-template-columns:1fr}}
.fit .c{background:var(--bg-2);padding:18px 18px}
.fit .c.no{background:var(--bg-3)}
.fit .c .h{font-size:14px;font-weight:700;color:var(--green);margin-bottom:12px;display:flex;gap:8px;align-items:center}
.fit .c.no .h{color:var(--red)}
.fit .c .h::before{content:'[ ✓ ] '}
.fit .c.no .h::before{content:'[ ✗ ] '}
.fit .c ul{list-style:none;padding:0;margin:0;font-size:12px;color:var(--ink-2);line-height:1.85}
.fit .c ul li{padding-left:14px;position:relative}
.fit .c ul li::before{content:'·';position:absolute;left:0;color:var(--ink-3)}
.fit .c.no ul li::before{color:var(--red)}

/* CTA / footer */
.cta{margin-top:24px;padding:36px 28px;border:1px solid var(--amber);background:linear-gradient(180deg,rgba(240,178,58,0.06),rgba(240,178,58,0.02))}
.cta .lab{color:var(--amber);font-size:11px;letter-spacing:0.08em;font-weight:700;margin-bottom:14px;text-align:center}
.cta .lab::before{content:'$ ./enroll --season=2026 -s 5 --status '}
.cta h2{color:var(--ink);font-size:clamp(24px,3.4vw,32px);font-weight:800;letter-spacing:-0.02em;line-height:1.18;text-align:center;margin-bottom:14px}
.cta h2 .acc{color:var(--amber)}
.cta p{color:var(--ink-2);font-size:13px;line-height:1.7;text-align:center;max-width:680px;margin:0 auto 6px}
.cta p b{color:var(--amber);font-weight:700}
.cta .meta{margin-top:24px;padding-top:14px;border-top:1px solid var(--line);font-size:10.5px;color:var(--ink-3);letter-spacing:0.08em;text-align:center}

.footer-prompt{padding:32px 0 56px;color:var(--ink-3);font-size:13px}
.footer-prompt .ln{display:flex;gap:8px;margin-bottom:4px}
.footer-prompt .p{color:var(--green);font-weight:700}
.footer-prompt .p::after{content:'~/s5'}
.footer-prompt .p b{color:var(--amber);margin-right:2px}
.footer-prompt .p b::before{content:'➜ '}
.footer-prompt .c{color:var(--ink)}

</style>
