<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>S5/2026 · Technical Report · Agentic Systems × Post-Train</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#FAFAF6;
  --paper-2:#F2F1EB;
  --paper-3:#E6E5DE;
  --ink:#0A0907;
  --ink-2:#2A2926;
  --ink-3:#5A5852;
  --ink-4:#9A988E;
  --rule:#0A0907;
  --rule-soft:#C4C2B8;
  --rule-fade:#E4E2D8;
  --acc:#9C1F1F;          /* oxblood — only accent */
  --acc-soft:#F5E5E5;
  --serif:"Source Serif 4","Noto Serif SC","Source Han Serif SC",Georgia,serif;
  --sans:"Inter","PingFang SC","Microsoft YaHei",ui-sans-serif,system-ui,sans-serif;
  --mono:"JetBrains Mono","SF Mono","IBM Plex Mono",Menlo,Consolas,monospace;
}
html,body{background:var(--paper);color:var(--ink);font-family:var(--serif);font-weight:400;line-height:1.6;-webkit-font-smoothing:antialiased;font-feature-settings:"liga","onum"}
a{color:inherit;text-decoration:none}
a:hover{color:var(--acc)}
::selection{background:var(--ink);color:var(--paper)}

/* ============= Document layout (single-column reading width) ============= */
.doc{max-width:820px;margin:0 auto;padding:0 48px;position:relative}
@media(max-width:680px){.doc{padding:0 22px}}
.doc-wide{max-width:1080px;margin:0 auto;padding:0 48px}
@media(max-width:680px){.doc-wide{padding:0 22px}}

/* page numbers / running headers */
.running{
  position:sticky;top:0;z-index:50;background:var(--paper);
  border-bottom:1px solid var(--rule);
}
.running-in{
  max-width:1080px;margin:0 auto;padding:9px 48px;
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:10.5px;letter-spacing:0.08em;color:var(--ink-3);
}
.running-in b{color:var(--ink);font-weight:600}
.running-in .red{color:var(--acc);font-weight:700}
.running-in nav{display:flex;gap:14px}
.running-in nav a{color:var(--ink-3)}
.running-in nav a:hover{color:var(--acc)}
@media(max-width:680px){.running-in{padding:8px 22px;font-size:9.5px}.running-in nav{display:none}}

/* ============= TITLE PAGE ============= */
.titlepage{padding:72px 0 56px;border-bottom:3px solid var(--rule);position:relative}
.tp-banner{
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;
  padding-bottom:18px;border-bottom:1px solid var(--rule);margin-bottom:42px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-3);
}
.tp-banner .l b{color:var(--acc);font-weight:700;letter-spacing:0.12em}
.tp-banner .m{text-align:center;font-family:var(--serif);font-size:12px;font-style:italic;letter-spacing:0.04em;color:var(--ink-3);text-transform:none}
.tp-banner .r{text-align:right}

.tp-meta-row{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:18px}
.tp-meta-row .red{color:var(--acc);font-weight:700}

.tp-title{
  font-family:var(--serif);font-weight:700;
  font-size:clamp(36px,5.5vw,64px);line-height:1.1;letter-spacing:-0.02em;
  color:var(--ink);max-width:780px;text-wrap:balance;
}
.tp-title .sub{display:block;font-family:var(--serif);font-style:italic;font-weight:400;font-size:0.46em;color:var(--ink-3);letter-spacing:0;margin-top:18px;line-height:1.4}
.tp-title .acc{color:var(--acc)}

.tp-authors{margin-top:32px;font-family:var(--serif);font-size:15.5px;color:var(--ink-2);line-height:1.65;border-top:1px solid var(--rule-soft);border-bottom:1px solid var(--rule-soft);padding:14px 0;display:grid;grid-template-columns:auto 1fr;gap:20px}
.tp-authors .lab{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-3);font-weight:600;padding-top:3px}
.tp-authors .val b{font-weight:700;color:var(--ink)}
.tp-authors .val{font-feature-settings:"onum"}

.tp-abstract{margin-top:32px;border:1px solid var(--rule);padding:28px 32px 24px;background:var(--paper);position:relative}
.tp-abstract .lab{position:absolute;top:-9px;left:24px;background:var(--paper);padding:0 10px;font-family:var(--mono);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--acc);font-weight:700}
.tp-abstract p{font-family:var(--serif);font-size:15.5px;line-height:1.78;color:var(--ink-2);margin-bottom:0.8em}
.tp-abstract p:last-child{margin-bottom:0}
.tp-abstract p b{font-weight:700;color:var(--ink)}
.tp-abstract .kw{margin-top:14px;padding-top:14px;border-top:1px dashed var(--rule-soft);font-family:var(--mono);font-size:12px;color:var(--ink-3);letter-spacing:0.02em}
.tp-abstract .kw b{color:var(--ink);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:0.18em;margin-right:8px}

.tp-stats{margin-top:32px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)}
.tp-stat{padding:16px 16px;border-right:1px dashed var(--rule-soft)}
.tp-stat:last-child{border-right:none}
.tp-stat .n{font-family:var(--serif);font-size:32px;font-weight:700;letter-spacing:-0.02em;color:var(--ink);line-height:1;font-feature-settings:"onum"}
.tp-stat .n .u{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink-3);font-weight:400;margin-left:2px}
.tp-stat .l{font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);margin-top:6px}
@media(max-width:680px){.tp-stats{grid-template-columns:1fr 1fr}.tp-stat:nth-child(2){border-right:none}.tp-stat:nth-child(-n+2){border-bottom:1px dashed var(--rule-soft)}}

.tp-toc{margin-top:40px}
.tp-toc-h{font-family:var(--mono);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--rule)}
.tp-toc-row{display:flex;align-items:baseline;gap:0;padding:5px 0;font-family:var(--serif);font-size:15px;color:var(--ink-2)}
.tp-toc-row .num{font-family:var(--mono);font-size:11.5px;color:var(--acc);font-weight:700;width:48px;letter-spacing:0.04em}
.tp-toc-row .t{flex:1;color:var(--ink);font-weight:500}
.tp-toc-row .t b{font-weight:700}
.tp-toc-row .leader{flex-shrink:0;flex-grow:1;border-bottom:1px dotted var(--rule-soft);margin:0 10px;transform:translateY(-4px);min-width:30px}
.tp-toc-row .pg{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:0.06em;text-align:right;min-width:60px}
.tp-toc-row.sub{padding-left:0;font-size:13.5px;color:var(--ink-3)}
.tp-toc-row.sub .num{font-size:10.5px;color:var(--ink-3);width:48px;padding-left:18px}
.tp-toc-row.sub .t{color:var(--ink-2);font-weight:400}

/* ============= Section primitives ============= */
section.s{padding:64px 0 32px;border-bottom:1px solid var(--rule-fade)}
section.s.wide{padding:64px 0 48px}

.s-num{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:10px;display:flex;align-items:baseline;gap:12px}
.s-num b{color:var(--acc)}
.s-num .div{flex:1;height:1px;background:var(--rule-fade);max-width:240px;margin-left:8px}
.s-num .meta{color:var(--ink-3);font-weight:500}

.s-title{font-family:var(--serif);font-size:clamp(26px,3.6vw,38px);font-weight:700;letter-spacing:-0.015em;line-height:1.18;color:var(--ink);margin:0 0 16px;text-wrap:balance}
.s-title em{font-style:italic;font-weight:500;color:var(--acc)}
.s-lead{font-family:var(--serif);font-size:17px;line-height:1.78;color:var(--ink-2);max-width:720px}
.s-lead b{font-weight:700;color:var(--ink)}

h3.ss-title{font-family:var(--serif);font-size:22px;font-weight:700;line-height:1.3;letter-spacing:-0.005em;color:var(--ink);margin:36px 0 12px;padding-top:18px;border-top:1px solid var(--rule-fade)}
h3.ss-title .num{font-family:var(--mono);font-size:13px;color:var(--acc);font-weight:700;margin-right:10px;letter-spacing:0.04em;vertical-align:0.08em}
h4.sss-title{font-family:var(--mono);font-size:11.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin:22px 0 10px}
h4.sss-title b{color:var(--acc)}

.body{font-family:var(--serif);font-size:16.5px;line-height:1.78;color:var(--ink-2);max-width:720px}
.body p{margin-bottom:0.8em}
.body p b{font-weight:700;color:var(--ink)}
.body p em{font-style:italic;color:var(--ink);font-weight:500}
.body p .strong{font-weight:700;color:var(--ink);font-style:normal}

/* Footnote-style aside */
.fn{
  font-family:var(--serif);font-size:14.5px;line-height:1.7;color:var(--ink-3);font-style:italic;
  padding-top:10px;margin-top:10px;border-top:1px dashed var(--rule-soft);max-width:720px;
}
.fn .mk{color:var(--acc);font-weight:700;font-family:var(--serif);font-style:normal;margin-right:6px}
.fn b{color:var(--ink);font-weight:700;font-style:normal}

/* Table */
.tbl{margin-top:22px;border-top:2px solid var(--rule);border-bottom:2px solid var(--rule);font-family:var(--serif);font-size:14.5px;width:100%}
.tbl .row{display:grid;border-bottom:1px solid var(--rule-fade)}
.tbl .row:last-child{border-bottom:none}
.tbl .row.head{background:var(--paper-2);border-bottom:1px solid var(--rule);font-family:var(--mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink)}
.tbl .row.head b{color:var(--acc);font-weight:700}
.tbl .cell{padding:10px 14px;border-right:1px dashed var(--rule-fade);line-height:1.55}
.tbl .cell:last-child{border-right:none}
.tbl .row:hover:not(.head){background:rgba(156,31,31,0.025)}
.tbl-cap{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--ink-3);margin-top:8px;line-height:1.5;text-align:center;max-width:720px;margin-left:auto;margin-right:auto}
.tbl-cap b{color:var(--ink);font-weight:700;font-style:normal}

/* Pull-out boxes (theorem/definition style) */
.box{
  margin:22px 0;border:1px solid var(--rule);background:var(--paper);
  position:relative;padding:22px 26px 20px;
}
.box::before{
  content:attr(data-label);position:absolute;top:-8px;left:18px;
  background:var(--paper);padding:0 8px;font-family:var(--mono);font-size:11px;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--acc);font-weight:700;
}
.box .h{font-family:var(--serif);font-size:17px;font-weight:700;line-height:1.3;margin-bottom:8px;color:var(--ink)}
.box .b{font-family:var(--serif);font-size:15.5px;line-height:1.7;color:var(--ink-2)}
.box .b b{color:var(--ink);font-weight:700}
.box.dark{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.box.dark::before{background:var(--ink);color:var(--paper);font-weight:700;letter-spacing:0.22em}
.box.dark .h{color:var(--paper)}
.box.dark .b{color:rgba(250,250,246,0.86)}
.box.dark .b b{color:var(--paper)}

/* Definition list */
.dl{margin-top:18px;border-top:1px solid var(--rule)}
.dl .it{display:grid;grid-template-columns:160px 1fr;border-bottom:1px solid var(--rule-fade);padding:11px 0;gap:18px}
.dl .it dt{font-family:var(--mono);font-size:12px;letter-spacing:0.04em;color:var(--acc);font-weight:700;text-transform:uppercase;padding-top:2px}
.dl .it dd{font-family:var(--serif);font-size:15.5px;color:var(--ink-2);line-height:1.65}
.dl .it dd b{font-weight:700;color:var(--ink)}
@media(max-width:600px){.dl .it{grid-template-columns:1fr;gap:4px}}

/* Quote block */
.blockq{
  margin:24px 0;padding:18px 24px;
  border-left:3px solid var(--acc);background:var(--paper-2);
  font-family:var(--serif);font-style:italic;font-size:17px;line-height:1.65;color:var(--ink);
  max-width:720px;
}
.blockq b{color:var(--acc);font-weight:700;font-style:normal}
.blockq cite{display:block;margin-top:8px;font-style:normal;font-size:12px;font-family:var(--mono);letter-spacing:0.1em;color:var(--ink-3);text-transform:uppercase}

/* ============= S-series chronicle ============= */
.cohort{margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--rule)}
@media(max-width:680px){.cohort{grid-template-columns:1fr}}
.cohort .c{padding:22px 24px;border-right:1px solid var(--rule-soft);border-bottom:1px solid var(--rule-soft);background:var(--paper)}
.cohort .c:nth-child(2n){border-right:none}
.cohort .c:nth-last-child(-n+2){border-bottom:none}
.cohort .c.now{background:var(--acc-soft);border-color:var(--acc)}
.cohort .c .tag{font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:8px}
.cohort .c.now .tag{color:var(--acc);font-weight:700}
.cohort .c .id{font-family:var(--mono);font-size:38px;font-weight:700;color:var(--ink);letter-spacing:-0.04em;line-height:0.9;margin-bottom:6px}
.cohort .c.now .id{color:var(--acc)}
.cohort .c .ti{font-family:var(--serif);font-size:18px;font-weight:700;margin:4px 0 2px;line-height:1.25;color:var(--ink)}
.cohort .c .span{font-family:var(--mono);font-size:11px;letter-spacing:0.06em;color:var(--ink-3);margin-bottom:14px}
.cohort .c .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--acc);margin:12px 0 6px;font-weight:700}
.cohort .c ul{margin:0;padding-left:18px;font-family:var(--serif);font-size:14.5px;line-height:1.65;color:var(--ink-2)}
.cohort .c ul li{margin-bottom:2px}
.cohort .c ul li b{font-weight:700;color:var(--ink)}
.cohort .c .foot{margin-top:14px;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink-3)}
.cohort .c.now .foot{color:var(--acc);font-weight:700;font-style:normal}

.delta{margin-top:24px;padding:24px 28px;border:1px solid var(--rule);background:var(--paper)}
.delta .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:0.2em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:6px}
.delta .h{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:-0.01em;margin-bottom:6px}
.delta .d{font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--ink-3);margin-bottom:16px}
.delta .items{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--rule-soft)}
@media(max-width:680px){.delta .items{grid-template-columns:1fr}}
.delta .item{padding:14px 18px 14px 0;border-right:1px solid var(--rule-soft)}
.delta .item:nth-child(2),.delta .item:nth-child(3){padding-left:18px}
.delta .item:nth-child(3){padding-right:0;border-right:none}
@media(max-width:680px){.delta .item{padding:14px 0!important;border-right:none;border-bottom:1px dashed var(--rule-soft)}.delta .item:last-child{border-bottom:none}}
.delta .item .n{font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:4px}
.delta .item .h2{font-family:var(--serif);font-size:16.5px;font-weight:700;line-height:1.3;margin-bottom:4px}
.delta .item .b{font-family:var(--serif);font-size:14px;line-height:1.6;color:var(--ink-2)}

/* ============= Algorithm vs Engineering ============= */
.essay-grid{margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--rule)}
@media(max-width:680px){.essay-grid{grid-template-columns:1fr}}
.essay-grid .c{padding:24px 26px;border-right:1px solid var(--rule);background:var(--paper)}
.essay-grid .c:last-child{border-right:none;background:var(--paper-2)}
.essay-grid .c .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px;font-weight:600}
.essay-grid .c .lab b{color:var(--acc)}
.essay-grid .c .ans{font-family:var(--serif);font-size:22px;font-weight:700;line-height:1.25;letter-spacing:-0.01em;margin-bottom:10px}
.essay-grid .c .ans s{color:var(--ink-4);font-weight:400}
.essay-grid .c .desc{font-family:var(--serif);font-size:15px;line-height:1.7;color:var(--ink-2)}
.essay-grid .c .desc b{color:var(--ink);font-weight:700}
.essay-merge{margin-top:0;padding:24px 28px;background:var(--ink);color:var(--paper);border:1px solid var(--ink);position:relative;text-align:left}
.essay-merge .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:0.2em;text-transform:uppercase;color:#f4b4a0;font-weight:700;margin-bottom:6px}
.essay-merge .ans{font-family:var(--serif);font-size:24px;font-weight:700;letter-spacing:-0.015em;line-height:1.2;margin-bottom:8px;color:var(--paper)}
.essay-merge .desc{font-family:var(--serif);font-size:15px;line-height:1.7;color:rgba(250,250,246,0.82)}
.essay-merge .desc b{color:var(--paper);font-weight:700}

.tenets{margin-top:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--rule)}
@media(max-width:680px){.tenets{grid-template-columns:1fr 1fr}}
@media(max-width:420px){.tenets{grid-template-columns:1fr}}
.tenet{padding:14px 16px;border-right:1px solid var(--rule-fade);border-bottom:1px solid var(--rule-fade);background:var(--paper)}
.tenet:nth-child(4n){border-right:none}
.tenet:nth-last-child(-n+4){border-bottom:none}
.tenet .n{font-family:var(--mono);font-size:10.5px;letter-spacing:0.12em;color:var(--acc);font-weight:700;margin-bottom:4px}
.tenet .t{font-family:var(--serif);font-size:14.5px;font-weight:700;line-height:1.3;margin-bottom:4px}
.tenet .d{font-family:var(--serif);font-size:13px;line-height:1.55;color:var(--ink-2)}

/* ============= Weekly article (single column, numbered subsections) ============= */
.week{padding:64px 0 36px;border-bottom:1px solid var(--rule)}
.week:last-of-type{border-bottom:0}
.week-h{display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:baseline;margin-bottom:22px}
@media(max-width:680px){.week-h{grid-template-columns:auto 1fr;gap:12px}}
.week-h .id{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--acc);letter-spacing:0.06em;padding-top:6px;white-space:nowrap}
.week-h .ti{font-family:var(--serif);font-size:clamp(24px,3.4vw,32px);font-weight:700;letter-spacing:-0.015em;line-height:1.2;color:var(--ink);margin:0;text-wrap:balance}
.week-h .stage{font-family:var(--mono);font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-3);text-align:right;line-height:1.7}
.week-h .stage b{display:block;font-family:var(--serif);font-size:18px;color:var(--ink);font-weight:700;letter-spacing:-0.01em}
@media(max-width:680px){.week-h .stage{display:none}}
.week-meta{font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:18px;display:flex;gap:14px;flex-wrap:wrap;padding-bottom:14px;border-bottom:1px solid var(--rule-fade)}
.week-meta b{color:var(--acc);font-weight:700}

.hl-list{margin-top:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--rule-soft)}
@media(max-width:760px){.hl-list{grid-template-columns:1fr}}
.hl{padding:14px 18px;border-right:1px solid var(--rule-fade);background:var(--paper)}
.hl:last-child{border-right:none}
@media(max-width:760px){.hl{border-right:none;border-bottom:1px solid var(--rule-fade)}.hl:last-child{border-bottom:none}}
.hl .lab{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px;font-weight:600}
.hl .lab b{color:var(--acc)}
.hl .h{font-family:var(--serif);font-size:16px;font-weight:700;line-height:1.3;margin-bottom:4px;color:var(--ink)}
.hl .h .acc{color:var(--acc)}
.hl .b{font-family:var(--serif);font-size:13.5px;line-height:1.6;color:var(--ink-2)}
.hl .b code{font-family:var(--mono);font-size:12px;background:var(--paper-2);padding:1px 4px;color:var(--ink)}

/* Player */
.player{margin-top:20px;border:1px solid var(--rule);background:var(--ink)}
.player .bar{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;font-family:var(--mono);font-size:10.5px;letter-spacing:0.08em;background:#020100;color:rgba(250,250,246,0.6)}
.player .bar .ll{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.player .bar .dot{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 0 3px rgba(156,31,31,0.25);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
.player .bar .name{color:var(--paper);font-weight:700}
.player .bar .openlk{border:1px solid var(--acc);color:#fdb;padding:4px 10px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase}
.player .bar .openlk:hover{background:var(--acc);color:var(--paper)}
.player .frame-wrap{position:relative;aspect-ratio:16/10;background:#000}
.player iframe{width:100%;height:100%;border:0;display:block;background:#fff}
.player .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;text-align:center;background:repeating-linear-gradient(45deg,#020100 0 14px,#0c0a07 14px 28px);color:rgba(250,250,246,0.6);font-family:var(--mono);font-size:13px}
.player .ph .ph-h{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--paper);letter-spacing:0}
.player .ph .ph-d{font-family:var(--serif);font-size:13.5px;color:rgba(250,250,246,0.55);line-height:1.6;max-width:500px}
.player .ph button{font-family:var(--mono);border:1px solid var(--acc);background:transparent;color:#fdb;padding:8px 18px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;font-weight:700}
.player .ph button:hover{background:var(--acc);color:var(--paper)}

.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
.tag{font-family:var(--mono);font-size:11.5px;padding:3px 9px;background:var(--paper-2);border:1px solid var(--rule-soft);color:var(--ink-2);letter-spacing:0.02em}

.output{margin-top:24px;padding:20px 24px;border:1px solid var(--ink);background:var(--ink);color:var(--paper)}
.output .lab{font-family:var(--mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#fdb;font-weight:700;margin-bottom:8px}
.output .b{font-family:var(--serif);font-size:15.5px;line-height:1.7;color:rgba(250,250,246,0.92)}
.output .b b{color:var(--paper);font-weight:700}
.output ul{margin:14px 0 0;padding:0;list-style:none;display:grid;gap:8px}
.output li{font-family:var(--serif);font-size:14.5px;line-height:1.6;padding-left:24px;position:relative;color:rgba(250,250,246,0.86)}
.output li::before{content:attr(data-n);position:absolute;left:0;top:0;color:#fdb;font-family:var(--mono);font-weight:700;font-size:11.5px}
.output li b{color:var(--paper);font-weight:700}
.output li code{font-family:var(--mono);font-size:13px;background:rgba(255,255,255,0.1);padding:1px 5px}

/* ============= Feature (project / SVG figure) ============= */
.feature-stats{margin-top:20px;display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--rule)}
@media(max-width:760px){.feature-stats{grid-template-columns:1fr 1fr}}
.feature-stat{padding:14px 16px;border-right:1px dashed var(--rule-soft);background:var(--paper)}
.feature-stat:last-child{border-right:none}
.feature-stat .num{font-family:var(--serif);font-size:30px;font-weight:700;color:var(--acc);letter-spacing:-0.02em;line-height:1}
.feature-stat .lab{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-3);margin-top:6px;font-weight:600}
.feature-stat .d{font-family:var(--serif);font-size:13px;color:var(--ink-2);margin-top:4px;line-height:1.5}

.figure{margin:24px 0 0;border:1px solid var(--rule);background:var(--ink);padding:14px;overflow-x:auto}
.figure svg{display:block;min-width:1400px;width:100%;height:auto}
.figure-cap{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--ink-3);text-align:center;margin-top:12px;line-height:1.55;max-width:780px;margin-left:auto;margin-right:auto}
.figure-cap b{font-style:normal;color:var(--ink);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;font-size:12px;margin-right:6px}
.arch-zoom{display:none;margin:14px auto 0;padding:9px 18px;background:transparent;border:1px solid var(--acc);color:var(--acc);font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;font-weight:700}
@media(max-width:760px){.arch-zoom{display:block}}
.arch-modal{display:none;position:fixed;inset:0;z-index:9999;background:#0a0907;flex-direction:column}
.arch-modal.open{display:flex}
.arch-modal-bar{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid rgba(250,250,246,0.15);background:#000;font-family:var(--mono);font-size:10px;letter-spacing:0.12em;color:rgba(250,250,246,0.6)}
.arch-modal-close{background:transparent;border:1px solid var(--acc);color:#fdb;padding:6px 12px;font-family:var(--mono);font-size:10.5px;letter-spacing:0.12em;cursor:pointer;text-transform:uppercase;font-weight:700}
.arch-modal-body{flex:1;overflow:auto;padding:14px;background:#0a0907}
.arch-modal-body svg{display:block;min-width:1600px;width:1600px;height:auto;max-width:none}

.feat-grid{margin-top:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--rule)}
@media(max-width:760px){.feat-grid{grid-template-columns:1fr 1fr}}
@media(max-width:460px){.feat-grid{grid-template-columns:1fr}}
.feat-grid .c{padding:14px 16px;border-right:1px solid var(--rule-fade);border-bottom:1px solid var(--rule-fade);font-family:var(--serif);font-size:13.5px;color:var(--ink-2);line-height:1.6;background:var(--paper)}
.feat-grid .c .h{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--acc);margin-bottom:6px;font-weight:700}

/* ============= Stack ============= */
.stack-tbl{margin-top:18px}
.stack-tbl .row{grid-template-columns:160px 1fr 70px}
@media(max-width:680px){.stack-tbl .row{grid-template-columns:100px 1fr 50px}}

/* ============= Support / Fit ============= */
.sup-grid{margin-top:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--rule)}
@media(max-width:760px){.sup-grid{grid-template-columns:1fr 1fr}}
@media(max-width:460px){.sup-grid{grid-template-columns:1fr}}
.sup-grid .c{padding:18px 18px;border-right:1px solid var(--rule-fade);background:var(--paper)}
.sup-grid .c:last-child{border-right:none}
.sup-grid .c .n{font-family:var(--mono);font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:8px}
.sup-grid .c .h{font-family:var(--serif);font-size:16px;font-weight:700;line-height:1.3;margin-bottom:6px}
.sup-grid .c .b{font-family:var(--serif);font-size:14px;line-height:1.65;color:var(--ink-2)}

.extra-grid{margin-top:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--rule)}
@media(max-width:680px){.extra-grid{grid-template-columns:1fr}}
.extra-grid .c{padding:14px 18px;border-right:1px solid var(--rule-fade);background:var(--paper-2)}
.extra-grid .c:last-child{border-right:none}
@media(max-width:680px){.extra-grid .c{border-right:none;border-bottom:1px solid var(--rule-fade)}.extra-grid .c:last-child{border-bottom:none}}
.extra-grid .c .t{font-family:var(--mono);font-size:11px;color:var(--acc);font-weight:700;letter-spacing:0.04em;margin-bottom:4px}
.extra-grid .c .ti{font-family:var(--serif);font-size:14.5px;font-weight:700;color:var(--ink);margin-bottom:4px;line-height:1.3}
.extra-grid .c .d{font-family:var(--serif);font-size:13px;color:var(--ink-2);line-height:1.6}

.fit-grid{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--rule)}
@media(max-width:680px){.fit-grid{grid-template-columns:1fr}}
.fit-grid .c{padding:22px 24px;border-right:1px solid var(--rule);background:var(--paper)}
.fit-grid .c:last-child{border-right:none;background:var(--paper-2)}
.fit-grid .c .h{font-family:var(--serif);font-size:18px;font-weight:700;margin-bottom:12px;display:flex;gap:8px;align-items:baseline}
.fit-grid .c .h .ic{color:var(--acc);font-weight:700;font-family:var(--serif);font-size:1.4em;line-height:0.6}
.fit-grid .c.no .h .ic{color:var(--ink-4)}
.fit-grid .c ul{margin:0;padding-left:18px;font-family:var(--serif);font-size:14.5px;line-height:1.85;color:var(--ink-2)}

/* footer */
.coda{padding:64px 0 40px;background:var(--ink);color:var(--paper);text-align:center;border-top:3px double var(--rule)}
.coda .eb{font-family:var(--mono);font-size:10.5px;letter-spacing:0.22em;text-transform:uppercase;color:#fdb;font-weight:700;margin-bottom:14px}
.coda h2{font-family:var(--serif);font-size:clamp(26px,3.6vw,40px);font-weight:700;letter-spacing:-0.02em;line-height:1.15;margin-bottom:18px}
.coda h2 .it{font-style:italic;color:#fdb;font-weight:500}
.coda p{font-family:var(--serif);font-size:15.5px;line-height:1.78;color:rgba(250,250,246,0.78);max-width:640px;margin:0 auto 8px}
.coda p b{color:var(--paper);font-weight:700}
.coda .meta{margin-top:32px;padding-top:18px;border-top:1px solid rgba(250,250,246,0.18);font-family:var(--mono);font-size:10px;letter-spacing:0.16em;color:rgba(250,250,246,0.42);text-transform:uppercase}
