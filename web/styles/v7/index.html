<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>《卷·五》2026 大模型冲刺营 · Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#F4EFE5;
  --paper-2:#EAE3D2;
  --paper-3:#DDD3BD;
  --ink:#1A1611;
  --ink-2:#3D372C;
  --ink-3:#7A7363;
  --ink-4:#A8A18E;
  --rule:#1A1611;
  --rule-soft:#C9C0A8;
  --rule-fade:#E2DBC5;
  --acc:#8B2A1F;          /* 朱砂红 */
  --acc-soft:#C49B5A;     /* 古铜金 */
  --serif:"Noto Serif SC",Georgia,"Times New Roman",serif;
  --sans:"Inter","PingFang SC","Microsoft YaHei",ui-sans-serif,system-ui,sans-serif;
  --mono:"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
}
html,body{background:var(--paper);color:var(--ink);font-family:var(--serif);font-weight:400;line-height:1.7;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{padding:0;background-image:radial-gradient(ellipse at 20% 0%,rgba(139,42,31,0.025),transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(196,155,90,0.04),transparent 60%)}
a{color:inherit;text-decoration:none}
::selection{background:var(--ink);color:var(--paper)}

/* ============= Layout ============= */
.page{max-width:1080px;margin:0 auto;padding:0 56px;position:relative}
.col{max-width:740px;margin:0 auto}
@media(max-width:820px){.page{padding:0 28px}}
@media(max-width:520px){.page{padding:0 20px}}

/* running header */
.runner{
  position:sticky;top:0;z-index:50;background:var(--paper);
  border-bottom:1px solid var(--rule);
}
.runner-in{max-width:1080px;margin:0 auto;padding:11px 56px;display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-2)}
.runner b{color:var(--ink);font-weight:600}
.runner .acc{color:var(--acc);font-weight:700}
.runner .nav{display:flex;gap:18px}
.runner .nav a:hover{color:var(--acc)}
@media(max-width:820px){.runner-in{padding:9px 28px;font-size:9.5px}.runner .nav{display:none}}

/* ============= Section primitives ============= */
.section{padding:80px 0 56px;position:relative}
.section.sm{padding:48px 0 36px}
.sect-rule{height:1px;background:var(--rule);max-width:1080px;margin:0 auto}
.sect-rule.dbl{height:0;border-top:3px double var(--rule)}

.eyebrow{display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:10.5px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-3);margin-bottom:32px}
.eyebrow .ch{color:var(--acc);font-weight:700;letter-spacing:0.16em}
.eyebrow .div{flex:1;height:1px;background:var(--rule-soft);max-width:280px}

h1,h2,h3,h4{font-family:var(--serif);font-weight:600;letter-spacing:-0.005em;line-height:1.18;color:var(--ink);text-wrap:balance}
.h-display{font-size:clamp(44px,7.5vw,96px);font-weight:900;letter-spacing:-0.025em;line-height:1.02}
.h-section{font-size:clamp(34px,5.4vw,60px);font-weight:700;letter-spacing:-0.02em;line-height:1.08;margin:0 0 22px}
.h-section em{font-style:italic;color:var(--acc);font-weight:500}
.h-article{font-size:clamp(28px,4vw,42px);font-weight:700;line-height:1.18;letter-spacing:-0.015em;margin:0 0 14px}
.h-sub{font-size:clamp(20px,2.6vw,28px);font-weight:500;line-height:1.3;letter-spacing:-0.005em;color:var(--ink-2);margin:0 0 10px}

.lead{font-family:var(--serif);font-size:19px;line-height:1.78;color:var(--ink-2);max-width:680px;font-weight:400}
.lead b,.lead .s{font-weight:600;color:var(--ink);font-style:normal}
.body-text{font-family:var(--serif);font-size:17.5px;line-height:1.85;color:var(--ink-2)}
.body-text b{font-weight:600;color:var(--ink)}
.body-text em{font-style:italic;color:var(--ink);font-weight:500}
.body-sans{font-family:var(--sans);font-size:14.5px;line-height:1.72;color:var(--ink-2)}
.body-sans b{font-weight:600;color:var(--ink)}
.mono{font-family:var(--mono)}

/* Drop cap */
.drop::first-letter{font-family:var(--serif);float:left;font-size:5.2em;line-height:0.86;font-weight:700;margin:0.04em 0.12em 0 -0.04em;color:var(--acc)}

/* Pull quote */
.pull{
  font-family:var(--serif);font-style:italic;font-size:clamp(22px,2.6vw,30px);
  line-height:1.42;color:var(--ink);font-weight:500;
  margin:36px 0;padding:0 0 0 28px;
  border-left:3px solid var(--acc);max-width:760px;
}
.pull .mk{color:var(--acc);font-style:normal}
.pull b{color:var(--acc);font-weight:600;font-style:normal}

/* ============= COVER ============= */
.cover{padding:64px 0 70px;position:relative}
.cover-rule{border-top:3px double var(--rule);margin:0 auto;max-width:1080px}
.cover-rule.bot{margin-top:48px}
.cover-meta{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:18px 0;font-family:var(--mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-2);border-bottom:1px solid var(--rule)}
.cover-meta .l,.cover-meta .r{display:flex;gap:18px;align-items:center}
.cover-meta .l b{color:var(--acc);font-weight:700;letter-spacing:0.12em}
.cover-meta .m{font-family:var(--serif);font-size:12px;letter-spacing:0.16em;text-transform:none;color:var(--ink-3);font-style:italic}
.cover-meta .r{justify-content:flex-end}
.cover-meta .vol{font-family:var(--serif);font-size:14px;font-weight:700;letter-spacing:0.06em;color:var(--ink)}

.cover-pre{margin-top:40px;display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-3)}
.cover-pre .red{color:var(--acc);font-weight:700;letter-spacing:0.14em}

.cover-h1{
  margin:36px 0 30px;
  font-family:var(--serif);font-weight:900;line-height:0.96;letter-spacing:-0.035em;
  font-size:clamp(46px,9.4vw,128px);text-wrap:balance;
}
.cover-h1 .l1{display:block;font-size:0.42em;font-weight:500;letter-spacing:0.02em;color:var(--ink-3);margin-bottom:14px;line-height:1.4}
.cover-h1 .l2{display:block;color:var(--ink)}
.cover-h1 .red{color:var(--acc)}
.cover-h1 .it{font-style:italic;font-weight:500;color:var(--acc)}
.cover-h1 .l3{display:block;margin-top:8px}

.cover-sub{font-family:var(--serif);font-size:clamp(17px,1.9vw,22px);line-height:1.7;color:var(--ink-2);max-width:780px;font-weight:400;margin-top:22px}
.cover-sub b{color:var(--ink);font-weight:600}

.cover-stats{margin-top:46px;display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)}
.cover-stat{padding:18px 0;border-right:1px solid var(--rule-soft);text-align:left;padding-left:18px}
.cover-stat:first-child{padding-left:0}
.cover-stat:last-child{border-right:none}
.cover-stat .n{font-family:var(--serif);font-size:42px;font-weight:700;line-height:1;letter-spacing:-0.02em;color:var(--ink)}
.cover-stat .n .u{font-family:var(--serif);font-size:15px;font-weight:500;color:var(--ink-3);margin-left:3px;font-style:italic}
.cover-stat .l{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-3);margin-top:8px}
@media(max-width:680px){.cover-stats{grid-template-columns:1fr 1fr}.cover-stat:nth-child(2){border-right:none}.cover-stat:nth-child(-n+2){border-bottom:1px solid var(--rule-soft)}}

/* TOC inline (cover) */
.cover-toc{margin-top:40px;display:grid;grid-template-columns:1fr 1fr;gap:0 60px}
@media(max-width:680px){.cover-toc{grid-template-columns:1fr}}
.cover-toc .toc-h{font-family:var(--mono);font-size:10.5px;letter-spacing:0.2em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--rule)}
.cover-toc .toc-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;font-family:var(--serif);font-size:16px;color:var(--ink-2);gap:8px}
.cover-toc .toc-row .leader{flex:1;border-bottom:1px dotted var(--rule-soft);margin:0 8px;transform:translateY(-4px)}
.cover-toc .toc-row .pg{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:0.06em;flex-shrink:0}
.cover-toc .toc-row b{font-weight:600;color:var(--ink)}

/* ============= EDITOR'S NOTE / PAIN ============= */
.editor-note{padding:88px 0 64px}
.editor-note .head{display:grid;grid-template-columns:auto 1fr;gap:36px;align-items:end;border-bottom:1px solid var(--rule);padding-bottom:18px;margin-bottom:32px}
@media(max-width:680px){.editor-note .head{grid-template-columns:1fr;gap:6px}}
.editor-note .head .num{font-family:var(--serif);font-size:120px;font-weight:900;line-height:0.84;letter-spacing:-0.04em;color:var(--acc)}
.editor-note .head .ti{font-family:var(--serif);font-size:clamp(28px,3.6vw,40px);font-weight:600;line-height:1.16;letter-spacing:-0.015em}
.editor-note .head .lab{font-family:var(--mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;font-weight:600}

.note-cols{column-count:2;column-gap:48px;font-family:var(--serif);font-size:17.5px;line-height:1.85;color:var(--ink-2)}
.note-cols p{margin-bottom:1em;break-inside:avoid}
.note-cols p b{font-weight:600;color:var(--ink)}
.note-cols p s{text-decoration:line-through;color:var(--ink-4);font-weight:400}
.note-cols p em{font-style:italic;color:var(--acc);font-weight:500;text-decoration:none}
@media(max-width:680px){.note-cols{column-count:1}}

.note-q-list{margin-top:48px;border-top:1px solid var(--rule);padding-top:32px}
.note-q-h{font-family:var(--mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:18px}
.note-q-h b{color:var(--ink);font-weight:600}
.note-q{display:grid;grid-template-columns:48px 1fr;gap:18px;padding:18px 0;border-bottom:1px solid var(--rule-fade);align-items:start}
.note-q:last-child{border-bottom:none}
.note-q .n{font-family:var(--serif);font-size:32px;font-weight:700;color:var(--acc);line-height:1}
.note-q .t{font-family:var(--serif);font-size:18px;line-height:1.6;color:var(--ink)}
.note-q .t b{font-weight:700;color:var(--acc)}
.note-q-foot{margin-top:14px;font-family:var(--mono);font-size:11px;letter-spacing:0.1em;color:var(--ink-3)}
.note-q-foot b{color:var(--acc);font-weight:700}

/* ============= CHRONICLE (S-SERIES) ============= */
.chron{padding:88px 0 64px;background:linear-gradient(180deg,var(--paper) 0%,var(--paper-2) 100%)}
.chron-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-top:36px}
@media(max-width:680px){.chron-grid{grid-template-columns:1fr}}
.chron-cell{padding:32px 28px 32px 0;border-right:1px solid var(--rule-soft);position:relative;border-bottom:1px solid var(--rule-soft)}
.chron-cell:nth-child(2n){padding-right:0;padding-left:28px;border-right:none}
.chron-cell:nth-last-child(-n+2){border-bottom:none}
.chron-cell.now{background:linear-gradient(180deg,rgba(139,42,31,0.05),transparent 80%)}
.chron-cell.now::before{
  content:'★ 当期 · 2026';position:absolute;top:14px;right:14px;
  font-family:var(--mono);font-size:10px;letter-spacing:0.14em;color:var(--acc);
  font-weight:700;background:var(--paper);padding:3px 8px;border:1px solid var(--acc);
}
.chron-cell .yr{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:10px}
.chron-cell .id{font-family:var(--serif);font-size:74px;font-weight:900;line-height:0.86;letter-spacing:-0.04em;color:var(--ink);margin-bottom:4px}
.chron-cell.now .id{color:var(--acc)}
.chron-cell .ti{font-family:var(--serif);font-size:22px;font-weight:700;line-height:1.25;letter-spacing:-0.005em;margin:6px 0 2px;color:var(--ink)}
.chron-cell .span{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:0.06em;margin-bottom:14px}
.chron-cell .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--acc);margin:18px 0 8px;font-weight:600}
.chron-cell ul{margin:0;padding-left:18px;font-family:var(--serif);font-size:15px;line-height:1.65;color:var(--ink-2)}
.chron-cell ul li{margin-bottom:3px}
.chron-cell ul li b{color:var(--ink);font-weight:600}
.chron-cell ul li .new{background:linear-gradient(180deg,transparent 64%,rgba(196,155,90,0.4) 64%);font-weight:600;color:var(--ink);padding:0 2px}
.chron-cell .foot{margin-top:18px;font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink-3)}
.chron-cell.now .foot{color:var(--acc);font-weight:600}

.chron-delta{margin-top:48px;padding:40px 36px 38px;background:var(--paper);border:1px solid var(--rule)}
.chron-delta .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:0.22em;text-transform:uppercase;color:var(--acc);margin-bottom:10px;font-weight:700}
.chron-delta .t{font-family:var(--serif);font-size:clamp(26px,3.2vw,36px);font-weight:700;letter-spacing:-0.015em;line-height:1.15;margin-bottom:8px}
.chron-delta .d{font-family:var(--serif);font-size:16px;color:var(--ink-3);line-height:1.6;font-style:italic;margin-bottom:24px;max-width:680px}
.chron-delta .items{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--rule-soft)}
@media(max-width:680px){.chron-delta .items{grid-template-columns:1fr}}
.chron-delta .item{padding:22px 24px 0 0;border-right:1px solid var(--rule-soft)}
.chron-delta .item:nth-child(2){padding-left:24px}
.chron-delta .item:nth-child(3){padding-left:24px;padding-right:0;border-right:none}
@media(max-width:680px){.chron-delta .item{padding:18px 0;border-right:none;border-bottom:1px solid var(--rule-fade)}.chron-delta .item:last-child{border-bottom:none}}
.chron-delta .item .n{font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:6px}
.chron-delta .item .h{font-family:var(--serif);font-size:20px;font-weight:700;line-height:1.25;margin-bottom:6px}
.chron-delta .item .b{font-family:var(--serif);font-size:15px;line-height:1.65;color:var(--ink-2)}

/* ============= ESSAY (algorithm vs engineering) ============= */
.essay{padding:88px 0 64px}
.essay-quote{
  margin:32px auto 36px;max-width:860px;
  font-family:var(--serif);font-style:italic;font-size:clamp(22px,2.6vw,28px);line-height:1.5;
  color:var(--ink);font-weight:500;text-align:center;
  border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:36px 0;
}
.essay-quote .mk{color:var(--acc);font-size:1.4em;font-style:normal;line-height:0}
.essay-quote b{color:var(--acc);font-weight:600;font-style:normal}
.essay-quote .em{color:var(--ink);font-style:normal;font-weight:700}

.essay-grid{margin-top:32px;display:grid;grid-template-columns:1fr 1fr;gap:0 56px;align-items:start}
@media(max-width:760px){.essay-grid{grid-template-columns:1fr;gap:30px}}
.essay-col{position:relative;padding-top:16px;border-top:3px double var(--rule)}
.essay-col .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px;font-weight:600}
.essay-col .lab b{color:var(--acc);font-weight:700}
.essay-col .ans{font-family:var(--serif);font-size:clamp(22px,2.4vw,28px);font-weight:700;line-height:1.25;letter-spacing:-0.015em;margin-bottom:14px}
.essay-col .ans s{font-weight:400;color:var(--ink-4);text-decoration:line-through}
.essay-col .desc{font-family:var(--serif);font-size:16px;line-height:1.78;color:var(--ink-2)}
.essay-col .desc b{font-weight:600;color:var(--ink)}

.essay-merge{margin-top:48px;padding:46px 38px;background:var(--ink);color:var(--paper);position:relative;text-align:center}
.essay-merge::before{
  content:'×';position:absolute;left:50%;top:-22px;transform:translateX(-50%);
  width:44px;height:44px;background:var(--acc);color:var(--paper);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:24px;font-weight:700;
}
.essay-merge .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:0.22em;text-transform:uppercase;color:var(--acc-soft);margin-bottom:14px;font-weight:700}
.essay-merge .ans{font-family:var(--serif);font-size:clamp(28px,3.4vw,38px);font-weight:700;letter-spacing:-0.02em;line-height:1.18;margin-bottom:14px;color:var(--paper)}
.essay-merge .desc{font-family:var(--serif);font-size:17px;line-height:1.78;color:rgba(244,239,229,0.78);max-width:640px;margin:0 auto}
.essay-merge .desc b{color:var(--paper);font-weight:600}

.essay-tenets{margin-top:48px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--rule)}
@media(max-width:760px){.essay-tenets{grid-template-columns:1fr 1fr}}
@media(max-width:460px){.essay-tenets{grid-template-columns:1fr}}
.essay-tenet{padding:24px 22px 22px 0;border-right:1px solid var(--rule-soft);border-bottom:1px solid var(--rule-soft)}
.essay-tenet:nth-child(4n){border-right:none;padding-right:0}
.essay-tenet:nth-child(n+1){padding-left:22px}
.essay-tenet:nth-child(4n+1){padding-left:0}
.essay-tenet:nth-last-child(-n+4){border-bottom:none}
.essay-tenet .n{font-family:var(--mono);font-size:11px;letter-spacing:0.16em;color:var(--acc);font-weight:700;margin-bottom:6px}
.essay-tenet .t{font-family:var(--serif);font-size:17px;font-weight:700;line-height:1.3;margin-bottom:6px;color:var(--ink)}
.essay-tenet .d{font-family:var(--serif);font-size:14.5px;line-height:1.65;color:var(--ink-2)}

/* ============= ROADMAP / TOC ============= */
.roadmap{padding:88px 0 64px;background:var(--paper-2)}
.roadmap .arc{margin-top:36px;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:24px 0;display:grid;grid-template-columns:repeat(6,1fr);gap:0}
@media(max-width:760px){.roadmap .arc{grid-template-columns:repeat(3,1fr);gap:18px 0}}
@media(max-width:460px){.roadmap .arc{grid-template-columns:repeat(2,1fr)}}
.roadmap .arc .a{position:relative;padding:0 18px;border-right:1px solid var(--rule-soft);text-align:left}
.roadmap .arc .a:last-child{border-right:none}
.roadmap .arc .a:first-child{padding-left:0}
.roadmap .arc .a .n{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:6px}
.roadmap .arc .a .t{font-family:var(--serif);font-size:15.5px;font-weight:600;line-height:1.3;color:var(--ink)}

.roadmap-toc{margin-top:46px;background:var(--paper);border:1px solid var(--rule)}
.roadmap-toc .head{display:flex;justify-content:space-between;align-items:baseline;padding:18px 28px;border-bottom:1px solid var(--rule);font-family:var(--mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase}
.roadmap-toc .head b{color:var(--acc);font-weight:700}
.roadmap-toc .head .ct{color:var(--ink-3)}
.roadmap-toc .row{display:grid;grid-template-columns:90px 1fr 1.4fr 220px;align-items:baseline;padding:14px 28px;border-bottom:1px solid var(--rule-fade);font-family:var(--serif)}
.roadmap-toc .row:last-child{border-bottom:none}
.roadmap-toc .row:hover{background:rgba(139,42,31,0.04)}
.roadmap-toc .row .wk{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--acc);letter-spacing:0.04em}
.roadmap-toc .row .topic{font-size:18px;font-weight:600;color:var(--ink);letter-spacing:-0.005em}
.roadmap-toc .row .pos{font-size:14.5px;color:var(--ink-2);line-height:1.55;font-style:italic}
