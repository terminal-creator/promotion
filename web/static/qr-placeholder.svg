<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 灰色棋盘网格做"二维码占位" -->
  <defs>
    <pattern id="qrgrid" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#1a1a1a"/>
      <rect x="6" y="6" width="6" height="6" fill="#1a1a1a"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <rect x="10" y="10" width="180" height="180" fill="url(#qrgrid)" opacity="0.18"/>

  <!-- 三个定位角 · 标准 QR 角标 -->
  <g fill="#1a1a1a">
    <rect x="10" y="10" width="42" height="42"/>
    <rect x="16" y="16" width="30" height="30" fill="#ffffff"/>
    <rect x="22" y="22" width="18" height="18"/>

    <rect x="148" y="10" width="42" height="42"/>
    <rect x="154" y="16" width="30" height="30" fill="#ffffff"/>
    <rect x="160" y="22" width="18" height="18"/>

    <rect x="10" y="148" width="42" height="42"/>
    <rect x="16" y="154" width="30" height="30" fill="#ffffff"/>
    <rect x="22" y="160" width="18" height="18"/>
  </g>

  <!-- 中心一个 "QR" 文字提示 -->
  <rect x="62" y="84" width="76" height="32" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="100" y="106" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#1a1a1a">
    QR · DEMO
  </text>
</svg>
